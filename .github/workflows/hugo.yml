# Build Hugo site and deploy to Cloudflare Pages
name: Deploy Hugo site to Cloudflare Pages

on:
  # Run on pushes to the default branch
  push:
    branches: ["main"]
  # Allow manual runs from the Actions tab
  workflow_dispatch:

defaults:
  run:
    shell: bash

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.164.0
      # Cloudflare Pages project name; the site will be served at <project>.pages.dev
      CF_PROJECT: blogofbrian
    steps:
      - name: Install Hugo CLI
        run: |
          wget -O ${{ runner.temp }}/hugo.deb https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb \
          && sudo dpkg -i ${{ runner.temp }}/hugo.deb

      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Fetch the PaperMod theme submodule
          submodules: recursive
          fetch-depth: 0

      - name: Build with Hugo
        env:
          HUGO_ENVIRONMENT: production
        run: |
          hugo \
            --gc \
            --minify \
            --baseURL "https://${CF_PROJECT}.pages.dev/"

      # Create the Pages project on first run; ignore the error if it already exists
      - name: Ensure Cloudflare Pages project exists
        run: npx wrangler@3 pages project create "${CF_PROJECT}" --production-branch main || true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Pages
        run: npx wrangler@3 pages deploy public --project-name "${CF_PROJECT}" --branch main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
