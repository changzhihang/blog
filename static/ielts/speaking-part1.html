 happy music, since it just fits my personality and keeps me in a good mood. That said, I do turn to slower, sadder songs now and then, especially when I'm feeling down and want to reflect on things. So I guess it really depends on my mood at the moment.\n\n**关键词 / 高分表达:** go for (选择，偏爱)；keeps me in a good mood (让我保持好心情)；when I'm feeling down (当我情绪低落时)","kw":""}]},{"title":"Outer space and stars【海外】【疑似淘汰】","qs":[{"num":"Q1","q":"Do you want to know more about outer space?","answer":"Yes, absolutely, I find outer space endlessly fascinating. There's just so much out there that we still don't understand, and that mystery really draws me in. Whenever a new discovery about a distant planet makes the news, I can't help but read all about it.\n\n**关键词 / 高分表达:** endlessly fascinating (无穷魅力)；draws me in (吸引我)；can't help but (忍不住)","kw":""},{"num":"Q2","q":"Do you want to go into outer space in the future?","answer":"Well, part of me would absolutely love to, just to see the Earth from above and float around in zero gravity. But to be honest, the other part of me is a bit scared, because space travel still seems quite risky. Maybe if it becomes safer and more affordable one day, I'd seriously give it a go.\n\n**关键词 / 高分表达:** zero gravity (零重力)；quite risky (相当冒险)；give it a go (尝试一下)","kw":""},{"num":"Q3","q":"Do you like science fiction movies?Why?","answer":"Yes, I'm a big fan of them. What I love is how they let your imagination run wild and picture worlds that don't exist yet. For instance, after watching a film about interstellar travel, I spent the whole evening wondering what life might be like on other planets.\n\n**关键词 / 高分表达:** a big fan of (……的忠实粉丝)；imagination run wild (天马行空的想象)；interstellar travel (星际旅行)","kw":""},{"num":"Q4","q":"Have you ever learnt about outer space and stars?","answer":"Yes, mostly back in school during our science and geography lessons. I still remember learning about the solar system and trying to memorize the order of the planets. Apart from that, I've picked up quite a lot from documentaries and articles just out of my own curiosity.\n\n**关键词 / 高分表达:** the solar system (太阳系)；the order of the planets (行星的顺序)；out of my own curiosity (出于自己的好奇心)","kw":""}]},{"title":"Reading","qs":[{"num":"Q1","q":"Do you prefer scanning or detailed reading?","answer":"It really depends on what I'm reading, to be honest. When I'm going through the news or an article online, I usually just scan it quickly to get the main idea. But if it's a novel or something I'm studying, I slow right down and read every word carefully. So I switch between the two depending on the situation.\n\n**关键词 / 高分表达:** scan（快速浏览）；get the main idea（抓住主旨）；slow down（放慢）","kw":""},{"num":"Q2","q":"When do you need to read carefully,and when not?","answer":"I need to read carefully whenever the details actually matter, like a contract or instructions for something. Missing one small point there could cause real problems later. On the other hand, for things like social media posts or a menu, a quick glance is more than enough. Basically, the more important the text, the more attention I give it.\n\n**关键词 / 高分表达:** details matter（细节很重要）；a quick glance（扫一眼）；give attention（投入注意力）","kw":""},{"num":"Q3","q":"Do you prefer to read on paper or on a screen?","answer":"Personally, I still prefer paper, especially for longer books. There's just something relaxing about holding a real book and flipping through the pages. Screens tire my eyes out after a while, and I get distracted by notifications too easily. That said, I do use my phone for quick reading when I'm out and about.\n\n**关键词 / 高分表达:** flip through the pages（翻页）；tire my eyes out（弄得眼睛累）；out and about（外出时）","kw":""},{"num":"Q4","q":"Do you like reading?","answer":"Yes, I'd say I'm quite a keen reader. I mostly enjoy fiction, particularly mystery novels, because I love trying to guess the ending before it comes. I usually read for half an hour before bed to help me unwind. It's honestly one of my favourite ways to escape from a busy day.\n\n**关键词 / 高分表达:** a keen reader（热爱阅读的人）；unwind（放松）；escape from（逃离）","kw":""}]},{"title":"Walking","qs":[{"num":"Q1","q":"Where did you go for a walk lately?","answer":"Just last weekend, I went for a walk along the river near my apartment. The weather was lovely, so I strolled there for about an hour with a coffee in hand. There were lots of families and dog walkers around, which made it feel really lively. It's become my go-to spot whenever I need to clear my head.\n\n**关键词 / 高分表达:** stroll（悠闲地散步）；coffee in hand（手里拿着咖啡）；clear my head（清醒头脑）","kw":""},{"num":"Q2","q":"Where would you like to take a long walk if you had the chance?","answer":"If I had the chance, I'd love to hike along the coast somewhere like New Zealand. I've seen pictures of those cliff-side trails with the ocean right beside you, and they look absolutely stunning. I imagine the fresh sea air would make the whole walk so refreshing. That's definitely on my bucket list.\n\n**关键词 / 高分表达:** cliff-side trails（悬崖小径）；stunning（惊艳的）；bucket list（愿望清单）","kw":""},{"num":"Q3","q":"Why do people like to walk in parks?","answer":"I think it's mainly because parks feel so peaceful compared to the busy streets. Being surrounded by trees and greenery really helps people relax and forget about their stress. On top of that, the air is usually much fresher there, which makes the walk more pleasant. It's basically a little escape from city life.\n\n**关键词 / 高分表达:** greenery（绿植）；forget about stress（忘掉压力）；escape from city life（逃离城市生活）","kw":""},{"num":"Q4","q":"Did you often go outside to have a walk when you were a child?","answer":"Yeah, quite a lot actually. My grandparents used to take me out for a walk after dinner almost every evening. We'd wander around the neighbourhood and they'd chat with people they knew along the way. Looking back, those little walks were a really nice part of my childhood.\n\n**关键词 / 高分表达:** after dinner（晚饭后）；wander around（四处闲逛）；looking back（回想起来）","kw":""},{"num":"Q5","q":"Do you walk a lot?","answer":"These days, yes, more than I used to. Since my office isn't too far away, I've started walking there instead of taking the bus. It only takes about twenty-five minutes and it's a nice way to wake up in the morning. Plus, my step counter keeps pushing me to hit ten thousand steps a day.\n\n**关键词 / 高分表达:** instead of（而不是）；wake up（清醒过来）；hit ten thousand steps（走满一万步）","kw":""}]},{"title":"Day off","qs":[{"num":"Q1","q":"What would you like to do if you had a day off tomorrow?","answer":"If I had tomorrow off, I'd probably start by sleeping in, since I never get to do that during the week. After that, I'd love to meet a couple of friends for brunch and just take things slow. Maybe in the afternoon I'd catch a movie or read at a café. Honestly, a relaxed day with no plans sounds perfect to me.\n\n**关键词 / 高分表达:** sleep in（睡懒觉）；take things slow（慢慢来）；no plans（没有计划）","kw":""},{"num":"Q2","q":"Do you usually spend your days off with your parents or with your friends?","answer":"It's a bit of a mix, actually. I usually try to have dinner with my parents at least once on my day off, since I live nearby and they love seeing me. But if I'm meeting up for something more active, like hiking or shopping, then it's normally with my friends. So it really depends on the mood I'm in.\n\n**关键词 / 高分表达:** a bit of a mix（两者都有）；meet up（碰面）；depends on the mood（看心情）","kw":""},{"num":"Q3","q":"What do you usually do when you have days off?","answer":"Most of the time, I like to keep it fairly low-key. I'll catch up on some sleep, tidy the apartment, and maybe cook a proper meal for a change. If the weather's nice, I might head out for a walk or visit a new café in town. Basically, I use my days off to recharge for the week ahead.\n\n**关键词 / 高分表达:** low-key（悠闲低调）；catch up on sleep（补觉）；recharge（充电、恢复精力）","kw":""},{"num":"Q4","q":"When was the last time you had a few days off?","answer":"That was during the last public holiday, about a month ago. I took a short trip to a nearby city with my partner, and we spent three days exploring and eating far too much street food. It was such a nice break from the daily routine. By the time we got back, I felt completely refreshed.\n\n**关键词 / 高分表达:** public holiday（公共假期）；a nice break（很好的休息）；refreshed（精神焕发的）","kw":""}]},{"title":"Typing","qs":[{"num":"Q1","q":"How do you improve your typing?","answer":"Well, honestly the main way I've improved is just by typing a lot every day, since I chat with friends and write notes constantly. A while ago I also tried a free typing website that made me practice without looking at the keyboard, which really helped my speed. These days I can type fairly quickly without staring down at my hands.\n\n**关键词 / 高分表达:** without looking at the keyboard (盲打); type quickly (打字快); practice every day (每天练习)","kw":""},{"num":"Q2","q":"When did you learn how to type on a keyboard?","answer":"I'd say I first started when I was around ten, mostly because we had a computer class in primary school. At the beginning I was really slow and had to search for each letter one by one. Over time, though, playing online games and messaging my classmates forced me to get faster, so it just came naturally.\n\n**关键词 / 高分表达:** one by one (一个一个地); came naturally (自然而然学会); computer class (电脑课)","kw":""},{"num":"Q3","q":"Do you type on a desktop or laptop keyboard every day?","answer":"To be honest, it's almost always my laptop these days, because I carry it everywhere and it's just more convenient. I use a desktop only when I'm gaming at home, since the bigger keyboard feels nicer for that. But for studying and everyday tasks, the laptop is definitely my go-to.\n\n**关键词 / 高分表达:** my go-to (我的首选); carry it everywhere (随身携带); more convenient (更方便)","kw":""},{"num":"Q4","q":"Do you prefer typing or handwriting?","answer":"I'd say I prefer typing for most things, simply because it's so much faster and I can easily fix my mistakes. That said, when I really want to remember something, like new vocabulary, I still write it by hand because it sticks in my memory better. So it kind of depends on what I'm doing.\n\n**关键词 / 高分表达:** fix my mistakes (改错); sticks in my memory (记得更牢); it depends (视情况而定)","kw":""}]},{"title":"Childhood activities","qs":[{"num":"Q1","q":"Did you prefer to do activities alone or with agroup of people when you were a child?","answer":"Well, as a kid I definitely preferred doing things with a group, especially playing outside with the neighbourhood children. We used to play hide-and-seek every evening after dinner, and it was just so much more fun with lots of people. I was quite a sociable child, so being alone felt a bit boring to me back then.\n\n**关键词 / 高分表达:** hide-and-seek (捉迷藏); sociable (爱交际的); the neighbourhood children (邻居家的孩子)","kw":""},{"num":"Q2","q":"What were your favourite activities when you werea child?","answer":"To be honest, my favourite thing was riding my bike around the small streets near my home. My cousins and I would race each other and pretend we were on some big adventure. I also loved drawing cartoons, because I could just sit for hours making up my own little stories. Looking back, those were really carefree days.\n\n**关键词 / 高分表达:** race each other (互相比赛); make up stories (编故事); carefree days (无忧无虑的日子)","kw":""}]},{"title":"Going out","qs":[{"num":"Q1","q":"How often do you use cash?","answer":"Honestly, I hardly ever use cash these days, maybe once every couple of months at most. Almost everywhere here accepts mobile payment, so I just scan a QR code with my phone. The only time I really need notes is when I visit a small local market where an older vendor doesn't take digital payments.\n\n**关键词 / 高分表达:** hardly ever (几乎不); mobile payment (移动支付); scan a QR code (扫二维码)","kw":""},{"num":"Q2","q":"Do you often bring cash with you?","answer":"Not really, to be honest. I usually just carry my phone because it does everything a wallet used to do. That said, I do keep a small amount of cash tucked in my bag for emergencies, like if my phone runs out of battery. But most days I forget the cash is even there.\n\n**关键词 / 高分表达:** tucked in my bag (塞在包里); for emergencies (以防万一); runs out of battery (没电)","kw":""},{"num":"Q3","q":"Do you always take your mobile phone with you when going out?","answer":"Oh, absolutely, I never leave home without it. My phone is basically my wallet, my map, and my way of contacting people all in one. If I accidentally forget it, I feel really uneasy and usually end up going back for it. It's become such a huge part of my daily life.\n\n**关键词 / 高分表达:** never leave home without it (从不离身); feel uneasy (感到不安); all in one (合而为一)","kw":""},{"num":"Q4","q":"Do you bring food or snacks with you when going out?","answer":"It really depends on where I'm going. For a short trip I usually don't bother, but if I'm heading out for a whole day, like hiking, I'll pack some biscuits and a bottle of water. I get grumpy when I'm hungry, so having a snack on hand keeps me in a good mood.\n\n**关键词 / 高分表达:** don't bother (懒得); on hand (随身备着); get grumpy (变得暴躁)","kw":""}]},{"title":"Doing something well","qs":[{"num":"Q1","q":"Do you often tell your friends when they do something well?","answer":"Yeah, I definitely try to, because I think a bit of encouragement goes a long way. For instance, when my friend did a great presentation last month, I told her straight away how impressed I was. I know how good it feels to be praised, so I like to pass that feeling on to others.\n\n**关键词 / 高分表达:** goes a long way (作用很大); straight away (立刻); pass that feeling on (把这种感觉传递出去)","kw":""},{"num":"Q2","q":"Do you have an experience that your teacher thought you did a good job?","answer":"Yeah, I remember once in high school I wrote an essay that my Chinese teacher really liked. She read it aloud to the whole class as an example, which honestly made me a little embarrassed but really proud. That moment gave me a lot of confidence in my writing, and I still remember it clearly.\n\n**关键词 / 高分表达:** read it aloud (大声朗读); a little embarrassed (有点不好意思); gave me confidence (给了我信心)","kw":""},{"num":"Q3","q":"Do you have an experience that you did something well?","answer":"Well, one thing that comes to mind is when I helped organise a small birthday party for my best friend. I planned everything from the decorations to the food, and it all went really smoothly. Seeing how happy she was made me feel that all my effort had truly paid off. It's a lovely memory.\n\n**关键词 / 高分表达:** went smoothly (进行得顺利); paid off (有了回报); comes to mind (想到)","kw":""}]},{"title":"Taking photos","qs":[{"num":"Q1","q":"Do you like taking photos?","answer":"Yes, I really do. I love taking photos because they help me hold on to nice moments that would otherwise slip away. For example, last summer I went hiking with my friends, and I took loads of pictures of the sunset from the top of the hill. Now whenever I look back at them, all those good feelings come rushing back.\n\n**关键词 / 高分表达:** hold on to moments（留住瞬间）; slip away（悄悄溜走）; come rushing back（涌上心头）","kw":""},{"num":"Q2","q":"Do you like taking selfies?","answer":"To be honest, not really. I'm a bit shy in front of the camera, so I'd rather take photos of scenery or my friends than of myself. That said, I do occasionally snap a selfie when I'm somewhere special, like when I visited the Bund in Shanghai, just to prove I was actually there.\n\n**关键词 / 高分表达:** shy in front of the camera（怕镜头）; snap a selfie（随手自拍）; prove I was actually there（证明我真的去过）","kw":""},{"num":"Q3","q":"Where do you like to go to take photos?","answer":"I'd say my favourite place is the park near my home, especially in autumn. The leaves turn this beautiful golden colour, and the soft light in the late afternoon makes everything look magical. I usually go there on weekends with my phone and just wander around looking for nice shots.\n\n**关键词 / 高分表达:** golden colour（金黄色）; magical（如梦如幻的）; wander around（四处闲逛）","kw":""},{"num":"Q4","q":"What is your favourite family photo?","answer":"My favourite one is a photo we took during Spring Festival a few years ago. The whole family gathered at my grandmother's house, and someone caught us all laughing at a joke my uncle made. What I love about it is that it feels so genuine, not posed at all, so it really captures how warm our family gatherings are.\n\n**关键词 / 高分表达:** family gathering（家庭聚会）; genuine（真实自然的）; not posed（不摆拍的）","kw":""},{"num":"Q5","q":"Do you like taking selfies?","answer":"Well, as I mentioned, selfies aren't really my thing. I feel a little awkward pointing the camera at my own face, and honestly I never think my selfies turn out that well. I much prefer having a friend take a candid shot of me while I'm not paying attention.\n\n**关键词 / 高分表达:** not really my thing（不太是我的菜）; turn out well（拍得好）; candid shot（抓拍）","kw":""},{"num":"Q6","q":"What is your favorite family photo?","answer":"There's one photo I'm especially fond of, from a trip we took to the seaside when I was about ten. My dad is carrying me on his shoulders and we're both squinting because of the bright sun. Every time I see it, I remember how carefree that whole holiday felt, so it holds a special place in my heart.\n\n**关键词 / 高分表达:** fond of（喜爱的）; squinting（眯着眼）; carefree（无忧无虑的）","kw":""},{"num":"Q7","q":"Do you want to improve your picture taking skills?","answer":"Definitely, yes. Right now I mostly just point and shoot, but I'd love to learn more about things like composition and lighting. I've actually been watching a few short tutorials online, and I'm hoping that with a bit of practice I can start taking photos that look more professional.\n\n**关键词 / 高分表达:** point and shoot（随手拍）; composition and lighting（构图与光线）; with a bit of practice（多加练习）","kw":""}]},{"title":"Spare time","qs":[{"num":"Q1","q":"Would you like to have more free time in the future?","answer":"Absolutely, who wouldn't? Right now my days are packed with study, so I barely have a moment to myself. If I had more free time, I'd love to pick up hobbies I've always wanted to try, like learning the guitar or doing more travelling. I think having time to unwind is really important for staying happy.\n\n**关键词 / 高分表达:** packed with（排得满满的）; pick up a hobby（培养爱好）; unwind（放松）","kw":""},{"num":"Q2","q":"Which day do you have more free time on, Saturday or Sunday?","answer":"I'd say Saturday, without a doubt. On Sundays I usually have to prepare for the week ahead, so my mind is already half back at work. But on Saturdays I can properly relax, sleep in, and do whatever I feel like without worrying about anything.\n\n**关键词 / 高分表达:** without a doubt（毫无疑问）; the week ahead（接下来的一周）; sleep in（睡懒觉）","kw":""},{"num":"Q3","q":"Do you often have free time?","answer":"Honestly, not as much as I'd like. During the week I'm pretty busy, so my free time mostly comes at the weekend. Even then, it tends to get eaten up by chores and errands. Still, I always try to carve out at least an hour or two just for myself.\n\n**关键词 / 高分表达:** eaten up by（被占用）; chores and errands（家务杂事）; carve out time（挤出时间）","kw":""},{"num":"Q4","q":"What do you and your family like to do in spare time?","answer":"We enjoy pretty simple things together. A lot of the time we'll just cook a nice meal and chat over dinner, or go for a stroll in the park nearby. Occasionally we'll watch a movie at home with some snacks. It's nothing fancy, but those are the moments I treasure the most.\n\n**关键词 / 高分表达:** go for a stroll（散步）; nothing fancy（不奢华、很平常）; treasure（珍惜）","kw":""},{"num":"Q5","q":"Do you think you will spend more time with your family?","answer":"I certainly hope so. As I get older, I've come to realise how precious that time is, especially with my parents. Life gets busier and busier, but I'm making a real effort to visit home more often and just be present when I'm there.\n\n**关键词 / 高分表达:** precious（珍贵的）; make a real effort（真正努力）; be present（用心陪伴）","kw":""},{"num":"Q6","q":"Do you like to spend time with your family?","answer":"Yes, very much so. My family is my comfort zone, the place where I can completely be myself and let my guard down. Whether we're chatting about our day or just sitting quietly together, I always feel relaxed and recharged afterwards.\n\n**关键词 / 高分表达:** comfort zone（舒适圈）; let my guard down（放松戒备）; recharged（重新充满能量）","kw":""},{"num":"Q7","q":"What do you usually do when you are free?","answer":"When I've got some free time, I usually reach for a good book or catch up on a series I've been following. If the weather's nice, though, I prefer to head outside and go for a bike ride to clear my head. It really helps me switch off from all the stress.\n\n**关键词 / 高分表达:** catch up on a series（追剧）; clear my head（理清思绪）; switch off（放松、断电）","kw":""}]},{"title":"Borrowing/lending","qs":[{"num":"Q1","q":"Do you mind if others borrow money from you?","answer":"It really depends on who's asking and how much. If it's a close friend and just a small amount, I'm happy to help out without a second thought. But when it comes to larger sums, I'd be a bit more cautious, simply because money can sometimes put a strain on relationships.\n\n**关键词 / 高分表达:** without a second thought（毫不犹豫）; larger sums（大额）; put a strain on（给…带来压力）","kw":""},{"num":"Q2","q":"Have you ever borrowed books from others?","answer":"Yes, quite a few times. Back in university, my roommate had a huge collection of novels, and I was always borrowing them from her. I remember she lent me a mystery novel that I finished in just two days because I couldn't put it down. I always made sure to return them in good condition, though.\n\n**关键词 / 高分表达:** a huge collection（大量收藏）; couldn't put it down（爱不释手）; in good condition（完好无损）","kw":""},{"num":"Q3","q":"Have you ever borrowed money from others?","answer":"Only once or twice, and only in a pinch. I recall one time I left my wallet at home and had to borrow a bit of lunch money from a colleague. I felt slightly embarrassed, so I paid her back the very next morning. Generally, I try to avoid borrowing money if I possibly can.\n\n**关键词 / 高分表达:** in a pinch（在紧要关头）; pay back（还钱）; slightly embarrassed（有点尴尬）","kw":""},{"num":"Q4","q":"Do you like to lend things to others?","answer":"On the whole, yes, I'm quite a generous person. If a friend needs something I have, like a charger or an umbrella, I'll gladly lend it to them. That said, I'm a little protective of things that really matter to me, so I might hesitate before lending out something valuable.\n\n**关键词 / 高分表达:** on the whole（总体而言）; generous（大方的）; protective of（爱惜、舍不得）","kw":""},{"num":"Q5","q":"How do you feel when people don't return things they borrowed from you?","answer":"To be honest, it does bother me a little, especially if it's something I use regularly. It's not really about the item itself, but more that it feels a bit disrespectful. Usually I'll drop a gentle reminder rather than make a big deal out of it, since I don't like awkward situations.\n\n**关键词 / 高分表达:** it bothers me（让我在意）; disrespectful（不尊重的）; drop a gentle reminder（委婉提醒）","kw":""}]},{"title":"Sharing","qs":[{"num":"Q1","q":"What kinds of news do you share with our friends?","answer":"Mostly the kind of news that I think they'll find interesting or useful. For example, if I come across a great deal on something, or hear about a concert coming to town, I'll immediately forward it to them. I also love sharing funny videos, because there's nothing better than making your friends laugh.\n\n**关键词 / 高分表达:** come across（偶然发现）; a great deal（划算的优惠）; forward（转发）","kw":""},{"num":"Q2","q":"Who is the first person you like to share good news with?","answer":"Without a doubt, it's my mum. She's always the first person I call whenever something good happens, whether it's passing an exam or getting some praise at work. She gets so genuinely excited for me that it honestly doubles the joy, so telling her just feels natural.\n\n**关键词 / 高分表达:** without a doubt（毫无疑问）; genuinely excited（真心为我高兴）; double the joy（喜悦加倍）","kw":""},{"num":"Q3","q":"Did your parents teach you to share when you were a child?","answer":"Yes, they definitely did. My mum always reminded me to share my toys and snacks with other kids, especially my younger cousins. I remember she'd say that sharing makes everyone happier, and looking back, I think that early lesson really shaped how I treat people today.\n\n**关键词 / 高分表达:** remind me to（提醒我）; looking back（回头看）; shape（塑造、影响）","kw":""},{"num":"Q4","q":"What kind of things do you like to share with others?","answer":"I enjoy sharing all sorts of things, but mostly experiences rather than objects. For instance, if I discover a nice little restaurant, I love taking my friends there so we can enjoy it together. I also happily share my knowledge or advice whenever someone asks, because it feels good to be helpful.\n\n**关键词 / 高分表达:** all sorts of things（各种各样）; discover（发现）; be helpful（帮上忙）","kw":""},{"num":"Q5","q":"What kind of things are not suitable for sharing?","answer":"I'd say very personal or private matters really shouldn't be shared, like other people's secrets or someone's private struggles. I'm also careful about sharing sensitive personal information online, such as my address or bank details, because you never know who might see it.\n\n**关键词 / 高分表达:** private matters（私事）; private struggles（私人烦恼）; sensitive information（敏感信息）","kw":""},{"num":"Q6","q":"Do you have anything to share with others recently?","answer":"Actually, yes. I recently finished a really gripping TV series that I've been recommending to everyone I know. The story had so many unexpected twists that I just can't stop talking about it. I've already convinced two of my friends to start watching it, so hopefully we can discuss it soon.\n\n**关键词 / 高分表达:** gripping（扣人心弦的）; unexpected twists（意想不到的转折）; recommend（推荐）","kw":""}]},{"title":"Scenery","qs":[{"num":"Q1","q":"What are the most beautiful sights you have seen while travelling?","answer":"The most breathtaking sight I've ever seen was the sunrise at the top of a mountain in Yunnan. We got up before dawn and hiked up in the dark, and when the sun finally rose above the clouds, the whole sky turned pink and gold. It was absolutely stunning, and completely worth the early start.\n\n**关键词 / 高分表达:** breathtaking（令人叹为观止的）; above the clouds（云海之上）; worth the early start（值得早起）","kw":""},{"num":"Q2","q":"Do you like to take scenery pictures?","answer":"Yes, I really enjoy it. Whenever I come across a beautiful view, my first instinct is to reach for my phone and capture it. For me, scenery photos are a lovely way to remember a place, and looking back at them later always brings back happy travel memories.\n\n**关键词 / 高分表达:** first instinct（第一反应）; capture（记录、拍下）; bring back memories（唤起回忆）","kw":""},{"num":"Q3","q":"Do you prefer the mountains or the sea?","answer":"That's a tough one, but I think I'd go for the sea. There's something incredibly calming about the sound of the waves and the endless horizon. Whenever I'm feeling stressed, just sitting on the beach and watching the water helps me clear my mind and completely relax.\n\n**关键词 / 高分表达:** a tough one（很难选）; endless horizon（无边的地平线）; clear my mind（放空心情）","kw":""},{"num":"Q4","q":"Do you look out the window at the scenery when travelling by bus or car?","answer":"Yes, all the time. I actually find it one of the best parts of any journey. I love watching the landscape gradually change as we drive along, from busy city streets to open countryside. It's really relaxing, and it stops the trip from feeling boring.\n\n**关键词 / 高分表达:** the best parts of a journey（旅途中最棒的部分）; landscape（风景、地貌）; open countryside（开阔的乡野）","kw":""}]},{"title":"Happy things","qs":[{"num":"Q1","q":"Do you think people are happy when buying new things?","answer":"Yes, I think most people do get a real buzz from buying something new. There's that little thrill of excitement when you finally own something you've been wanting. That said, I feel this kind of happiness tends to be short-lived, and once the novelty wears off, we usually start eyeing the next thing.\n\n**关键词 / 高分表达:** get a buzz from（从…中得到愉悦）; short-lived（短暂的）; the novelty wears off（新鲜感消退）","kw":""},{"num":"Q2","q":"Do you feel happy when buying new things?","answer":"Definitely, especially if it's something I've saved up for. For example, I recently bought a new laptop after months of waiting, and I was over the moon when it finally arrived. There's just something satisfying about unboxing something new and knowing it's going to make my life a bit easier.\n\n**关键词 / 高分表达:** save up for（攒钱买）; over the moon（欣喜若狂）; satisfying（令人满足的）","kw":""},{"num":"Q3","q":"When do you feel happy at work? Why?","answer":"I feel happiest when I finish a difficult task that I've been struggling with for a while. There's a real sense of accomplishment that comes with it. I also love it when my teammates and I work well together and actually get results, because that kind of teamwork makes even a stressful day feel worthwhile.\n\n**关键词 / 高分表达:** a sense of accomplishment（成就感）; get results（取得成果）; worthwhile（值得的）","kw":""},{"num":"Q4","q":"Is there anything that has made you feel happy lately?","answer":"Yes, actually. Just last weekend an old friend I hadn't seen in years came to visit, and we spent the whole day catching up over coffee. It felt like no time had passed at all, and I was reminded how lucky I am to have friends like that. It really lifted my spirits.\n\n**关键词 / 高分表达:** catch up（叙旧）; no time had passed（时光仿佛未曾流逝）; lift my spirits（让我心情大好）","kw":""},{"num":"Q5","q":"What do you think will make you feel happy in the future?","answer":"I'd say achieving a good balance between my work and personal life would make me genuinely happy. I don't dream of being super rich, but I'd love to have a stable job, good health, and enough time to spend with the people I care about. To me, that's what really matters most in the long run.\n\n**关键词 / 高分表达:** a good balance（良好平衡）; stable job（稳定的工作）; in the long run（从长远来看）","kw":""},{"num":"Q6","q":"What made you happy when you were little?","answer":"As a kid, the simplest things made me incredibly happy. I remember being absolutely thrilled whenever my parents took me to the amusement park or bought me an ice cream on a hot day. Looking back, I think it was the carefree feeling of having no worries at all that made those moments so joyful.\n\n**关键词 / 高分表达:** thrilled（激动的）; amusement park（游乐园）; carefree（无忧无虑的）","kw":""}]}],"qn":89},{"key":"04-places","emoji":"📍","cn":"地点","en":"Places","topics":[{"title":"The area you live in","qs":[{"num":"Q1","q":"What are some changes in the area recently?","answer":"Well, quite a few things have changed lately. The biggest one is that they opened a new subway station just around the corner, so getting to the city centre is so much easier now. They've also turned an old parking lot into a small park with benches and trees, which the whole neighbourhood really enjoys.\n\n**关键词 / 高分表达:** around the corner（就在附近）; turn ... into（把……改造成）; the whole neighbourhood（整个社区）","kw":""},{"num":"Q2","q":"Are the people in your neighborhood nice and friendly？","answer":"To be honest, most of them are really warm and easy-going. My next-door neighbour, an elderly lady, often gives us homemade dumplings during festivals, which I find so sweet. I think living close to kind people like that makes daily life a lot more pleasant.\n\n**关键词 / 高分表达:** easy-going（随和的）; next-door neighbour（隔壁邻居）; homemade（自制的）","kw":""},{"num":"Q3","q":"Do you live in a noisy or a quiet area?","answer":"I'd say my area is fairly quiet, especially in the evenings. It's mainly residential, so there's no busy nightlife or heavy traffic passing through. Sometimes I can even hear birds in the morning, which is quite rare for a big city.\n\n**关键词 / 高分表达:** residential（居民区的）; nightlife（夜生活）; heavy traffic（交通拥堵）","kw":""},{"num":"Q4","q":"Do you know any of your neighbors?","answer":"Actually, I know a few of them, though not all. I'm quite close with the family living downstairs because our kids play together in the courtyard. With the others, I usually just exchange a friendly nod or a quick chat in the lift.\n\n**关键词 / 高分表达:** exchange a friendly nod（友好地点头打招呼）; courtyard（院子）; in the lift（在电梯里）","kw":""},{"num":"Q5","q":"Do you like the area that you live in?","answer":"Yes, I really do. It has everything I need within walking distance — a supermarket, a couple of nice cafés, and a small clinic. On top of that, it feels safe and peaceful, so I can't really complain.\n\n**关键词 / 高分表达:** within walking distance（步行可达）; on top of that（除此之外）; can't complain（没什么可抱怨的）","kw":""},{"num":"Q6","q":"What changes have been made to the area recently?","answer":"Recently the local government has done a lot to brighten the place up. They repainted the old apartment blocks and added better street lighting, so it feels much safer at night. There's also a new bike-sharing station, which encourages people to cycle instead of driving.\n\n**关键词 / 高分表达:** brighten ... up（让……焕然一新）; street lighting（街道照明）; bike-sharing（共享单车）","kw":""},{"num":"Q7","q":"Do you know any famous people in your area?","answer":"Not really any big celebrities, to be honest. But there's a well-known calligrapher who lives a few buildings away, and people sometimes ask him to write couplets for the Spring Festival. He's quite a respected figure locally.\n\n**关键词 / 高分表达:** celebrity（名人）; calligrapher（书法家）; respected figure（受人尊敬的人物）","kw":""},{"num":"Q8","q":"Where do you like to go in that area?","answer":"My favourite spot is definitely the little riverside path near my flat. I go there most evenings for a walk to clear my head after work. It's especially lovely in spring when the willow trees start turning green.\n\n**关键词 / 高分表达:** riverside path（河边小路）; clear my head（放空、理清思绪）; willow trees（柳树）","kw":""}]},{"title":"Hometown","qs":[{"num":"Q1","q":"Did you learn about the history of your hometown at school?","answer":"Yes, we did cover a bit of it in primary school. I remember a teacher taking us to a small local museum to see old photos and tools. It wasn't very detailed, but it did make me curious about how my hometown developed over time.\n\n**关键词 / 高分表达:** cover（讲授、涉及）; local museum（当地博物馆）; develop over time（随时间发展）","kw":""},{"num":"Q2","q":"What's your hometown famous for?","answer":"My hometown is best known for its tea. The hills around the town are covered in tea plantations, and people come from all over to buy fresh leaves in spring. It's something the locals are genuinely proud of.\n\n**关键词 / 高分表达:** be known for（以……闻名）; tea plantation（茶园）; be proud of（为……自豪）","kw":""},{"num":"Q3","q":"How long have you lived there?","answer":"I've lived there for pretty much my whole life — around twenty years now. I was born there and only left recently for university. No matter where I go, it'll always feel like home to me.\n\n**关键词 / 高分表达:** my whole life（我的一生）; be born there（在那里出生）; feel like home（有家的感觉）","kw":""},{"num":"Q4","q":"Is that a big city or a small place?","answer":"It's more of a small town than a city, I'd say. Everything is within easy reach and people mostly know each other. Personally, I quite like that cosy, close-knit feeling.\n\n**关键词 / 高分表达:** within easy reach（很方便到达）; cosy（温馨的）; close-knit（关系紧密的）","kw":""},{"num":"Q5","q":"Do you think you will continue living there for a long time?","answer":"Probably not for the next few years, to be honest. I'll likely stay in the city for work opportunities after I graduate. But when I'm older, I could see myself moving back for a quieter, slower pace of life.\n\n**关键词 / 高分表达:** work opportunities（工作机会）; slower pace of life（更慢的生活节奏）; move back（搬回去）","kw":""},{"num":"Q6","q":"Is there anything you dislike about it?","answer":"Well, the one thing that frustrates me is that there isn't much to do for young people. There are hardly any cinemas or big shopping malls, so we often had to travel to the nearest city for fun. Apart from that, though, I really have no complaints.\n\n**关键词 / 高分表达:** frustrate（使沮丧）; hardly any（几乎没有）; no complaints（没有抱怨）","kw":""},{"num":"Q7","q":"What do you like about your hometown?","answer":"What I love most is the fresh air and the greenery everywhere. Life there is peaceful and unhurried, which is such a contrast to the busy city. Whenever I go back, I instantly feel more relaxed.\n\n**关键词 / 高分表达:** greenery（绿化、植被）; unhurried（不慌不忙的）; a contrast to（与……形成对比）","kw":""},{"num":"Q8","q":"Do you like living there?","answer":"Yes, I genuinely enjoy it. It's calm, safe, and everyone is friendly, so I always feel at ease. The only downside is that it can get a little boring at times, but overall it's a lovely place to live.\n\n**关键词 / 高分表达:** feel at ease（感到自在）; downside（缺点）; a lovely place（宜居之地）","kw":""},{"num":"Q9","q":"Do you like your hometown?","answer":"I really do, and I think I appreciate it more now that I've moved away. It's the place that shaped who I am, and it holds all my childhood memories. There's a special warmth to it that no other place quite matches.\n\n**关键词 / 高分表达:** appreciate（珍惜、欣赏）; shape who I am（塑造了我）; childhood memories（童年回忆）","kw":""},{"num":"Q10","q":"How long have you been living there?","answer":"I lived there continuously for about eighteen years before university. So it's fair to say I spent nearly my entire childhood and teenage years in that one place. That's why I feel so attached to it.\n\n**关键词 / 高分表达:** continuously（持续地）; teenage years（青少年时期）; feel attached to（依恋）","kw":""},{"num":"Q11","q":"Please describe your hometown a little.","answer":"Sure. It's a small, green town surrounded by tea-covered hills, with a river running right through the middle. The streets are quiet, the air is fresh, and life moves at a gentle pace. It's the kind of place where you can actually hear yourself think.\n\n**关键词 / 高分表达:** running through the middle（穿城而过）; at a gentle pace（节奏舒缓）; hear yourself think（安静得能静下心）","kw":""},{"num":"Q12","q":"Is your hometown a big city or a small place?","answer":"It's definitely a small place rather than a big city. There are no skyscrapers or heavy traffic — just low buildings and quiet lanes. I actually prefer it that way, because it feels much more human and relaxed.\n\n**关键词 / 高分表达:** skyscraper（摩天大楼）; quiet lanes（安静的小巷）; more human（更有人情味）","kw":""},{"num":"Q13","q":"Where would you like to live?","answer":"Ideally, I'd love to live somewhere that combines the best of both worlds — a city with good job prospects but also plenty of green spaces. A place like Hangzhou really appeals to me because it's modern yet surrounded by nature. That balance would suit me perfectly.\n\n**关键词 / 高分表达:** the best of both worlds（两全其美）; job prospects（就业前景）; appeal to me（吸引我）","kw":""},{"num":"Q14","q":"Do you plan to continue living there?","answer":"Not in the short term, I'm afraid. My career is likely to keep me in a bigger city for a while. That said, my hometown will always be somewhere I return to, and settling back there later on isn't out of the question.\n\n**关键词 / 高分表达:** in the short term（短期内）; return to（回到）; not out of the question（并非不可能）","kw":""},{"num":"Q15","q":"Where's your hometown?","answer":"My hometown is a small town in the south of China, tucked away among some low green hills. It's not a place many people have heard of, but it's quiet and beautiful. I'm always happy to tell people where I come from.\n\n**关键词 / 高分表达:** in the south of（在……的南部）; tucked away（隐藏于、坐落于）; where I come from（我的出身地）","kw":""}]},{"title":"Home/Accommodation","qs":[{"num":"Q1","q":"Do you think it is important to live in a comfortable environment?","answer":"Absolutely, I think it makes a huge difference. When your surroundings are comfortable, you feel more relaxed and can recharge properly after a long day. For me, coming home to a tidy, cosy space really lifts my mood.\n\n**关键词 / 高分表达:** make a difference（有很大影响）; recharge（恢复精力）; lift my mood（改善心情）","kw":""},{"num":"Q2","q":"What makes you feel pleasant in your home?","answer":"A few small things, actually. Good natural light is a big one — my flat gets plenty of sunshine in the afternoon, which feels lovely. I also keep a couple of plants around, and their green really brightens up the place.\n\n**关键词 / 高分表达:** natural light（自然光）; a big one（重要的一点）; brighten up（点亮、使有生气）","kw":""},{"num":"Q3","q":"What's your favorite room in your apartment or house?","answer":"Definitely my bedroom. It's my little private space where I can read, listen to music or just switch off completely. I've decorated it exactly the way I like, so it feels like a proper retreat.\n\n**关键词 / 高分表达:** private space（私人空间）; switch off（放松、断电放空）; a retreat（避风港）","kw":""},{"num":"Q4","q":"What kind of house or flat do you want to live in in the future?","answer":"In the future I'd love a bright flat with a big balcony overlooking some greenery. Ideally it would have an open kitchen, since I enjoy cooking. Nothing too huge — just cosy, well-lit and full of natural light.\n\n**关键词 / 高分表达:** overlooking（俯瞰、面朝）; open kitchen（开放式厨房）; well-lit（采光好的）","kw":""},{"num":"Q5","q":"Do you live in a house or a flat?","answer":"I live in a flat on the tenth floor of an apartment building. It's a fairly typical two-bedroom place, which suits my needs nicely. The best part is the view — I can see the whole city skyline from my window.\n\n**关键词 / 高分表达:** apartment building（公寓楼）; suit my needs（满足我的需求）; city skyline（城市天际线）","kw":""},{"num":"Q6","q":"What part of your home do you like the most?","answer":"I'd have to say the living room, because that's where everything happens. We gather there to watch films, chat and just spend time together. It's the heart of our home, really.\n\n**关键词 / 高分表达:** gather（聚集）; spend time together（共度时光）; the heart of our home（家的核心）","kw":""},{"num":"Q7","q":"Please describe the room you live in.","answer":"My room is small but nicely arranged. There's a desk by the window, a comfy bed against the wall, and a few shelves packed with books. I keep it simple and clutter-free, which helps me focus and relax.\n\n**关键词 / 高分表达:** nicely arranged（布置得很好）; packed with（塞满了）; clutter-free（整洁无杂物的）","kw":""},{"num":"Q8","q":"Do you prefer living in a house or a flat?","answer":"Personally, I lean towards a flat, at least for now. It's low-maintenance and usually closer to the city centre, which is convenient. A house would be nice one day, but it's honestly a lot more work to look after.\n\n**关键词 / 高分表达:** lean towards（倾向于）; low-maintenance（好打理的）; look after（打理、照料）","kw":""},{"num":"Q9","q":"Are the transport facilities to your home very good?","answer":"Yes, they're really convenient. There's a subway station just five minutes away on foot, and several bus routes stop right outside. Getting anywhere in the city is quick and hassle-free, which I'm very grateful for.\n\n**关键词 / 高分表达:** on foot（步行）; bus routes（公交线路）; hassle-free（省心的、无麻烦的）","kw":""},{"num":"Q10","q":"What do you usually do in your house/flat/room?","answer":"Mostly I relax and unwind after work. I'll cook a simple dinner, watch a show, or read a book before bed. On weekends I sometimes invite friends over for a meal, which is always good fun.\n\n**关键词 / 高分表达:** unwind（放松）; invite friends over（邀请朋友来家里）; good fun（很有趣）","kw":""},{"num":"Q11","q":"Which room does your family spend most of the time in?","answer":"Definitely the living room. That's where we all end up in the evening — my parents watch the news while I scroll on my phone. Even though we're doing different things, it's nice just being in the same space together.\n\n**关键词 / 高分表达:** end up（最终待在）; watch the news（看新闻）; the same space（同一空间）","kw":""},{"num":"Q12","q":"Can you describe the place where you live?","answer":"Sure. I live in a modern flat in a quiet residential area, not far from the city centre. It's bright, comfortable and has all the amenities I need nearby. Overall, it's a really pleasant place to come home to.\n\n**关键词 / 高分表达:** residential area（居民区）; amenities（便利设施）; come home to（回到……的家）","kw":""},{"num":"Q13","q":"What's the difference between where you are living now and where you have lived in the past?","answer":"The biggest difference is the size and location. I used to live in a bigger house in a small town, but now I'm in a smaller flat right in the city. I traded space for convenience, and honestly, I don't regret it.\n\n**关键词 / 高分表达:** trade ... for（用……换取）; convenience（便利）; don't regret it（不后悔）","kw":""},{"num":"Q14","q":"Do you plan to live there for a long time?","answer":"For the next few years, yes. It's close to work and everything I need, so there's no reason to move soon. Further down the line, though, I might look for something bigger once my situation changes.\n\n**关键词 / 高分表达:** no reason to move（没理由搬走）; further down the line（往后、将来）; my situation changes（情况有变）","kw":""},{"num":"Q15","q":"How long have you lived there?","answer":"I've been living in this flat for about three years now. Time has flown by, honestly — it feels like I only just moved in. By now it truly feels like home.\n\n**关键词 / 高分表达:** time has flown by（时间飞逝）; just moved in（刚搬进来）; feels like home（有家的感觉）","kw":""},{"num":"Q16","q":"Who do you live with?","answer":"At the moment I share the flat with one of my closest friends. We split the rent and the chores, which makes life a lot easier. We get along really well, so it never feels crowded.\n\n**关键词 / 高分表达:** split the rent（分摊房租）; chores（家务）; get along well（相处融洽）","kw":""},{"num":"Q17","q":"What kind of housing/accommodation do you live in?","answer":"I live in a rented two-bedroom flat in a fairly new building. It comes furnished and has good facilities like a gym downstairs. For a young person like me, it's the perfect kind of accommodation.\n\n**关键词 / 高分表达:** rented（租来的）; come furnished（带家具的）; facilities（设施）","kw":""}]},{"title":"Old buildings","qs":[{"num":"Q1","q":"Are there any old buildings you want to see in the future? why?","answer":"Yes, I'd love to visit the old temples in Kyoto one day. I've seen so many photos of the wooden architecture surrounded by autumn leaves, and it just looks magical. I think being there in person would give me a real sense of the history behind them.\n\n**关键词 / 高分表达:** in person（亲身、当面）；a sense of history（历史感）；magical（如梦似幻的）","kw":""},{"num":"Q2","q":"Do you prefer living in an old building or a modern house?","answer":"To be honest, I'd go for a modern house. Old buildings have a lot of charm, but they often have problems like poor heating or leaky pipes. A modern place is just more practical and comfortable for everyday life, which matters more to me.\n\n**关键词 / 高分表达:** go for（选择）；charm（韵味、魅力）；leaky pipes（漏水的管道）","kw":""},{"num":"Q3","q":"Do you think we should preserve old buildings in cities?","answer":"Absolutely, I think it's really important. Old buildings tell the story of a city and give it a unique character that new glass towers just can't match. For example, in my hometown there's an old street from decades ago, and it's become a lovely spot that both locals and tourists really treasure.\n\n**关键词 / 高分表达:** unique character（独特气质）；tell the story of（讲述……的故事）；treasure（珍视）","kw":""},{"num":"Q4","q":"Have you ever seen old buildings in the city?","answer":"Yes, quite a few actually. There's a beautiful old church near the city centre that must be over a hundred years old. I walk past it almost every day, and I still stop to admire the stone carvings on the front. It really stands out among all the modern shops around it.\n\n**关键词 / 高分表达:** walk past（路过）；stone carvings（石雕）；stands out（显眼、突出）","kw":""}]},{"title":"Parks","qs":[{"num":"Q1","q":"Are there any parks you want to go to in the future?","answer":"Yes, I've always wanted to visit Central Park in New York. I've seen it in so many films that it almost feels familiar already. I'd love to just wander around, rent a bike, and watch the city life go by on a sunny afternoon.\n\n**关键词 / 高分表达:** wander around（随意逛逛）；city life go by（看着城市生活流转）；it almost feels familiar（感觉几乎很熟悉）","kw":""},{"num":"Q2","q":"Would you like to see more parks in your city?","answer":"Definitely, I think we could always use more green space. My city is quite crowded and there aren't many places to just sit and breathe. More parks would give people a chance to relax, exercise, and get away from the noise of traffic for a while.\n\n**关键词 / 高分表达:** green space（绿地）；get away from the noise（远离喧嚣）；we could always use more（多多益善）","kw":""},{"num":"Q3","q":"Do you still like going to parks now?","answer":"Yes, more than ever actually. With how busy work gets, a walk in the park is my favourite way to clear my head. There's a small one near my flat, and I often go there in the early evening to stretch my legs and enjoy the fresh air.\n\n**关键词 / 高分表达:** clear my head（理清思绪、放松头脑）；stretch my legs（活动活动腿脚）；more than ever（比以往任何时候都更）","kw":""},{"num":"Q4","q":"Did you like going to parks as a child?","answer":"Oh, I absolutely loved it. My grandparents used to take me to the park every weekend, and I'd spend hours on the swings and running around with other kids. Those trips were the highlight of my week, and I still have really warm memories of them.\n\n**关键词 / 高分表达:** the swings（秋千）；the highlight of my week（一周中最开心的时刻）；warm memories（温馨的回忆）","kw":""}]},{"title":"the city  you live in","qs":[{"num":"Q1","q":"What city do you live in?","answer":"I currently live in Hangzhou, a city in the east of China. It's famous for the beautiful West Lake and its long history. I've been here for a few years now, and I've really grown to love the pace of life here.\n\n**关键词 / 高分表达:** in the east of（在……东部）；grown to love（渐渐喜欢上）；the pace of life（生活节奏）","kw":""},{"num":"Q2","q":"What's the weather like where you live?","answer":"Well, we get all four seasons quite clearly here. Summers can be really hot and humid, which I find a bit hard to bear, but autumn is absolutely gorgeous with cool, crisp air. Winters are chilly but rarely snowy, so overall the climate is fairly comfortable.\n\n**关键词 / 高分表达:** hot and humid（湿热）；hard to bear（难以忍受）；crisp air（清爽的空气）","kw":""},{"num":"Q3","q":"Are there people of different ages living in this city?","answer":"Yes, definitely, it's a real mix. There are lots of young people who move here for work and study, but you also see plenty of families and retired folks. In my own neighbourhood, for example, you'll see students, working parents, and grandparents all living side by side.\n\n**关键词 / 高分表达:** a real mix（各色人群混杂）；retired folks（退休人士）；side by side（并肩、共处）","kw":""},{"num":"Q4","q":"Is this city your permanent residence?","answer":"Not officially, no. My hometown is actually a smaller place a few hours away, so this is more where I've settled for work. That said, I've been here long enough that it genuinely feels like home now, and I could see myself staying for the long run.\n\n**关键词 / 高分表达:** settled for work（因工作而定居）；feels like home（有了家的感觉）；for the long run（长期地）","kw":""},{"num":"Q5","q":"Are there big changes in this city?","answer":"Oh, huge changes, honestly. In just the past few years, several new metro lines have opened up, which has made getting around so much easier. There are also loads of new shopping centres and parks, and sometimes I barely recognise areas I used to know well.\n\n**关键词 / 高分表达:** metro lines（地铁线路）；getting around（出行）；barely recognise（几乎认不出）","kw":""},{"num":"Q6","q":"How long have you lived in this city?","answer":"I've been living here for about five years now. I moved here right after I finished my studies, mainly for a job opportunity. Time has really flown by, and looking back, it's been long enough for me to build a proper life and a good group of friends here.\n\n**关键词 / 高分表达:** flown by（时间飞逝）；a job opportunity（工作机会）；build a proper life（建立起真正的生活）","kw":""},{"num":"Q7","q":"Do you like this city? Why?","answer":"Yes, I really do. What I love most is how it balances modern convenience with natural beauty, so you can shop in a busy mall and then relax by the lake within minutes. The transport is great and there's always something to do, which suits my lifestyle perfectly.\n\n**关键词 / 高分表达:** balances ... with（在……之间取得平衡）；modern convenience（现代便利）；suits my lifestyle（适合我的生活方式）","kw":""},{"num":"Q8","q":"Do you often see your neighbors？","answer":"Not that often, to be honest. People here tend to keep to themselves, and everyone's busy with their own routines. I do bump into the couple next door in the lift now and then, and we'll exchange a friendly hello, but that's usually as far as it goes.\n\n**关键词 / 高分表达:** keep to themselves（各过各的）；bump into（偶遇）；as far as it goes（也就到此为止）","kw":""},{"num":"Q9","q":"Are the people friendly in the city？","answer":"On the whole, yes, I'd say people here are pretty warm. Whenever I've asked for directions or needed help carrying something heavy, someone has always been happy to lend a hand. Of course, in a big city everyone's in a rush, but underneath that people are genuinely kind.\n\n**关键词 / 高分表达:** on the whole（总体上）；lend a hand（帮忙）；in a rush（匆忙）","kw":""},{"num":"Q10","q":"Is the city friendly to children and old people?","answer":"Yes, I think it does a decent job of that. There are plenty of parks with playgrounds for kids, and most buses and metro stations have lifts and seats reserved for the elderly. My grandmother visited last year and found it surprisingly easy to get around.\n\n**关键词 / 高分表达:** does a decent job（做得不错）；reserved for the elderly（为老人预留）；get around（四处走动）","kw":""}]},{"title":"buildings","qs":[{"num":"Q1","q":"ls there a building that you would like to visit?","answer":"Oh, definitely the Burj Khalifa in Dubai. I've seen so many photos of it online, and the idea of standing on the world's tallest building really excites me. I imagine the view from the top must be absolutely breathtaking, especially at sunset. Hopefully I'll get the chance to travel there someday.\n\n**关键词 / 高分表达:** the world's tallest building（世界最高建筑）；breathtaking（令人叹为观止的）；get the chance（有机会）","kw":""},{"num":"Q2","q":"Do you take photos of buildings?","answer":"Yeah, quite often actually, especially when I'm travelling somewhere new. I'm really drawn to old architecture, so I love capturing churches and traditional houses with my phone. Last summer in Xi'an, I took loads of shots of the ancient city wall. Looking back at those photos always brings the trip right back to me.\n\n**关键词 / 高分表达:** be drawn to（被...吸引）；capture（拍下）；bring the trip back（唤起旅行的回忆）","kw":""},{"num":"Q3","q":"Are there tall buildings near your home?","answer":"Yes, there are quite a few. I live in a fairly modern part of the city, so I'm surrounded by high-rise apartment blocks and a couple of office towers. From my window I can actually see the tallest one lit up at night, which looks pretty nice. It sometimes feels crowded, but I've grown to like the busy atmosphere.\n\n**关键词 / 高分表达:** high-rise apartment blocks（高层公寓楼）；lit up（灯火通明）；busy atmosphere（热闹的氛围）","kw":""}]},{"title":"Views","qs":[{"num":"Q1","q":"Do you prefer views in your own country or in other countries","answer":"Well, I'd say I actually prefer the views in my own country, mainly because there's so much variety here, from mountains to rivers to old towns. Last year I visited Guilin and the scenery there honestly took my breath away. Of course foreign views are exciting too, but there's something familiar and comforting about the landscapes at home.\n\n**关键词 / 高分表达:** took my breath away (令人惊叹); so much variety (种类丰富); familiar and comforting (熟悉又亲切)","kw":""},{"num":"Q2","q":"Do you prefer views in urban areas or rural areas?","answer":"To be honest, I lean towards rural views because they feel so peaceful and open. Whenever I visit the countryside, I love seeing the green fields and the wide sky without any tall buildings blocking the way. City views can be impressive at night with all the lights, but the calm of the countryside really helps me relax.\n\n**关键词 / 高分表达:** lean towards (偏向于); green fields (绿色的田野); blocking the way (挡住视线)","kw":""},{"num":"Q3","q":"Do you like taking pictures of different views","answer":"Yeah, I really enjoy it, and my phone is basically full of scenery photos. Whenever I travel somewhere new, I can't help snapping pictures of sunsets or beautiful streets. It's a nice way to hold on to those moments, and I love looking back at them later to remember how I felt.\n\n**关键词 / 高分表达:** can't help snapping pictures (忍不住拍照); hold on to those moments (留住那些瞬间); look back at them (回顾)","kw":""}]},{"title":"Public places","qs":[{"num":"Q1","q":"Do you often go to public places near where you live?","answer":"Yeah, quite often actually. There's a nice park just a few minutes' walk from my flat, and I usually go there in the evenings to relax. On weekends I also visit the shopping mall nearby to grab a coffee or meet friends. These places are so convenient that they've become part of my routine.\n\n**关键词 / 高分表达:** a few minutes' walk (步行几分钟); grab a coffee (喝杯咖啡); part of my routine (日常的一部分)","kw":""},{"num":"Q2","q":"Would you like to see more public places near where you live?","answer":"Definitely, I'd love that. In particular, I wish there were more green spaces and maybe a public library close by. Right now the area feels a little crowded, so having more open places would really improve the quality of life. It would give people more room to breathe and relax.\n\n**关键词 / 高分表达:** green spaces (绿地); quality of life (生活质量); room to breathe (喘息的空间)","kw":""},{"num":"Q3","q":"Do you wear headphones in public places?","answer":"Yeah, pretty much all the time, especially on the bus or the subway. I like listening to music or podcasts because it helps me block out the noise and just be in my own little world. That said, I always keep the volume down enough to stay aware of what's happening around me.\n\n**关键词 / 高分表达:** block out the noise (隔绝噪音); in my own little world (沉浸在自己的世界); keep the volume down (把音量调低)","kw":""},{"num":"Q4","q":"Have you ever talked with someone you don’t know in public places?","answer":"Yeah, it's happened a few times. Once I was waiting in a long queue at a café and started chatting with the girl next to me about the menu. It was just a short, friendly conversation, but it made the wait feel much shorter. I'm usually a bit shy, so those small moments are actually quite nice.\n\n**关键词 / 高分表达:** in a long queue (排长队); friendly conversation (友好的交谈); made the wait feel shorter (让等待感觉更短)","kw":""}]},{"title":"Crowded place","qs":[{"num":"Q1","q":"Is the city where you live crowded?","answer":"Yeah, quite crowded, to be honest, especially during rush hour. I live in a big city, so the streets and subway can get packed with people trying to get to work. It's most noticeable in the morning, when I can barely find space to stand on the train. You kind of get used to it, though.\n\n**关键词 / 高分表达:** rush hour (高峰期); packed with people (挤满了人); get used to it (习惯了)","kw":""},{"num":"Q2","q":"Is there a crowded place near where you live?","answer":"Yeah, there's a huge shopping mall just around the corner, and it's always buzzing with people, particularly on weekends. Because it has cinemas, restaurants and lots of shops, everyone seems to gather there. Sometimes it's so busy that you have to queue just to get a table for lunch.\n\n**关键词 / 高分表达:** around the corner (在附近); buzzing with people (人声鼎沸); gather there (聚集在那里)","kw":""},{"num":"Q3","q":"Do most people like crowded places?","answer":"Hmm, I think it really varies from person to person. Some people love the lively, energetic feeling of a crowd, like at a concert or a festival. Others, though, find crowds stressful and prefer somewhere quiet. Personally, I think most people can enjoy it in small doses but wouldn't want it all the time.\n\n**关键词 / 高分表达:** varies from person to person (因人而异); lively and energetic (热闹有活力); in small doses (适量地)","kw":""},{"num":"Q4","q":"Do you like crowded places?","answer":"Honestly, not really, I tend to avoid them when I can. Being in a big crowd makes me feel a bit overwhelmed and tired quite quickly. I much prefer quieter places where I can actually hear myself think. That said, I don't mind a crowd now and then if it's for something fun like a festival.\n\n**关键词 / 高分表达:** overwhelmed (不知所措); hear myself think (静下心来); now and then (偶尔)","kw":""},{"num":"Q5","q":"When was the last time you were in a crowded place?","answer":"The last time was probably last weekend, when I went to a night market with a few friends. The place was absolutely packed, and we could barely move without bumping into someone. Still, the food and the lively atmosphere made it totally worth it, so I actually had a great time.\n\n**关键词 / 高分表达:** absolutely packed (人山人海); bumping into someone (撞到别人); worth it (值得)","kw":""}]}],"qn":73},{"key":"00-other","emoji":"🗂️","cn":"其他","en":"Other","topics":[{"title":"History","qs":[{"num":"Q1","q":"When was the last time you read about history?","answer":"Actually, it was just a couple of weeks ago. I came across a short article about the old Silk Road while scrolling through my phone at night, and it really caught my attention. I ended up reading for almost an hour, which is pretty rare for me these days.\n\n**关键词 / 高分表达:** came across (偶然看到)；caught my attention (吸引了我的注意)；ended up doing (最后做了……)","kw":""},{"num":"Q2","q":"Have you ever been to history museums?","answer":"Yes, I've been to a few over the years. The one that really stands out was the provincial museum in my hometown, which I visited with my classmates on a school trip. Seeing those ancient bronze pieces up close made history feel so much more real than reading about it in a textbook.\n\n**关键词 / 高分表达:** stands out (令人印象深刻)；up close (近距离地)；feel so much more real (感觉更加真实)","kw":""},{"num":"Q3","q":"Did you like history when you were young?","answer":"Not really, to be honest. When I was in primary school, I found it pretty boring because we mostly had to memorize dates and names for exams. It was only later, when I started watching historical dramas, that I began to appreciate the stories behind those events.\n\n**关键词 / 高分表达:** memorize dates and names (死记日期和名字)；historical dramas (历史剧)；appreciate the stories behind (欣赏背后的故事)","kw":""},{"num":"Q4","q":"Do you like history?","answer":"Yes, these days I genuinely enjoy it. I think history is fascinating because it helps us understand why the world is the way it is now. For example, learning about how ancient cities were built makes me look at modern architecture in a completely different way.\n\n**关键词 / 高分表达:** genuinely enjoy (真心喜欢)；fascinating (引人入胜的)；look at ... in a different way (以不同的角度看待)","kw":""}]},{"title":"Tidiness","qs":[{"num":"Q1","q":"Did you use to keep your room tidy as a child？","answer":"Honestly, not at all when I was little. My room was usually a complete mess, with toys and books scattered all over the floor. My mum was always nagging me to clean up, but back then I just didn't really care about it.\n\n**关键词 / 高分表达:** a complete mess (一团糟)；scattered all over (散落一地)；nag me to (唠叨着让我……)","kw":""},{"num":"Q2","q":"Do you like to keep things tidy？","answer":"Yes, I've changed a lot as I've grown up, and now I really like keeping things in order. I find that a tidy desk helps me concentrate much better when I'm working or studying. For instance, I always spend a few minutes clearing everything up before I start, and it just puts my mind at ease.\n\n**关键词 / 高分表达:** keep things in order (井井有条)；concentrate better (更专心)；put my mind at ease (让我心里踏实)","kw":""}]},{"title":"Museum","qs":[{"num":"Q1","q":"When was the last time you visited a museum?","answer":"Let me think... it was probably about three months ago. I went to a local history museum with a couple of friends on a rainy weekend, mainly because we wanted something to do indoors. It turned out to be surprisingly fascinating, and we ended up staying there for the whole afternoon.\n\n**关键词 / 高分表达:** something to do indoors（室内活动）; turn out to be（结果是）; fascinating（引人入胜的）","kw":""},{"num":"Q2","q":"Do you often visit museums?","answer":"Not as often as I'd like, to be honest. Life gets busy and museums aren't usually the first thing that comes to mind on a day off. That said, whenever I travel to a new city, I make a point of visiting at least one, because it's a great way to understand the local culture.\n\n**关键词 / 高分表达:** comes to mind（想到）; make a point of（特意去做）; local culture（当地文化）","kw":""},{"num":"Q3","q":"Do you think museums are important?","answer":"Absolutely, I think they play a really vital role. Museums preserve our history and heritage, so future generations can actually see and learn from the past rather than just reading about it. On top of that, they're a wonderful educational resource, especially for kids, making learning come alive.\n\n**关键词 / 高分表达:** vital role（重要作用）; preserve heritage（保护遗产）; make learning come alive（让学习变得生动）","kw":""},{"num":"Q4","q":"Are there any museums in your hometown?","answer":"Yes, there are a few. The most well-known one is a museum dedicated to the city's history, which houses some really old artefacts and photographs. I actually went there on a school trip when I was young, and I still remember being amazed by the ancient pottery on display.\n\n**关键词 / 高分表达:** dedicated to（专门为…而设的）; artefacts（文物）; on display（展出）","kw":""}]}],"qn":10}];
var GUIDE="<h1>雅思口语指南（新手版）</h1>\n<blockquote>写给刚开始准备雅思口语的你。先讲清楚\"考什么、怎么打分\"，再按 Part 1 / 2 / 3 三个部分讲要点和套路。 口语提分的本质不是\"背答案\"，而是<strong>把会的话说顺、把想法展开、让考官听得舒服</strong>。</blockquote>\n<hr>\n<h2>〇、先搞懂游戏规则（30 秒看完）</h2>\n<p>雅思口语是一场 <strong>11–14 分钟的一对一面对面对话</strong>，全程录音，分三个部分：</p>\n<table><thead><tr><th>部分</th><th>形式</th><th>时长</th><th>考什么</th></tr></thead><tbody><tr><td><strong>Part 1</strong></td><td>考官问，你答（日常话题）</td><td>4–5 分钟</td><td>能不能自然聊日常</td></tr><tr><td><strong>Part 2</strong></td><td>给一张题卡，独白</td><td>1 分钟准备 + 2 分钟说</td><td>能不能连续独立表达</td></tr><tr><td><strong>Part 3</strong></td><td>就 Part 2 话题深入讨论</td><td>4–5 分钟</td><td>能不能说观点、讲道理</td></tr></tbody></table>\n<h3>四个评分维度（每个占 25%）</h3>\n<p>考官心里有四把尺，<strong>一定要知道自己被怎么打分</strong>：</p>\n<ol><li><strong>流利度与连贯 (Fluency &amp; Coherence)</strong> —— 说得顺不顺、有没有逻辑、卡不卡壳</li><li><strong>词汇 (Lexical Resource)</strong> —— 词用得准不准、有没有同义替换、会不会地道搭配</li><li><strong>语法 (Grammatical Range)</strong> —— 句子结构丰富不丰富、错误多不多</li><li><strong>发音 (Pronunciation)</strong> —— 清不清楚、有没有语调节奏</li></ol>\n<blockquote>🔑 <strong>新手最该先抓的是\"流利度\"</strong>。宁可用简单词把话说顺、说完整，也不要憋大词憋到卡住。考官打分看的是<strong>整体印象</strong>，不是单个难词。</blockquote>\n<hr>\n<h2>一、Part 1：日常对话（把\"简单问题\"答得饱满）</h2>\n<h3>它在考什么</h3>\n<p>Part 1 都是最生活化的问题：家乡、工作/学习、爱好、天气、食物、手机……问题不难，<strong>难的是别答得太短</strong>。</p>\n<h3>❌ 新手最大的坑：答得太短</h3>\n<blockquote>Q: Do you like your hometown? ❌ \"Yes, I like it.\"（3 个词就没了，考官很尴尬）</blockquote>\n<h3>✅ 万能套路：<strong>观点 + 原因 + 例子/延伸</strong>（PRE 法则）</h3>\n<ul><li><strong>P</strong>oint（先给态度）→ <strong>R</strong>eason（为什么）→ <strong>E</strong>xample/Extend（举例或延伸）</li></ul>\n<blockquote>Q: Do you like your hometown? ✅ \"Yeah, I really do. <strong>(观点)</strong> It's a small city but very relaxing, and people there are super friendly. <strong>(原因)</strong> For example, my neighbours always say hi and sometimes bring us home-cooked food. <strong>(例子)</strong> I think that kind of warmth is hard to find in big cities.\"</blockquote>\n<p>一句话变四句话，流利度和词汇立刻就上来了。</p>\n<h3>实用小套路</h3>\n<ul><li><strong>每题目标 2–4 句</strong>，不用更多（Part 1 不是越长越好，别把 Part 2 的量塞进来）。</li><li><strong>善用连接词起头</strong>：<code>Well, / Actually, / To be honest, / I'd say...</code> —— 给自己 1 秒思考时间，还显得自然。</li><li><strong>能具体就别抽象</strong>：说 \"I like music\" 不如说 \"I'm really into pop music, especially Taylor Swift\"。具体 = 高级。</li><li><strong>not really 也很好</strong>：不喜欢就说 \"Not really, to be honest...\"，真实观点比硬编好答。</li></ul>\n<h3>高频话题（提前准备好素材）</h3>\n<p>家乡 · 工作或学习 · 住的地方 · 爱好 · 天气/季节 · 食物 · 手机/社交媒体 · 音乐 · 运动 · 睡眠作息。</p>\n<blockquote>👉 你目录里的 <code>ielts-part1/</code> 就是当季全部 60 个话题，挨个练一遍。</blockquote>\n<hr>\n<h2>二、Part 2：独白（照着题卡结构说满 2 分钟）</h2>\n<h3>它在考什么</h3>\n<p>给你一张题卡（cue card），比如 *\"Describe a place you like to visit\"*，下面有 3–4 个提示点。<strong>1 分钟准备，2 分钟一个人说</strong>，中途考官不打断。</p>\n<h3>核心心态</h3>\n<blockquote><strong>说满 2 分钟 &gt; 说得完美</strong>。考官更怕你说 40 秒就没话了。允许有小错误，只要一直在说、有逻辑。</blockquote>\n<h3>✅ 万能结构：题卡提示点 = 你的段落大纲</h3>\n<p>题卡的每个 bullet 就是一段。再加<strong>开头</strong>和<strong>结尾</strong>，天然就是一篇小短文：</p>\n<p>``<code> 开头：What I'm going to talk about is...   （点题，1 句） 主体：顺着题卡 3 个提示点，每个展开 2–3 句 结尾：So that's why this ... means a lot to me.  （收尾，1 句） </code>``</p>\n<h3>1 分钟准备时间怎么用（关键！）</h3>\n<ul><li><strong>别写句子，只写关键词</strong>（几个名词/动词就够，抬头就能说）。</li><li>按题卡提示点，每点记 1–2 个词 + 1 个具体细节（时间、地点、人、感受）。</li><li>想不出真事？<strong>可以编</strong>。雅思考的是英语，不是查你户口，编一个说得顺的比讲一个卡壳的真事强。</li></ul>\n<h3>让独白\"有血有肉\"的套路</h3>\n<ul><li><strong>加时间地点</strong>：<code>Last summer, / A couple of years ago, / It was in a small town near...</code></li><li><strong>加感受</strong>：<code>I was really excited / a bit nervous / totally amazed...</code></li><li><strong>加对比</strong>：<code>Unlike other places I've been to, this one...</code></li><li><strong>拖时间神器</strong>：说完主体如果还有时间，加一句 <code>The reason I chose to talk about this is...</code> 顺势延伸。</li></ul>\n<h3>❌ 避坑</h3>\n<ul><li>别背模板范文——考官一天听几十个，一听就知道，会追问把你问穿。</li><li>说错了别停下来纠结、别道歉，<strong>直接往下说</strong>，流畅度比一处错误重要得多。</li><li>别盯着题卡念，抬头看考官，像在讲故事。</li></ul>\n<hr>\n<h2>三、Part 3：深入讨论（从\"聊自己\"升级到\"讲道理\"）</h2>\n<h3>它在考什么</h3>\n<p>Part 3 顺着 Part 2 的话题往深里问，问的是<strong>观点、比较、趋势、原因</strong>，比如：</p>\n<blockquote>\"Do you think technology has changed the way people travel?\"</blockquote>\n<p>这里不再问\"你\"，而是问\"<strong>人们/社会/未来</strong>\"。这是全场<strong>最能拉开分数</strong>的部分，也是高分的分水岭。</p>\n<h3>✅ 万能套路一：观点展开公式</h3>\n<p><strong>表态 → 讲理由 → 举例/让步 → 收回观点</strong></p>\n<blockquote>\"I'd say <strong>yes, definitely</strong>. <strong>(表态)</strong> Thanks to apps and online maps, people can plan trips on their own now. <strong>(理由)</strong> For instance, my parents used to rely on travel agencies, but now they book everything on their phones. <strong>(例子)</strong> Of course, some older people still find it tricky, <strong>(让步)</strong> but overall technology has made travelling much easier. <strong>(收回)</strong>\"</blockquote>\n<h3>✅ 万能套路二：应对\"难问题\"的缓冲句</h3>\n<p>被问懵了？先用一句\"过渡句\"争取思考时间，别沉默：</p>\n<ul><li><code>That's an interesting question, let me think for a second...</code></li><li><code>Well, I've never really thought about it, but I guess...</code></li><li><code>It's hard to say, but if I had to choose...</code></li></ul>\n<blockquote>🔑 <strong>沉默是流利度的头号杀手</strong>。宁可先说一句\"废话\"过渡，也别空 3 秒。</blockquote>\n<h3>✅ 万能套路三：让观点\"高级\"的表达工具</h3>\n<table><thead><tr><th>功能</th><th>好用的句式</th></tr></thead><tbody><tr><td>表达观点</td><td><code>In my opinion, / From my perspective, / I'd argue that...</code></td></tr><tr><td>举例</td><td><code>For instance, / A good example would be...</code></td></tr><tr><td>比较</td><td><code>Compared to the past, / Whereas some people..., others...</code></td></tr><tr><td>让步</td><td><code>Admittedly, / That said, / While it's true that...</code></td></tr><tr><td>推测</td><td><code>It's likely that, / There's a good chance that...</code></td></tr><tr><td>谈趋势</td><td><code>More and more people are..., / There's a growing tendency to...</code></td></tr></tbody></table>\n<h3>Part 3 心法</h3>\n<ul><li><strong>可以没有\"正确答案\"</strong>，考官不在乎你观点对错，只看你能不能<strong>自圆其说</strong>。</li><li><strong>敢展开、敢举例、敢让步</strong>（先肯定对方一点再说自己的），显得思维成熟。</li><li><strong>两面说</strong>比一面倒更容易上分：<code>On one hand... on the other hand...</code></li></ul>\n<hr>\n<h2>四、贯穿全场的 7 条黄金原则</h2>\n<ol><li><strong>流利 &gt; 完美</strong>：说顺是第一位，错误可以有，卡壳最致命。</li><li><strong>展开 &gt; 简短</strong>：任何问题都用\"观点+原因+例子\"垫三句。</li><li><strong>具体 &gt; 抽象</strong>：给细节（人名、地名、时间、数字、感受）。</li><li><strong>自然 &gt; 华丽</strong>：地道的简单词（<code>hang out / a big deal / pretty much</code>）比生硬的大词更得分。</li><li><strong>同义替换</strong>：一个词别重复用，<code>good → great / amazing / decent / solid</code>。</li><li><strong>语调有起伏</strong>：重点词加重、句尾该升就升，别像念课文。</li><li><strong>微笑 + 眼神交流</strong>：这是对话，不是背诵；态度放松，考官印象分更高。</li></ol>\n<hr>\n<h2>五、新手 4 周练习计划（可执行）</h2>\n<table><thead><tr><th>周次</th><th>目标</th><th>每天做什么</th></tr></thead><tbody><tr><td><strong>第 1 周</strong></td><td>破除\"张不开嘴\"</td><td>每天用 PRE 法则答 5 个 Part 1 问题，录音回听</td></tr><tr><td><strong>第 2 周</strong></td><td>攻克 Part 2 独白</td><td>每天抽 1 张题卡，1 分钟准备 + 说满 2 分钟，录音</td></tr><tr><td><strong>第 3 周</strong></td><td>打开 Part 3 思路</td><td>每天就 1 个话题练\"表态+理由+例子+让步\"</td></tr><tr><td><strong>第 4 周</strong></td><td>全流程模拟</td><td>每天完整走一遍 Part 1+2+3，找老师/搭子对练</td></tr></tbody></table>\n<h3>练习铁律</h3>\n<ul><li><strong>一定要录音回听</strong>：你以为的流利和实际差很多，录音是最诚实的镜子。</li><li><strong>计时</strong>：Part 2 严格 2 分钟，培养时间感。</li><li><strong>建\"个人素材库</strong>：把家人、工作、家乡、一次旅行、一个朋友这几个\"万能素材\"准备透，很多题都能往上套。</li></ul>\n<hr>\n<h2>六、给新手的三句大实话</h2>\n<ol><li><strong>雅思口语考的不是英语好，是\"能聊天\"</strong>——把它当和朋友唠嗑，别当考试背书。</li><li><strong>前期提分最快的是\"敢说 + 说满\"</strong>，不是背大词、抠语法。</li><li><strong>和真人对练无可替代</strong>——你已经有 60 个 Part 1 话题了，找老师用它们练起来，这份指南才真正发挥作用。</li></ol>\n<p>祝你考出理想分数！🎯</p>";
var esc=function(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');};
var home=document.getElementById('home'),section=document.getElementById('section'),guide=document.getElementById('guide');
var backBtn=document.getElementById('backBtn'),hTitle=document.getElementById('hTitle'),hSub=document.getElementById('hSub');

function renderHome(){
  var h='<div class="cardlink guide" data-guide="1"><span class="em">📖</span>'+
    '<span><span class="t">新手必读 · 雅思口语指南</span><br><span class="d">Part 1/2/3 要点与套路 · 4 周练习计划</span></span>'+
    '<span class="go">→</span></div>';
  h+='<div class="note">💡 建议先读「新手指南」，再进各板块练题：点话题看它的所有问题 → 点问题看参考答案。</div>';
  DATA.forEach(function(c,i){
    h+='<div class="cardlink" data-cat="'+i+'"><span class="em">'+c.emoji+'</span>'+
       '<span><span class="t">'+c.cn+' '+c.en+'</span><br><span class="d">'+c.topics.length+' 个话题 · '+c.qn+' 个问题</span></span>'+
       '<span class="go">→</span></div>';
  });
  home.innerHTML=h;
}
function showView(which){
  home.classList.toggle('hidden',which!=='home');
  section.classList.toggle('hidden',which!=='section');
  guide.classList.toggle('hidden',which!=='guide');
  backBtn.style.display=which==='home'?'none':'inline-block';
  window.scrollTo(0,0);
}
function renderSection(i){
  var c=DATA[i],h='';
  c.topics.forEach(function(t,ti){
    h+='<div class="topic" data-t="'+ti+'"><button class="t-head"><span>'+esc(t.title)+'</span>'+
       '<span class="badge">'+t.qs.length+' 题</span><span class="arrow">›</span></button><div class="t-body">';
    t.qs.forEach(function(q){
      var kw=q.kw?'<div class="kw"><b>关键词 / 高分表达：</b>'+esc(q.kw)+'</div>':'';
      h+='<div class="q"><button class="q-btn"><span class="qn">'+esc(q.num)+'</span><span>'+esc(q.q)+
         '</span><span class="arrow">›</span></button><div class="q-body"><div class="q-inner">'+
         '<div class="answer">'+esc(q.answer)+'</div>'+kw+'</div></div></div>';
    });
    h+='</div></div>';
  });
  section.innerHTML=h;
  hTitle.textContent=c.emoji+' '+c.cn+' '+c.en;
  hSub.textContent=c.topics.length+' 个话题 · '+c.qn+' 个问题 · 点击话题展开问题';
  showView('section');
}
function renderGuide(){
  guide.innerHTML='<div class="guide-view">'+GUIDE+'</div>';
  hTitle.textContent='📖 雅思口语指南';
  hSub.textContent='新手必读 · Part 1/2/3 要点与套路';
  showView('guide');
}
function goHome(){
  hTitle.textContent='🎯 IELTS 雅思口语 Part 1';
  hSub.textContent='当季 60 个话题 · 318 个问题 · 新手指南 + 逐层展开答案';
  showView('home');
}
home.addEventListener('click',function(e){
  if(e.target.closest('.cardlink.guide')){ renderGuide(); return; }
  var card=e.target.closest('.cardlink'); if(card) renderSection(+card.dataset.cat);
});
section.addEventListener('click',function(e){
  var qb=e.target.closest('.q-btn'); if(qb){ qb.parentElement.classList.toggle('open'); return; }
  var th=e.target.closest('.t-head'); if(th){ th.parentElement.classList.toggle('open'); }
});
backBtn.addEventListener('click',goHome);
renderHome();
</script>
</body></html>
