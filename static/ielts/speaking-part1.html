<style>
:root{--bg:#f4f6fb;--card:#fff;--ink:#1f2430;--sub:#5b6472;--brand:#3b6ef5;--brand2:#6a8dff;--line:#e6eaf2;--ans:#f0f5ff;--kw:#8a5a00;--kwbg:#fff6e0}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--ink);line-height:1.65}
.wrap{max-width:820px;margin:0 auto;padding:0 18px 80px}
header.top{background:linear-gradient(135deg,var(--brand),var(--brand2));color:#fff;padding:30px 18px;border-radius:0 0 22px 22px;box-shadow:0 8px 24px rgba(59,110,245,.25);margin-bottom:8px}
header.top .inner{max-width:820px;margin:0 auto}
h1{margin:0 0 6px;font-size:24px}
.subtitle{opacity:.92;font-size:14px}
.back{display:none;background:rgba(255,255,255,.18);border:none;color:#fff;padding:7px 16px;border-radius:999px;font-size:14px;cursor:pointer;margin-bottom:14px}
.back:hover{background:rgba(255,255,255,.3)}
.cardlink{display:flex;align-items:center;gap:14px;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px 20px;margin:14px 0;cursor:pointer;box-shadow:0 2px 10px rgba(30,40,80,.04);transition:.15s}
.cardlink:hover{border-color:var(--brand);transform:translateY(-2px);box-shadow:0 8px 20px rgba(59,110,245,.12)}
.cardlink.guide{background:linear-gradient(135deg,#fff6e0,#ffedd0);border-color:#ffdca0}
.cardlink .em{font-size:30px}
.cardlink .t{font-size:18px;font-weight:600}
.cardlink .d{font-size:13px;color:var(--sub)}
.cardlink .go{margin-left:auto;color:var(--brand);font-size:22px}
.note{background:#fff8e6;border:1px solid #ffe4a3;border-radius:12px;padding:12px 16px;font-size:13px;color:#7a5b00;margin:16px 0}
.topic{background:var(--card);border:1px solid var(--line);border-radius:14px;margin:12px 0;overflow:hidden;box-shadow:0 2px 10px rgba(30,40,80,.04)}
.topic>.t-head{width:100%;text-align:left;background:#fbfcff;border:none;padding:15px 18px;font-size:17px;font-weight:600;color:var(--ink);cursor:pointer;display:flex;align-items:center;gap:10px}
.topic>.t-head:hover{background:#f3f6ff}
.topic>.t-head .badge{margin-left:auto;font-size:12px;font-weight:500;color:var(--sub);background:#eef2fb;padding:3px 10px;border-radius:999px}
.topic>.t-head .arrow{color:var(--sub);transition:transform .2s;font-size:18px}
.topic.open>.t-head .arrow{transform:rotate(90deg)}
.t-body{max-height:0;overflow:hidden;transition:max-height .35s ease}
.topic.open>.t-body{max-height:6000px}
.q{border-top:1px solid var(--line)}
.q-btn{width:100%;text-align:left;background:none;border:none;padding:13px 18px;font-size:15px;color:var(--ink);cursor:pointer;display:flex;gap:10px;align-items:flex-start}
.q-btn:hover{background:#f7f9ff}
.q-btn .qn{color:var(--brand);font-weight:700;flex:none}
.q-btn .arrow{margin-left:auto;flex:none;color:var(--sub);transition:transform .2s}
.q.open .q-btn .arrow{transform:rotate(90deg)}
.q-body{max-height:0;overflow:hidden;transition:max-height .3s ease}
.q.open .q-body{max-height:1400px}
.q-inner{padding:0 18px 16px 18px}
.answer{background:var(--ans);border-left:3px solid var(--brand);border-radius:8px;padding:12px 16px;font-size:15px;white-space:pre-wrap}
.kw{margin-top:10px;font-size:13px;color:var(--kw);background:var(--kwbg);border-radius:8px;padding:8px 12px}
.kw b{color:var(--kw)}
/* guide reading view */
.guide-view{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:8px 26px 30px;margin-top:14px;box-shadow:0 2px 10px rgba(30,40,80,.04)}
.guide-view h1{color:var(--ink);font-size:24px;margin-top:26px}
.guide-view h2{font-size:20px;border-bottom:2px solid var(--line);padding-bottom:6px;margin-top:30px}
.guide-view h3{font-size:17px;margin-top:22px}
.guide-view table{border-collapse:collapse;width:100%;margin:14px 0;font-size:14px}
.guide-view th,.guide-view td{border:1px solid var(--line);padding:8px 10px;text-align:left}
.guide-view th{background:#eef2fb}
.guide-view blockquote{background:var(--ans);border-left:4px solid var(--brand);margin:14px 0;padding:10px 16px;border-radius:6px;color:#33415c}
.guide-view code{background:#eef1f7;padding:2px 6px;border-radius:5px;font-size:.9em}
.guide-view hr{border:none;border-top:1px solid var(--line);margin:26px 0}
.guide-view ul,.guide-view ol{padding-left:22px}
.guide-view li{margin:4px 0}
footer{text-align:center;color:var(--sub);font-size:13px;margin-top:26px}
.hidden{display:none}
</style></head><body>

<script>
var DATA=[{"key":"01-people","emoji":"🧑","cn":"人物","en":"People","topics":[{"title":"Teachers","qs":[{"num":"Q1","q":"Do you have a favorite teacher?","answer":"Yes, my favourite has to be my high school English teacher, Mr. Li. He had this wonderful way of making even boring grammar feel fun and interesting. I always looked forward to his lessons, and honestly he's a big reason why I ended up loving English so much.\n\n**关键词 / 高分表达:** looked forward to（期待）；a big reason why（很大程度上因为）；ended up loving（最终爱上）","kw":""},{"num":"Q2","q":"In what way has your favourite teacher helped you?","answer":"Well, beyond just teaching the subject, he really helped build up my confidence. Whenever I got something wrong, instead of criticising me, he'd encourage me to try again. Thanks to that, I stopped being afraid of making mistakes, which honestly changed how I approach learning even now.\n\n**关键词 / 高分表达:** build up my confidence（增强信心）；afraid of making mistakes（害怕犯错）；how I approach learning（我的学习方式）","kw":""},{"num":"Q3","q":"Do you have a teacher from your past that you still remember?","answer":"Definitely, my primary school maths teacher still sticks in my mind. She was strict but incredibly patient, and she'd stay after class just to explain things I didn't understand. Even after all these years, I still remember her kindness and how much she believed in her students.\n\n**关键词 / 高分表达:** sticks in my mind（记忆深刻）；strict but patient（严格却有耐心）；believed in her students（相信学生）","kw":""},{"num":"Q4","q":"Are you still in touch with your primary school teachers?","answer":"Sadly, not really. We've lost contact over the years, mostly because I moved to a different city and we didn't have social media back then. I do sometimes wonder how they're doing, and if I ever bumped into one of them, I'd love to catch up.\n\n**关键词 / 高分表达:** lost contact（失去联系）；back then（那时候）；catch up（叙叙旧）","kw":""},{"num":"Q5","q":"Do you want to be a teacher in the future?","answer":"It's something I've thought about, actually. I really enjoy explaining things and seeing that moment when someone finally understands. But I'm not sure I'd have the patience to do it full-time, so for now it's more of a maybe than a firm plan.\n\n**关键词 / 高分表达:** thought about（考虑过）；that moment when someone understands（恍然大悟的那一刻）；a firm plan（明确的计划）","kw":""}]},{"title":"Life stages","qs":[{"num":"Q1","q":"At what age do you think people are the happiest?","answer":"I'd say probably around childhood, maybe six or seven years old. At that age you have no real worries, no bills to pay, and your only job is to play and have fun. I still remember how carefree my summers were back then. Adults carry so much responsibility, so I think kids genuinely have it easiest.\n\n**关键词 / 高分表达:** no real worries（没有真正的烦恼）；carefree（无忧无虑的）；carry responsibility（承担责任）","kw":""},{"num":"Q2","q":"Do you enjoy being the age you are now?","answer":"Yeah, on the whole I do. I'm in my late twenties now, and I feel like I've got a good balance between freedom and independence. I can make my own decisions but I'm still young enough to try new things. Of course there's pressure at work, but I wouldn't trade this stage for anything.\n\n**关键词 / 高分表达:** on the whole（总体上）；independence（独立）；wouldn't trade it for anything（不会拿它交换任何东西）","kw":""},{"num":"Q3","q":"How do people remember each stage of their lives?","answer":"I think most people rely on photos and videos these days to hold on to their memories. My parents' generation kept physical photo albums, whereas we just store everything on our phones. Apart from that, small objects like an old toy or a diary can also bring back a whole period of your life. Memories really are tied to little things.\n\n**关键词 / 高分表达:** hold on to memories（留住回忆）；photo album（相册）；bring back（唤起）","kw":""},{"num":"Q4","q":"Do you have any plans for the next five years?","answer":"Yes, I've got a few things in mind. Career-wise, I'm hoping to get promoted and maybe take on a team-leading role. On a personal level, I really want to travel more and finally visit Japan, which has been on my list for ages. I like having goals, even if they change along the way.\n\n**关键词 / 高分表达:** get promoted（升职）；take on a role（担任角色）；on my list for ages（想很久了）","kw":""},{"num":"Q5","q":"What do you think is the most important at the moment?","answer":"Right now, I'd say my health is my top priority. After sitting at a desk all day for years, I've realised I can't take my body for granted anymore. So I've started going to the gym a few times a week and eating a bit more sensibly. Without good health, everything else becomes harder to enjoy.\n\n**关键词 / 高分表达:** top priority（首要之事）；take for granted（视为理所当然）；eat sensibly（吃得健康）","kw":""},{"num":"Q6","q":"What did you often do with your friends in your childhood?","answer":"Oh, we used to spend hours playing outside, mostly hide-and-seek and riding our bikes around the neighbourhood. After school we'd all meet at a little square near my building until it got dark. I remember our parents constantly calling us in for dinner. Those simple afternoons were honestly some of my happiest times.\n\n**关键词 / 高分表达:** hide-and-seek（捉迷藏）；ride bikes（骑自行车）；call us in（叫我们回家）","kw":""}]}],"qn":11},{"key":"02-things","emoji":"📦","cn":"事物","en":"Things","topics":[{"title":"Work or study","qs":[{"num":"Q1","q":"What subject(s) are you studying?","answer":"I'm currently majoring in business administration at university. It covers a mix of things like marketing, management and a bit of finance, so it's fairly broad. I chose it because I'd like to run my own company one day.\n\n**关键词 / 高分表达:** major in（主修）; business administration（工商管理）; fairly broad（相当宽泛）","kw":""},{"num":"Q2","q":"What technology do you use when you study?","answer":"Mostly my laptop and a tablet, to be honest. I take notes on the tablet with a stylus, and I use apps like Notion to keep everything organised. I also rely on online lectures a lot when I need to review before exams.\n\n**关键词 / 高分表达:** stylus（触控笔）; keep everything organised（把一切整理得井井有条）; online lectures（网课）","kw":""},{"num":"Q3","q":"Who helps you the most？And how?","answer":"I'd say my older sister helps me the most. She graduated from the same field, so whenever I get stuck on an assignment, she explains it in a way I can actually understand. Having someone like that to turn to really takes the pressure off.\n\n**关键词 / 高分表达:** get stuck on（卡在……上）; turn to（求助于）; take the pressure off（减轻压力）","kw":""},{"num":"Q4","q":"How much time do you spend on your studies each week?","answer":"It really depends on the week, but usually around twenty-five hours outside of class. During exam season, though, that can easily double because I have to cram. On a normal week, I try to spread it out so I don't burn myself out.\n\n**关键词 / 高分表达:** cram（临时抱佛脚）; spread it out（分散安排）; burn myself out（把自己累垮）","kw":""},{"num":"Q5","q":"Do you prefer to study in the mornings or in the afternoons?","answer":"Definitely the mornings for me. My mind feels a lot clearer right after breakfast, so I can concentrate on difficult topics. By the afternoon I tend to get a bit sleepy, so I usually save the lighter tasks for then.\n\n**关键词 / 高分表达:** feel a lot clearer（头脑清醒得多）; concentrate on（专注于）; lighter tasks（较轻松的任务）","kw":""},{"num":"Q6","q":"Are you looking forward to working?","answer":"Yes, quite a lot actually. I'm excited to put what I've learned into practice and earn my own money. At the same time, I'm a little nervous because the real world is probably tougher than the classroom.\n\n**关键词 / 高分表达:** look forward to（期待）; put ... into practice（付诸实践）; the real world（现实世界、职场）","kw":""},{"num":"Q7","q":"Is it very interesting?","answer":"For the most part, yes. Some modules, like consumer behaviour, are genuinely fascinating because they explain why people buy the things they do. Of course, a few of the theory-heavy classes can be a bit dry, but that's just part of it.\n\n**关键词 / 高分表达:** for the most part（大体上）; consumer behaviour（消费者行为）; a bit dry（有点枯燥）","kw":""},{"num":"Q8","q":"Do you like your subject?(Why?/Why not?)","answer":"I really do enjoy it. What I like most is that it's practical — almost everything I learn can be applied to real businesses. It also opens up a wide range of career paths, which gives me a lot of flexibility.\n\n**关键词 / 高分表达:** practical（实用的）; be applied to（应用于）; career paths（职业道路）","kw":""},{"num":"Q9","q":"Why did you choose to study that subject?/Why did you choose to study those subjects?","answer":"Well, I've always been drawn to how companies operate and grow. My parents run a small shop, so from a young age I got curious about things like pricing and customers. Choosing business felt like a natural fit for me.\n\n**关键词 / 高分表达:** be drawn to（被……吸引）; from a young age（从小）; a natural fit（自然而然的选择）","kw":""},{"num":"Q10","q":"Do you think that your subject is popular in your country?","answer":"Yes, extremely popular. Business is one of the most competitive majors here because so many students see it as a safe path to a stable career. Every year the admission scores keep climbing, which shows how much demand there is.\n\n**关键词 / 高分表达:** competitive（竞争激烈的）; a stable career（稳定的职业）; admission scores（录取分数）","kw":""},{"num":"Q11","q":"Do you have any plans for your studies in the next five years?","answer":"Yes, I've thought about it quite a bit. After finishing my bachelor's, I'd like to do a master's degree abroad to broaden my horizons. Then I hope to gain some hands-on experience in a real company before deciding my next step.\n\n**关键词 / 高分表达:** bachelor's / master's degree（学士 / 硕士学位）; broaden my horizons（开阔眼界）; hands-on experience（实践经验）","kw":""},{"num":"Q12","q":"Do you want to change your major?","answer":"Not really, no. I'm quite happy with what I'm studying, and I can see myself using it in the future. If anything, I'd just like to add a minor in data analysis, since numbers are becoming so important in every field.\n\n**关键词 / 高分表达:** if anything（要说的话）; a minor（辅修）; data analysis（数据分析）","kw":""},{"num":"Q13","q":"What changes would you like to see in your school?","answer":"I'd love to see more practical, project-based courses instead of just lectures. A lot of what we learn stays theoretical, and it would help to work on real cases with actual companies. Better study spaces in the library wouldn't hurt either.\n\n**关键词 / 高分表达:** project-based（以项目为主的）; theoretical（理论上的）; wouldn't hurt（也不错、无妨）","kw":""},{"num":"Q14","q":"What do you think is the most important at the moment?","answer":"Right now, I'd say building a solid foundation is the most important thing. If I master the basics well, everything I do later will be much easier. I'm also trying to improve my English, since it opens a lot of doors.\n\n**关键词 / 高分表达:** a solid foundation（坚实的基础）; master the basics（掌握基础）; open a lot of doors（打开很多机会之门）","kw":""},{"num":"Q15","q":"What work do you do?","answer":"At the moment I'm a full-time student, so I don't have a proper job yet. That said, I do a part-time gig on weekends helping out at a coffee shop. It's a nice way to earn some pocket money and meet people.\n\n**关键词 / 高分表达:** full-time student（全日制学生）; part-time gig（兼职工作）; pocket money（零花钱）","kw":""},{"num":"Q16","q":"Do you miss being a student?","answer":"Well, I'm still a student, so I'm actually in the middle of it. But I can imagine missing it once I graduate — the freedom, the long holidays, and hanging out with friends every day. Those are things you probably can't get back later.\n\n**关键词 / 高分表达:** in the middle of it（正身处其中）; hang out with（和……一起玩）; get back（找回、重获）","kw":""},{"num":"Q17","q":"Do you want to change jobs?","answer":"Since my weekend job is only temporary, I'm not really thinking about changing it right now. Once I finish my degree, though, I'd like to move into something more challenging in the business field. For now, this little job suits me fine.\n\n**关键词 / 高分表达:** temporary（临时的）; more challenging（更有挑战性的）; suit me fine（很适合我）","kw":""},{"num":"Q18","q":"What kinds of technology do you use at work?","answer":"At the coffee shop it's fairly simple — mainly the till and a small ordering system on a tablet. We also use a group chat app to coordinate shifts. It's nothing fancy, but it keeps everything running smoothly.\n\n**关键词 / 高分表达:** the till（收银机）; coordinate shifts（安排班次）; running smoothly（运转顺畅）","kw":""},{"num":"Q19","q":"Is your work interesting?","answer":"It's more fun than I expected, to be honest. Chatting with different customers all day keeps things lively, and I've picked up some basic coffee-making skills. It's not exactly my dream career, but I genuinely enjoy the atmosphere.\n\n**关键词 / 高分表达:** keeps things lively（让气氛热闹）; pick up（学会、掌握）; atmosphere（氛围）","kw":""},{"num":"Q20","q":"Do you like your job?","answer":"Yeah, I do like it for what it is. The team is friendly, the hours are flexible, and I get to practise dealing with people. Those little skills will probably come in handy in whatever I do next.\n\n**关键词 / 高分表达:** for what it is（就其本身而言）; flexible hours（弹性工时）; come in handy（派上用场）","kw":""},{"num":"Q21","q":"Why did you choose to do that type of work (or, that job)?","answer":"I picked it mainly because it's close to campus and the schedule fits around my classes. I also wanted a bit of real work experience rather than just studying all the time. It felt like a good way to ease into working life.\n\n**关键词 / 高分表达:** fits around my classes（配合我的课程）; ease into（慢慢适应）; working life（职场生活）","kw":""},{"num":"Q22","q":"What are the benefits of being your age?","answer":"Being in my early twenties, I've got a lot of energy and very few responsibilities. I can try new things and make mistakes without too much at stake. It's the perfect time to explore and figure out what I really want.\n\n**关键词 / 高分表达:** few responsibilities（很少的责任）; at stake（有风险、有得失）; figure out（弄清楚）","kw":""},{"num":"Q23","q":"What requirements did you need to meet to get current job？","answer":"Honestly, the requirements were pretty basic. They just wanted someone reliable, friendly and willing to learn. I did a short trial shift so they could see how I handled customers, and luckily I passed.\n\n**关键词 / 高分表达:** reliable（可靠的）; a trial shift（试工）; handle customers（应对顾客）","kw":""},{"num":"Q24","q":"Do you have any plants for your work in the next five years?","answer":"Yes, I do have a rough plan. In five years I hope to be working in marketing at a decent company, hopefully with some management responsibility. My main goal is to keep learning and gradually work my way up.\n\n**关键词 / 高分表达:** a rough plan（大致的计划）; management responsibility（管理职责）; work my way up（一步步晋升）","kw":""}]},{"title":"Sports programs","qs":[{"num":"Q1","q":"Do you like watching sports programs on TV?","answer":"Yes, I really enjoy it, especially football matches. There's something thrilling about watching a live game unfold with all the tension and excitement. I usually catch the big matches on weekends when I have some free time.\n\n**关键词 / 高分表达:** unfold（展开、进行）; tension（紧张感）; catch a match（观看比赛）","kw":""},{"num":"Q2","q":"Do you like to watch live sports games?","answer":"Definitely — watching live is a whole different experience. The atmosphere is electric, and you feel every moment as it happens rather than knowing the result already. To be honest, nothing beats the buzz of a live game.\n\n**关键词 / 高分表达:** electric atmosphere（热烈的氛围）; nothing beats（没什么比得上）; the buzz（激动的气氛）","kw":""},{"num":"Q3","q":"Who do you like to watch sports games with?","answer":"I love watching with a group of friends who are just as into it as I am. We'll order some snacks, cheer together and argue about the referee's calls. Sharing those ups and downs makes the whole thing much more fun.\n\n**关键词 / 高分表达:** just as into it（同样着迷）; cheer（欢呼加油）; ups and downs（起起伏伏）","kw":""},{"num":"Q4","q":"What kinds of games do you expect to watch in the future?","answer":"I'd really like to watch a top-level tennis match one day, maybe even a Grand Slam. The skill and focus those players show is incredible. Seeing it live would be an absolute dream for me.\n\n**关键词 / 高分表达:** top-level（顶级的）; Grand Slam（大满贯）; an absolute dream（梦寐以求的事）","kw":""},{"num":"Q5","q":"Have you ever watched a sports game in astadium?","answer":"Yes, once I went to see a local basketball game at a stadium. The energy of the crowd completely blew me away — it was so much louder and more exciting than on TV. I definitely want to do it again soon.\n\n**关键词 / 高分表达:** the crowd（观众、人群）; blow me away（令我震撼）; do it again（再来一次）","kw":""},{"num":"Q6","q":"Do you prefer to watch sports games alone or witha group of friends?","answer":"Without a doubt, with friends. Watching alone is fine, but half the fun is celebrating a goal together and teasing each other about our teams. The shared excitement makes it a proper social event for me.\n\n**关键词 / 高分表达:** without a doubt（毫无疑问）; tease（打趣、调侃）; a social event（社交活动）","kw":""}]},{"title":"Evening time","qs":[{"num":"Q1","q":"What do you usually do in the evening?","answer":"Well, my evenings are pretty relaxed. After dinner I usually watch an episode of a show or read for a while to wind down. If the weather's nice, I might go for a short walk to clear my head before bed.\n\n**关键词 / 高分表达:** wind down（放松下来）; an episode（一集）; clear my head（放空脑袋）","kw":""},{"num":"Q2","q":"What did you do in the evening when you were little? Why?","answer":"As a kid, I spent most evenings doing homework and then playing with my siblings. My parents were quite strict about screen time, so we made up our own games instead. Looking back, those simple evenings were actually really happy ones.\n\n**关键词 / 高分表达:** siblings（兄弟姐妹）; screen time（看屏幕的时间）; looking back（回想起来）","kw":""},{"num":"Q3","q":"Are there any differences between what you do in the evening now and what you did in the past?","answer":"Yes, quite a big difference actually. Back then my evenings were full of play and family time, whereas now they're quieter and more about relaxing on my own. I suppose that's just part of growing up and getting busier.\n\n**关键词 / 高分表达:** family time（家庭时光）; on my own（独自）; part of growing up（成长的一部分）","kw":""},{"num":"Q4","q":"Do you spend your evenings doing the same things on both weekdays and weekends?","answer":"Not really, they're quite different. On weekdays I'm usually tired, so I just stay in and rest. But on weekend evenings I often go out with friends for dinner or a film, which is my way of treating myself.\n\n**关键词 / 高分表达:** stay in（待在家里）; go out（外出）; treat myself（犒劳自己）","kw":""},{"num":"Q5","q":"What do you hate doing in the evening？","answer":"The one thing I really dislike is having to do work or reply to emails late at night. After a long day, my brain is fried and I just can't concentrate. I much prefer keeping my evenings for switching off completely.\n\n**关键词 / 高分表达:** my brain is fried（脑子累坏了）; concentrate（集中注意力）; switch off（彻底放松）","kw":""},{"num":"Q6","q":"Do you like the morning or evening?","answer":"I'm definitely an evening person. That's when I finally feel free and relaxed, with no rush and nothing pressing to do. Mornings, on the other hand, always feel a bit of a struggle for me.\n\n**关键词 / 高分表达:** an evening person（晚上型的人）; nothing pressing（没有紧迫的事）; a struggle（一件难事）","kw":""}]},{"title":"Watch","qs":[{"num":"Q1","q":"Do you wear a watch?","answer":"Yes, I wear one almost every day. It's a simple digital watch that helps me keep track of time without pulling out my phone. Over the years it's become such a habit that my wrist feels bare without it.\n\n**关键词 / 高分表达:** keep track of time（掌握时间）; a habit（习惯）; feel bare（感觉空落落的）","kw":""},{"num":"Q2","q":"Have you ever received a watch as a gift?","answer":"Yes, actually my parents gave me a lovely watch when I graduated from high school. It meant a lot to me because it marked such an important moment. I still treasure it, even though I don't wear it every day.\n\n**关键词 / 高分表达:** mark a moment（纪念某一时刻）; treasure（珍藏）; meant a lot（意义重大）","kw":""},{"num":"Q3","q":"Why do some people wear expensive watches?","answer":"I think for many people an expensive watch is more of a status symbol than a way to tell the time. It shows their taste and success, and it can leave a good impression on others. Some also see luxury watches as an investment that holds its value.\n\n**关键词 / 高分表达:** status symbol（身份象征）; leave a good impression（留下好印象）; hold its value（保值）","kw":""},{"num":"Q4","q":"Do you think watch is important for you? Why?","answer":"Yes, it's fairly important to me for practical reasons. Glancing at my wrist is quicker and less distracting than checking my phone, which usually pulls me into other apps. On top of that, a nice watch just completes an outfit.\n\n**关键词 / 高分表达:** glance at（瞥一眼）; distracting（分散注意力的）; complete an outfit（点缀整体穿搭）","kw":""}]},{"title":"Cars","qs":[{"num":"Q1","q":"Do you think car colours are important？","answer":"To some extent, yes. Colour is often the first thing people notice, and it can say a lot about someone's personality. Personally I prefer neutral colours like white or grey, mainly because they look clean and hide dirt well.\n\n**关键词 / 高分表达:** to some extent（在某种程度上）; neutral colours（中性色）; hide dirt（不显脏）","kw":""},{"num":"Q2","q":"Did you enjoy traveling by car when you were a kid?","answer":"Oh, I absolutely loved it. Long family road trips were some of my happiest childhood memories — I'd stare out of the window and make up stories about the passing scenery. I usually ended up falling asleep to the gentle motion of the car.\n\n**关键词 / 高分表达:** road trip（公路旅行）; passing scenery（掠过的风景）; the gentle motion（轻柔的晃动）","kw":""},{"num":"Q3","q":"What types of cars do you like?","answer":"I'm quite drawn to compact electric cars these days. They're eco-friendly, cheap to run, and easy to park in a crowded city. Something practical and modern suits my lifestyle far better than a big flashy car.\n\n**关键词 / 高分表达:** compact（小巧的）; eco-friendly（环保的）; flashy（浮夸招摇的）","kw":""},{"num":"Q4","q":"Do you prefer to be a driver or a passenger?","answer":"Honestly, I'd rather be a passenger. That way I can just sit back, enjoy the view or listen to music without worrying about the road. Driving can be stressful, especially in heavy traffic, so I happily leave it to someone else.\n\n**关键词 / 高分表达:** sit back（放松地坐着）; worry about the road（操心路况）; leave it to（交给……）","kw":""},{"num":"Q5","q":"What do you usually do when there is a traffic jam?","answer":"When I'm stuck in traffic, I try to stay calm and put on a podcast or some music to pass the time. Getting frustrated doesn't help anyway, since I can't make the cars move any faster. So I just make the most of it and relax.\n\n**关键词 / 高分表达:** stuck in traffic（堵在路上）; pass the time（打发时间）; make the most of it（充分利用、随遇而安）","kw":""}]},{"title":"Websites","qs":[{"num":"Q1","q":"What kinds of websites do you  often visit?","answer":"I mainly visit video and news websites in my free time. YouTube is probably my go-to for entertainment and learning new things, and I check a news site every morning to stay updated. Now and then I'll also browse online shopping sites when I need something.\n\n**关键词 / 高分表达:** my go-to（我的首选）; stay updated（了解最新情况）; browse（浏览）","kw":""},{"num":"Q2","q":"What is your favourite website?","answer":"I'd have to say YouTube is my favourite by far. There's endless content on it, from cooking tutorials to documentaries, so I never run out of things to watch. It's both fun and genuinely educational, which is a great combination.\n\n**关键词 / 高分表达:** by far（远远地、明显地）; run out of（用完、耗尽）; educational（有教育意义的）","kw":""},{"num":"Q3","q":"Are there any changes to the websites you ofter visit？","answer":"Yes, they seem to update their design and features quite often. Recently a lot of sites have started using AI to recommend content based on what I like. It's convenient, though sometimes it feels like they know me a little too well.\n\n**关键词 / 高分表达:** update the design（更新设计）; recommend content（推荐内容）; a little too well（有点过于了解）","kw":""},{"num":"Q4","q":"What kinds of websites are popular in your country?","answer":"In China, social media and short-video platforms like Douyin are hugely popular. Online shopping sites such as Taobao are also part of everyday life for almost everyone. Basically, whatever people need — shopping, entertainment or news — there's a well-known site for it.\n\n**关键词 / 高分表达:** short-video platforms（短视频平台）; part of everyday life（日常生活的一部分）; well-known（知名的）","kw":""}]},{"title":"Mirrors","qs":[{"num":"Q1","q":"Would you use mirrors to decorate your room?","answer":"Yes, I actually think mirrors are a great decorating trick. A well-placed mirror can make a small room feel much bigger and brighter by reflecting the light. In my own room I've hung a round mirror on the wall, and it really opens up the space.\n\n**关键词 / 高分表达:** a decorating trick（装饰小技巧）; reflect the light（反射光线）; open up the space（让空间显得开阔）","kw":""},{"num":"Q2","q":"Do you usually take a mirror with you ?","answer":"Not a separate one, no. I just rely on my phone's front camera whenever I need to check my appearance. It does the same job and saves me from carrying anything extra, so it's much more convenient.\n\n**关键词 / 高分表达:** front camera（前置摄像头）; check my appearance（检查外表）; carry anything extra（多带东西）","kw":""},{"num":"Q3","q":"Have you ever bought mirrors?","answer":"Yes, I bought a full-length mirror online when I moved into my current flat. I needed one to check my outfits before heading out each morning. It was cheap but really practical, and I use it every single day.\n\n**关键词 / 高分表达:** full-length mirror（全身镜）; check my outfits（检查穿搭）; head out（出门）","kw":""},{"num":"Q4","q":"Do you like looking at yourself in the mirror?How often?","answer":"To be honest, only briefly and when I need to. I'll glance in the mirror a few times a day, mainly to fix my hair or make sure I look presentable. I'm not really the type to stand there admiring myself for ages.\n\n**关键词 / 高分表达:** glance in the mirror（照一下镜子）; look presentable（看起来体面）; admire myself（自我欣赏）","kw":""}]},{"title":"social media","qs":[{"num":"Q1","q":"When did you start using social media?","answer":"I think I started when I was around thirteen, back in middle school. All my classmates were on it, so I signed up mostly so I wouldn't feel left out. At first I only used it to chat with friends, but over the years it's become a much bigger part of my daily routine.\n\n**关键词 / 高分表达:** signed up（注册）；feel left out（感觉被冷落、跟不上）；part of my daily routine（日常的一部分）","kw":""},{"num":"Q2","q":"Have you ever posted anything on social media?","answer":"Yes, though I'm not a very active poster. Usually I only share photos from trips or a nice meal I've had. For instance, last summer I posted a whole album from a beach holiday, and it was lovely getting comments from friends I hadn't spoken to in ages.\n\n**关键词 / 高分表达:** active poster（活跃的发帖者）；in ages（很久）；getting comments（收到评论）","kw":""},{"num":"Q3","q":"Do you think you spend too much time on social media?","answer":"Honestly, yes, probably more than I should. I often pick up my phone just to check one thing, and then half an hour disappears without me noticing. I've been trying to cut down recently by turning off notifications, but it's a hard habit to break.\n\n**关键词 / 高分表达:** cut down（减少）；a hard habit to break（很难改的习惯）；without me noticing（不知不觉地）","kw":""},{"num":"Q4","q":"What do people do on social media？","answer":"Well, people do all sorts of things on it. Some share updates about their lives and stay in touch with friends, while others follow celebrities or the latest news. A lot of people also use it just to kill time, scrolling through short videos when they're bored.\n\n**关键词 / 高分表达:** stay in touch（保持联系）；kill time（打发时间）；scrolling through（刷、翻看）","kw":""},{"num":"Q5","q":"Do your friends use social medial？","answer":"Yeah, pretty much all of them do. It's actually how we organise most of our get-togethers, since it's so easy to message everyone in a group chat. A few of my friends are really into it and post almost every day, while others just quietly browse like me.\n\n**关键词 / 高分表达:** get-togethers（聚会）；group chat（群聊）；quietly browse（默默浏览）","kw":""}]},{"title":"Clothing","qs":[{"num":"Q1","q":"What kind of clothes do you like to wear?","answer":"I usually go for simple, casual clothes like jeans and a plain T-shirt. I'm not really into flashy outfits; I prefer things that are easy to mix and match. As long as I feel comfortable and neat, I'm happy, especially since I'm on my feet a lot during the day.\n\n**关键词 / 高分表达:** casual clothes（休闲装）；mix and match（随意搭配）；flashy outfits（花哨的穿搭）","kw":""},{"num":"Q2","q":"Do you prefer to wear comfortable and casual clothes or smart clothes?","answer":"Definitely comfortable and casual, most of the time. I just feel more like myself when I'm relaxed and not worrying about creasing a nice shirt. That said, I don't mind dressing up smartly for special occasions like a wedding or a job interview.\n\n**关键词 / 高分表达:** feel more like myself（更做自己）；creasing a shirt（把衬衫弄皱）；dress up smartly（穿得正式体面）","kw":""},{"num":"Q3","q":"Do you like wearing T-shirts?","answer":"Oh yes, T-shirts are basically my go-to. They're light, easy to wash, and you can throw a jacket over one if it gets cold. I've got a whole drawer full of them in different colours, and I honestly wear one almost every single day in summer.\n\n**关键词 / 高分表达:** my go-to（我的首选）；throw a jacket over（外面套件夹克）；a drawer full of（满满一抽屉）","kw":""},{"num":"Q4","q":"Do you spend a lot of time choosing clothes?","answer":"Not really, I tend to keep it quick. Most mornings I just grab whatever's clean and matches, and I'm out the door in a few minutes. The only time I take longer is when I'm heading somewhere important, and even then I usually decide the night before.\n\n**关键词 / 高分表达:** grab whatever's clean（随手拿干净的）；out the door（出门）；the night before（前一晚）","kw":""}]},{"title":"Morning routines","qs":[{"num":"Q1","q":"What do you do in the mornings?","answer":"Well, my mornings are pretty routine. The first thing I do is wash my face and make myself a strong cup of coffee to wake up properly. Then I usually check my messages and plan out my day while I eat breakfast, so I feel organised before I head out.\n\n**关键词 / 高分表达:** pretty routine（很规律）；wake up properly（彻底清醒）；plan out my day（规划一天）","kw":""},{"num":"Q2","q":"Is breakfast important?","answer":"Absolutely, I think it's the most important meal of the day. If I skip it, I feel sluggish and can't concentrate at all by mid-morning. Even on busy days, I make sure to grab something quick like a banana or some toast to keep my energy up.\n\n**关键词 / 高分表达:** the most important meal（最重要的一餐）；feel sluggish（感觉没精神）；keep my energy up（保持精力）","kw":""},{"num":"Q3","q":"What is your morning routine?","answer":"To be honest, it's fairly simple and I stick to it most days. I wake up around seven, do a bit of light stretching, then shower and get dressed. After a quick breakfast, I'm usually out the door by eight. Having that steady rhythm really helps me start the day on the right foot.\n\n**关键词 / 高分表达:** stick to it（坚持这个习惯）；light stretching（轻度拉伸）；start on the right foot（开个好头）","kw":""},{"num":"Q4","q":"Do you like to get up early in the morning?","answer":"Honestly, not really, I've always been a bit of a night owl. Dragging myself out of bed early is a real struggle for me. That said, on the rare mornings when I do get up early, I actually enjoy how quiet and peaceful everything feels before the world wakes up.\n\n**关键词 / 高分表达:** a night owl（夜猫子）；dragging myself out of bed（硬把自己从床上拖起来）；before the world wakes up（在世界醒来之前）","kw":""}]},{"title":"Headphones","qs":[{"num":"Q1","q":"In what conditions, you won't use headphones？","answer":"Well, I usually take my headphones off when I'm crossing a busy street, because I really need to hear the traffic around me to stay safe. I also avoid them when I'm having dinner with my family, since it would feel a bit rude to shut everyone out. Basically, whenever I need to stay aware of my surroundings or connect with people, I put them away.\n\n**关键词 / 高分表达:** take off (摘下)；shut everyone out (把大家隔绝在外)；stay aware of my surroundings (留意周围环境)","kw":""},{"num":"Q2","q":"When would you use headphones？","answer":"To be honest, I use them the most on my daily commute. Every morning I take the subway for about forty minutes, and listening to a podcast or some music with headphones really helps the time fly. I also wear them when I'm studying in a café, because they block out the background noise and help me focus.\n\n**关键词 / 高分表达:** daily commute (每日通勤)；make the time fly (让时间飞快过去)；block out the background noise (隔绝背景噪音)","kw":""},{"num":"Q3","q":"Do you use headphones？","answer":"Yes, I'd say I use them almost every single day. For me they've become a kind of little bubble where I can enjoy my own world for a while. Actually, I think I'd feel a bit lost on the bus without them.\n\n**关键词 / 高分表达:** every single day (每一天)；a little bubble (小小的私人空间)；feel a bit lost (感觉有点不知所措)","kw":""},{"num":"Q4","q":"What kind of headphones do you use？","answer":"I mainly use a pair of wireless earbuds that I bought last year. I prefer them over the big over-ear ones because they're so light and easy to slip into my pocket. The sound quality is pretty decent too, especially the noise-cancelling feature, which is a real lifesaver on noisy trains.\n\n**关键词 / 高分表达:** wireless earbuds (无线耳塞)；over-ear headphones (头戴式耳机)；noise-cancelling feature (降噪功能)；a real lifesaver (救星，帮大忙的东西)","kw":""}]},{"title":"Science","qs":[{"num":"Q1","q":"Do Chinese people often visit science museums?","answer":"I think it's becoming more and more common, especially among families with young kids. Whenever I pass by the science museum in my city on a weekend, it's usually packed with parents and children. I guess a lot of people see it as both a fun day out and a great way to learn something new.\n\n**关键词 / 高分表达:** more and more common (越来越普遍)；packed with (挤满了)；a fun day out (愉快的一日游)","kw":""},{"num":"Q2","q":"Do you like watching science TV programs?","answer":"Yes, I really do, particularly documentaries about space and the ocean. I remember watching a series about deep-sea creatures last year, and I was completely blown away by how strange and beautiful they were. These programs make complicated ideas so much easier to understand.\n\n**关键词 / 高分表达:** documentaries (纪录片)；blown away (被震撼到)；complicated ideas (复杂的概念)","kw":""},{"num":"Q3","q":"What kinds of interesting things you have done with science?","answer":"Well, one thing that really sticks in my memory is a small experiment we did in chemistry class in high school. We mixed a few chemicals together and it created this bright, fizzing reaction, which everyone found amazing. It was messy but honestly one of the most fun lessons I ever had.\n\n**关键词 / 高分表达:** sticks in my memory (记忆犹新)；fizzing reaction (冒泡的反应)；messy but fun (乱糟糟却有趣)","kw":""},{"num":"Q4","q":"Which science subject is interesting to you?","answer":"I'd say biology is the one that fascinates me the most. I've always been curious about how the human body works, and how tiny cells can come together to keep us alive. Compared to physics, which felt a bit abstract to me, biology feels more connected to real life.\n\n**关键词 / 高分表达:** fascinates me (深深吸引我)；how the human body works (人体如何运作)；abstract (抽象的)","kw":""},{"num":"Q5","q":"When did you start to learn about science？","answer":"I think I first started properly in primary school, probably around the age of eight or nine. Before that, my curiosity was mostly just asking my parents endless questions like why the sky is blue. But that early science class was really where it all began for me.\n\n**关键词 / 高分表达:** properly (正式地)；endless questions (无穷无尽的问题)；where it all began (一切的起点)","kw":""},{"num":"Q6","q":"Do you like science?","answer":"Absolutely, I've been into science for as long as I can remember. What I love about it is that it constantly pushes us to ask questions and explore the unknown. For example, every time there's news about a new space mission, I get genuinely excited and read everything I can find.\n\n**关键词 / 高分表达:** been into (一直很喜欢)；explore the unknown (探索未知)；space mission (太空任务)","kw":""}]},{"title":"Singing","qs":[{"num":"Q1","q":"Do you like singing? Why or why not?","answer":"Yes, I really enjoy singing, even though I'm honestly not that good at it. For me it's a wonderful way to let off steam after a long day. I often sing along to my favourite songs in the shower, and it always lifts my mood almost instantly.\n\n**关键词 / 高分表达:** let off steam (释放压力)；sing along to (跟着唱)；lifts my mood (让我心情变好)","kw":""},{"num":"Q2","q":"Have you ever learnt how to sing?","answer":"Not in a formal way, no. I've never taken proper singing lessons or anything like that. I mostly just picked it up by imitating singers I like and watching tutorials online, so I'd say I'm completely self-taught.\n\n**关键词 / 高分表达:** in a formal way (正式地)；picked it up (无师自通学会)；self-taught (自学的)","kw":""},{"num":"Q3","q":"Who do you want to sing for?","answer":"I think I'd most love to sing for my close family, especially my grandma. She grew up loving old folk songs, and her face lights up whenever someone sings them. Being able to bring her that little bit of joy would honestly mean the world to me.\n\n**关键词 / 高分表达:** her face lights up (她眉开眼笑)；folk songs (民谣)；mean the world to me (对我意义重大)","kw":""},{"num":"Q4","q":"Do you think singing can bring happiness to people?","answer":"Definitely, I believe singing has a real power to lift people's spirits. Whether you're the one singing or just listening, a good song can completely change how you feel. For example, at gatherings with friends, a bit of karaoke always breaks the ice and gets everyone laughing.\n\n**关键词 / 高分表达:** lift people's spirits (振奋人心)；breaks the ice (打破尴尬)；gets everyone laughing (让大家都笑起来)","kw":""}]},{"title":"Hobby","qs":[{"num":"Q1","q":"Do you have any hobbies?","answer":"Yes, I've got a few, but my main one is definitely reading. I love getting lost in a good novel, especially mystery stories, because they really keep me on the edge of my seat. Besides that, I also enjoy going for a jog in the evening to clear my head.\n\n**关键词 / 高分表达:** getting lost in (沉浸于)；on the edge of my seat (紧张期待)；clear my head (放空思绪)","kw":""},{"num":"Q2","q":"Did you have any hobbies when you were a child?","answer":"Oh yes, when I was little I was absolutely crazy about drawing. I used to fill entire notebooks with cartoon characters and colourful little scenes. My parents even stuck some of my drawings on the fridge, which made me feel really proud at the time.\n\n**关键词 / 高分表达:** crazy about (痴迷于)；fill entire notebooks (画满整本本子)；stuck on the fridge (贴在冰箱上)","kw":""},{"num":"Q3","q":"Do you have a hobby that you've had since childhood?","answer":"Yes, reading is one that has stuck with me all these years. I started with picture books as a kid, and somehow that love for stories never faded away. Even now, I try to read a little every night before bed, and it's become a habit I really treasure.\n\n**关键词 / 高分表达:** stuck with me (一直伴随我)；never faded away (从未消退)；a habit I treasure (我珍视的习惯)","kw":""},{"num":"Q4","q":"Do you have the same hobbies as your family members?","answer":"Partly, I'd say. My mum and I both love reading, so we often swap book recommendations and chat about them, which is really nice. However, my dad is much more into sports like basketball, which honestly isn't really my thing. So we share some hobbies but not all of them.\n\n**关键词 / 高分表达:** swap recommendations (互相推荐)；into sports (热衷运动)；not really my thing (不太是我喜欢的)","kw":""}]},{"title":"Advertisement","qs":[{"num":"Q1","q":"Do you often see advertisements when you are on your phone or computer?","answer":"Oh, all the time, honestly. Whenever I open an app like Instagram or scroll through a shopping site, there's an ad popping up every few seconds. Most of them are for clothes or food delivery, probably because the apps track what I search for. To be honest, it can get a bit annoying, but I've kind of gotten used to it now.\n\n**关键词 / 高分表达:** pop up（弹出）；track what I search for（追踪我的搜索）；get used to（习惯于）","kw":""},{"num":"Q2","q":"Is there an advertisement that made an impression on you when you were a child?","answer":"Yeah, actually, there was this milk commercial that used to play on TV all the time when I was little. It had a really catchy jingle, and I remember singing along with my sister every evening. I think that's why it stuck in my memory even after all these years. It's funny how a simple tune can stay with you for so long.\n\n**关键词 / 高分表达:** catchy jingle（朗朗上口的广告曲）；sing along（跟着唱）；stick in my memory（留在记忆里）","kw":""},{"num":"Q3","q":"Do you see a lot of advertising on trains or other transport?","answer":"Definitely, especially on the subway in my city. The walls of the stations are covered with posters, and there are even little screens inside the carriages showing video ads. Since people are just standing there with nothing to do, I guess it's a smart place to advertise. Personally, I sometimes read them just to pass the time during my commute.\n\n**关键词 / 高分表达:** covered with posters（贴满海报）；carriage（车厢）；pass the time（打发时间）","kw":""},{"num":"Q4","q":"Do you like advertisements?","answer":"I'd say it really depends on the ad. Some of them are clever and even quite funny, so I don't mind watching those at all. But the ones that interrupt a video I'm halfway through really drive me crazy. So overall, I have pretty mixed feelings about advertising.\n\n**关键词 / 高分表达:** it depends（视情况而定）；drive me crazy（让我抓狂）；mixed feelings（复杂的感受）","kw":""},{"num":"Q5","q":"What kind of advertising do you like?","answer":"Well, I really enjoy ads that tell a little story instead of just pushing a product. For example, some brands make short films about family or friendship, and by the end you almost forget it's an advertisement. I find those much more memorable and even a bit touching. That kind of creativity is what makes me actually want to buy the product.\n\n**关键词 / 高分表达:** push a product（硬推产品）；memorable（令人难忘的）；touching（打动人的）","kw":""}]},{"title":"Gifts","qs":[{"num":"Q1","q":"Have you ever sent handmade gifts to others?","answer":"Yes, I have, actually. Last year for my mum's birthday, I made her a photo album by hand with pictures from our family trips. It took me a whole weekend to cut everything out and write little notes next to the photos. She got quite emotional when she opened it, which honestly made all the effort worth it.\n\n**关键词 / 高分表达:** by hand（手工制作）；cut out（剪下来）；worth it（值得的）","kw":""},{"num":"Q2","q":"Have you ever received a great gift?","answer":"Definitely. A few years ago, my best friend gave me a Kindle for my graduation, and I was completely surprised. She knew I loved reading but never had space for physical books in my small apartment. I still use it almost every single day on my way to work. It's probably the most thoughtful gift I've ever gotten.\n\n**关键词 / 高分表达:** completely surprised（完全惊喜）；thoughtful（体贴的）；on my way to work（上班路上）","kw":""},{"num":"Q3","q":"What do you consider when choosing a gift?","answer":"The main thing I think about is the person's interests and what they actually need. There's no point buying something expensive if they're never going to use it. For instance, for a friend who loves coffee, I'd pick a nice bag of beans rather than some random gadget. I always try to make the gift feel personal.\n\n**关键词 / 高分表达:** no point (in) doing（做...没意义）；random gadget（随便的小玩意）；feel personal（有心意的）","kw":""},{"num":"Q4","q":"Do you think you are good at choosing gifts?","answer":"Hmm, I'd like to think so, but I'm not always sure. I usually pay attention to what people mention they like throughout the year, so I can surprise them later. Sometimes it works out perfectly, but other times I completely miss the mark. So I'd say I'm decent at it, though there's definitely room for improvement.\n\n**关键词 / 高分表达:** pay attention to（留意）；miss the mark（没猜对）；room for improvement（有提升空间）","kw":""},{"num":"Q5","q":"What gift have you received recently?","answer":"Just last month, my colleagues surprised me with a lovely scarf when I changed departments. It was a really warm gesture, and I honestly didn't expect it at all. The colour matches most of my winter coats, so I've been wearing it a lot lately. It reminds me of how kind my team was.\n\n**关键词 / 高分表达:** warm gesture（暖心之举）；didn't expect it（没料到）；reminds me of（让我想起）","kw":""}]},{"title":"Dreams","qs":[{"num":"Q1","q":"Can you remember the dreams you had?","answer":"Sometimes I can, but usually only for a few minutes after I wake up. If it's a really vivid or strange dream, then bits of it stay with me throughout the morning. For example, I once dreamt I was flying over my hometown, and I still remember that feeling clearly. But most of the time, the details just slip away.\n\n**关键词 / 高分表达:** vivid（生动的）；stay with me（留在脑海）；slip away（消失、忘掉）","kw":""},{"num":"Q2","q":"Do you want to make your dreams come true?","answer":"Absolutely, that's what keeps me motivated every day. One of my biggest dreams is to travel around Europe and see all the places I've read about. I've already started saving money and learning a bit of French for it. I really believe that if you work towards something steadily, it can eventually happen.\n\n**关键词 / 高分表达:** keep me motivated（保持动力）；save money（存钱）；work towards（朝...努力）","kw":""},{"num":"Q3","q":"Do you think dreams have special meaning?","answer":"Well, I'm a little on the fence about this one. Some people believe dreams reveal what's on your mind, and honestly there might be something to that. When I'm stressed about work, I do tend to have more chaotic dreams. But I wouldn't take them too seriously or read too much into them.\n\n**关键词 / 高分表达:** on the fence（拿不定主意）；on your mind（心事）；read too much into（过度解读）","kw":""},{"num":"Q4","q":"Can you often remember your dreams?","answer":"Not really, to be honest. Most days I wake up and can't recall a single thing, even if I know I dreamt something. I find I only remember them when my alarm goes off right in the middle of one. So overall, my memory of dreams is pretty patchy.\n\n**关键词 / 高分表达:** recall（回忆起）；alarm goes off（闹钟响）；patchy（时有时无的）","kw":""}]},{"title":"Sports team","qs":[{"num":"Q1","q":"What are the differences between team sports and individual sports?","answer":"Well, the biggest difference is that team sports rely on cooperation, while individual sports are all about your own effort. In something like basketball, you have to trust your teammates and communicate constantly. But in tennis or swimming, it's just you against your opponent, so all the pressure is on you. Both are great, but they build quite different skills.\n\n**关键词 / 高分表达:** rely on cooperation（依靠合作）；communicate（沟通）；the pressure is on you（压力在你身上）","kw":""},{"num":"Q2","q":"Do you like to watch team games?Why?","answer":"Yes, I really do, especially football matches. I love the energy of it, the way the whole crowd reacts together when a goal goes in. Watching a team pass the ball and work as one is honestly exciting to me. It's also just a fun thing to do with friends over the weekend.\n\n**关键词 / 高分表达:** the energy of it（那种气氛）；when a goal goes in（进球时）；work as one（齐心协力）","kw":""},{"num":"Q3","q":"Have you ever been part of a sports team?","answer":"Yeah, I was on my school's volleyball team for a couple of years. We trained twice a week and even competed against other schools in the city. Even though we didn't win much, I made some really close friends through it. Looking back, being part of that team taught me a lot about teamwork.\n\n**关键词 / 高分表达:** train（训练）；compete against（与...比赛）；teamwork（团队合作）","kw":""},{"num":"Q4","q":"Is team sports popular in your culture?","answer":"Definitely, team sports are hugely popular here. Basketball in particular has a massive following, and you'll see courts full of people playing in almost every neighbourhood. Football and badminton are big too, especially among younger people. I'd say it's a really important part of everyday life for a lot of us.\n\n**关键词 / 高分表达:** a massive following（大量粉丝）；courts full of people（球场挤满人）；part of everyday life（日常生活的一部分）","kw":""}]},{"title":"Food","qs":[{"num":"Q1","q":"Has your favourite food changed since you were a child?","answer":"Yeah, quite a bit, actually. As a kid I was obsessed with sweets and fast food, and I could eat fried chicken every single day. But as I've grown older, my taste has shifted towards fresher, lighter things like seafood and vegetables. I guess my palate has just matured over time. These days I even enjoy foods I used to hate.\n\n**关键词 / 高分表达:** obsessed with（痴迷于）；my taste has shifted（口味变了）；palate（味觉）","kw":""},{"num":"Q2","q":"Do you eat different foods at dfferent times of the year?","answer":"Definitely, the seasons really affect what I crave. In winter, I go for warm, hearty dishes like hotpot and noodle soups to keep me cosy. But when summer comes around, I switch to cold noodles, fruit and lots of iced drinks. Eating with the seasons just feels more natural to me.\n\n**关键词 / 高分表达:** crave（渴望吃）；hearty dishes（丰盛的菜）；eat with the seasons（应季饮食）","kw":""},{"num":"Q3","q":"Is there any food you dislike?","answer":"Yes, there's one thing I really can't stand, and that's coriander. To me it has this soapy taste that ruins the whole dish for me. Whenever I order food, I always ask them to leave it out. Apart from that, though, I'm pretty open to trying most things.\n\n**关键词 / 高分表达:** can't stand（受不了）；ruins the dish（毁了这道菜）；leave it out（不放它）","kw":""},{"num":"Q4","q":"What is your favourite food?","answer":"My absolute favourite has to be dumplings. My grandma makes them from scratch, and nothing from a restaurant ever quite compares. We usually make a big batch together during family gatherings, which makes them taste even better. For me, they're not just delicious, they also remind me of home.\n\n**关键词 / 高分表达:** from scratch（从头做起）；compare（比得上）；remind me of home（让我想起家）","kw":""}]},{"title":"Rules","qs":[{"num":"Q1","q":"Would you like to work as a teacher in a rule-free school?","answer":"Well, that sounds interesting in theory, but honestly I'm not sure it would work well. Without any rules at all, I think the classroom might get pretty chaotic and hard to manage. I'd rather have a few simple, fair rules so that everyone knows what to expect, which actually makes teaching easier.\n\n**关键词 / 高分表达:** in theory (理论上); chaotic (混乱的); know what to expect (知道该期待什么)","kw":""},{"num":"Q2","q":"Have you ever had a really strict teacher?","answer":"Yeah, my maths teacher in middle school was incredibly strict. She'd check our homework line by line and get quite upset if we made careless mistakes. At the time we were a bit scared of her, but looking back, her high standards really pushed us to work harder, and I'm actually grateful now.\n\n**关键词 / 高分表达:** line by line (逐行); careless mistakes (粗心的错误); high standards (高要求)","kw":""},{"num":"Q3","q":"Do you prefer to have more or fewer rules at school?","answer":"I'd say fewer rules, but sensible ones. Too many rules can feel suffocating and make students just want to rebel. On the other hand, a small number of clear rules, like being on time and respecting others, actually creates a better environment for everyone. So it's all about finding the right balance.\n\n**关键词 / 高分表达:** suffocating (令人窒息的); rebel (反抗); finding the right balance (找到平衡)","kw":""},{"num":"Q4","q":"Do you have a teacher who does his or her job very well?/3.Have you ever had a very dedicated teacher?","answer":"Definitely, my English teacher in high school comes to mind. She would stay after class just to help students who were struggling, without ever complaining. You could really tell she loved teaching and genuinely cared about us. Because of her passion, English became my favourite subject.\n\n**关键词 / 高分表达:** comes to mind (浮现在脑海); genuinely cared (真心关心); passion (热情)","kw":""},{"num":"Q5","q":"Do you think students would benefit more from more rules?","answer":"Hmm, I don't think simply having more rules is the answer. What matters is whether the rules are reasonable and actually help students grow. A few good rules can teach discipline and respect, but piling on too many just makes school feel like a prison. So quality beats quantity here.\n\n**关键词 / 高分表达:** teach discipline (培养纪律); piling on (堆砌); quality beats quantity (质量胜过数量)","kw":""},{"num":"Q6","q":"Are there any rules for students at your school?","answer":"Oh yes, quite a few. For example, we have to wear a uniform, we can't use phones during class, and we're expected to arrive before eight o'clock. At first some of them felt a bit annoying, but honestly they keep things orderly and help everyone focus, so I understand why they exist.\n\n**关键词 / 高分表达:** wear a uniform (穿校服); keep things orderly (保持秩序); help everyone focus (帮助大家专注)","kw":""}]},{"title":"Pets and animals","qs":[{"num":"Q1","q":"What is the most popular animal in China?","answer":"Well, if we're talking about pets, dogs and cats are by far the most popular here. But when it comes to animals that people love as a symbol, I'd say the panda is number one. It's cute, gentle, and honestly it feels like a national treasure that everyone is proud of.\n\n**关键词 / 高分表达:** by far the most popular (最受欢迎); a symbol (象征); national treasure (国宝)","kw":""},{"num":"Q2","q":"Have you ever had a pet before?","answer":"Yeah, I had a little golden retriever when I was in middle school, and his name was Coco. He was so loyal and always waited by the door for me to come home. Sadly he passed away a few years ago, but he brought so much joy to our family, and I still miss him a lot.\n\n**关键词 / 高分表达:** loyal (忠诚的); passed away (去世); brought so much joy (带来很多快乐)","kw":""},{"num":"Q3","q":"Where do you prefer to keep your pet, indoors or outdoors?","answer":"Personally, I'd rather keep a pet indoors, mainly because it feels safer and cleaner. Living outside, they could easily get lost or catch some illness. When they're inside with us, they become part of the family, and you can bond with them much more closely. So indoors is definitely my choice.\n\n**关键词 / 高分表达:** get lost (走丢); part of the family (家庭的一员); bond with them (与它们建立感情)","kw":""},{"num":"Q4","q":"What's your favourite animal? Why?","answer":"My favourite has to be the dog, hands down. I just love how affectionate and loyal they are, and how they can sense when you're feeling down. Ever since I had my own dog as a kid, I've felt a special connection with them. To me, they're the most faithful companions you could ask for.\n\n**关键词 / 高分表达:** hands down (毫无疑问); affectionate (深情的); faithful companions (忠实的伙伴)","kw":""}]},{"title":"Memory","qs":[{"num":"Q1","q":"How do you remember important things?","answer":"Well, I mostly rely on my phone to remember important things, so I set reminders and write everything in a notes app. For really crucial stuff, like exams or deadlines, I also stick a paper note on my desk where I can't miss it. Having both a digital and a physical reminder makes me feel much safer.\n\n**关键词 / 高分表达:** set reminders (设置提醒); crucial stuff (重要的事); can't miss it (不会错过)","kw":""},{"num":"Q2","q":"Why do some people have good memory while others just don' t?","answer":"That's an interesting question. I think part of it is natural, some people are just born with a sharper memory. But a lot of it also comes down to habits, like whether you practise remembering things or stay focused. People who get enough sleep and don't rely too heavily on their phones tend to have better memories too.\n\n**关键词 / 高分表达:** born with (天生的); a sharper memory (更好的记忆力); comes down to habits (取决于习惯)","kw":""},{"num":"Q3","q":"Why do more people rely on cellphones to memorize things?","answer":"Honestly, it's just so convenient, that's the main reason. Our phones can store phone numbers, dates and passwords all in one place, so there's no need to keep them in our heads. The downside, though, is that we're gradually getting lazier with our own memory. I think a lot of us couldn't even recall a single phone number now.\n\n**关键词 / 高分表达:** store all in one place (集中存储); getting lazier (变得懒惰); the downside (缺点)","kw":""},{"num":"Q4","q":"Are you good at memorizing things?","answer":"I'd say I'm alright, but it really depends on what it is. I'm quite good at remembering faces and songs, but terrible with numbers and names. When I need to memorise something for studying, I usually have to repeat it several times before it sticks. So I'd call myself average, I suppose.\n\n**关键词 / 高分表达:** depends on what it is (取决于是什么); before it sticks (才能记住); call myself average (算是一般)","kw":""},{"num":"Q5","q":"Have you ever forgotten something that was important?","answer":"Oh yeah, unfortunately. Once I completely forgot about a friend's birthday until she posted about it online, and I felt really guilty. I ended up apologising and taking her out for dinner to make up for it. Ever since then, I've saved all my friends' birthdays in my phone calendar so it won't happen again.\n\n**关键词 / 高分表达:** felt really guilty (感到很内疚); make up for it (弥补); won't happen again (不会再发生)","kw":""},{"num":"Q6","q":"What do  you need to remember in your daily life?","answer":"Well, there's quite a lot, actually. On a normal day I need to remember my class schedule, my passwords, and any appointments I've made. I also try to keep in mind small tasks like buying groceries or calling my parents. It sounds simple, but forgetting even one of these can throw off my whole day.\n\n**关键词 / 高分表达:** class schedule (课程表); keep in mind (记住); throw off my whole day (打乱我一整天)","kw":""}]},{"title":"Shoes","qs":[{"num":"Q1","q":"Do you like buying shoes? How often?","answer":"Well, I do enjoy buying shoes, though I'm not someone who shops for them all the time. I'd say I get a new pair maybe two or three times a year, usually when my old ones start wearing out. For instance, I just bought a pair of running shoes last month because my previous ones had holes in the soles.\n\n**关键词 / 高分表达:** wearing out（穿旧、磨损）; a pair of running shoes（一双跑鞋）; holes in the soles（鞋底破洞）","kw":""},{"num":"Q2","q":"Which do you prefer, expensive shoes or comfortable shoes?","answer":"For me, comfort wins every time. I honestly don't see the point of spending a fortune on shoes that hurt my feet just because they look fashionable. I remember buying a pricey pair once that gave me terrible blisters, so now I always try them on and walk around a bit before I decide.\n\n**关键词 / 高分表达:** comfort wins（舒适为先）; spend a fortune（花大价钱）; give me blisters（磨出水泡）","kw":""},{"num":"Q3","q":"How much money do you usually spend on shoes?","answer":"It really depends on what they're for. For everyday shoes I usually keep it around two or three hundred yuan, but I'm willing to spend a bit more on sports shoes since I need them to last. I think good-quality shoes are worth the investment because they protect your feet in the long run.\n\n**关键词 / 高分表达:** it depends（视情况而定）; worth the investment（值得投资）; in the long run（长远来看）","kw":""},{"num":"Q4","q":"Have you ever bought shoes online?","answer":"Yes, quite often actually. Buying shoes online is super convenient and there's usually a much wider range to choose from. The only downside is that you can't try them on, so sometimes the sizing is off. Last time that happened I just returned them, since most shops offer free returns these days.\n\n**关键词 / 高分表达:** a wider range（更多选择）; the sizing is off（尺码不对）; free returns（免费退货）","kw":""}]},{"title":"Plants","qs":[{"num":"Q1","q":"Do you know anything about growing plants?","answer":"Well, I know the basics, but I wouldn't call myself an expert. I understand that plants need enough sunlight, water and the right kind of soil to grow well. For example, I keep a small succulent on my desk, and I've learned the hard way that it actually dies if you water it too much.\n\n**关键词 / 高分表达:** the basics（基本常识）; succulent（多肉植物）; learn the hard way（吃亏后学会）","kw":""},{"num":"Q2","q":"Do Chinese people send plants as gifts?","answer":"Yes, quite commonly. People often give potted plants at housewarmings or when someone opens a new business, because certain plants are believed to bring good luck and wealth. My aunt, for instance, received a money tree when she started her shop, and she keeps it right by the entrance.\n\n**关键词 / 高分表达:** potted plants（盆栽）; housewarming（乔迁）; bring good luck（带来好运）","kw":""},{"num":"Q3","q":"Did you grow any plants when you were young?","answer":"Actually, I did. In primary school we had a little science project where each of us had to grow a bean sprout in a cup. I remember checking on mine every single morning, feeling so excited when the first tiny green shoot appeared. It taught me a lot of patience.\n\n**关键词 / 高分表达:** bean sprout（豆芽）; green shoot（嫩芽）; teach patience（培养耐心）","kw":""},{"num":"Q4","q":"Do you keep plants at home?","answer":"Yes, I have a few. There are a couple of small pots on my balcony and one on my study desk. I really like having them around because they add a bit of greenery and make the room feel fresher and more alive. Taking care of them is also quite relaxing after a long day.\n\n**关键词 / 高分表达:** add a bit of greenery（增添绿意）; feel fresher and more alive（更清新有生气）; relaxing（令人放松的）","kw":""}]},{"title":"Morning time","qs":[{"num":"Q1","q":"Do you like getting up early in the morning?","answer":"Honestly, not really, I've never been much of a morning person. I much prefer staying up late and sleeping in when I can. That said, I've noticed that on the rare days I do get up early, I actually feel more productive and the day seems to last longer, so I'm slowly trying to change my habits.\n\n**关键词 / 高分表达:** a morning person（早起的人）; sleep in（睡懒觉）; productive（高效的）","kw":""},{"num":"Q2","q":"What do you usually do in the morning?","answer":"My mornings are usually pretty routine. The first thing I do is wash my face and make myself a cup of coffee to wake up properly. Then I'll have a quick breakfast while scrolling through the news on my phone before heading out. It's nothing exciting, but having a routine helps me start the day smoothly.\n\n**关键词 / 高分表达:** pretty routine（很有规律）; wake up properly（彻底清醒）; start the day smoothly（顺利开启一天）","kw":""},{"num":"Q3","q":"What did you do in the morning when you were little? Why?","answer":"When I was a kid, my mornings revolved entirely around school. My mum would wake me up, rush me through breakfast, and walk me to the bus stop. I remember always being half asleep and grumpy, mainly because I never wanted to leave my warm bed. Those mornings felt like a real struggle back then.\n\n**关键词 / 高分表达:** revolve around（围绕着）; half asleep（半睡半醒）; a real struggle（很痛苦的事）","kw":""},{"num":"Q4","q":"Are there any differences between what you do in the morning now and what you did in the past?","answer":"Yes, quite a big difference actually. As a child, everything was decided for me and I just followed my parents' schedule. Now I have full control over my mornings, so I can decide when to get up and how to spend that time. I'd say my mornings are much more relaxed and independent these days.\n\n**关键词 / 高分表达:** decided for me（由别人安排）; full control（完全掌控）; independent（独立的）","kw":""},{"num":"Q5","q":"Do you spend your mornings doing the same things on both weekends and weekdays? Why or why not?","answer":"No, they're completely different. On weekdays I'm always in a rush, racing against the clock to get to work on time. But at weekends I like to take things slowly, maybe have a long lie-in and enjoy a proper breakfast without any pressure. That contrast is exactly what makes weekend mornings feel so precious.\n\n**关键词 / 高分表达:** in a rush（匆忙）; race against the clock（争分夺秒）; a long lie-in（睡个懒觉）","kw":""}]}],"qn":135},{"key":"03-events","emoji":"🎬","cn":"事件","en":"Events","topics":[{"title":"Films/cinemas","qs":[{"num":"Q1","q":"Do you prefer to watch films at home or in the cinema?","answer":"Honestly, it depends on the film. For a big action movie, I'd much rather go to the cinema because the huge screen and the sound really pull you in. But for a quiet drama or an old film, I prefer staying at home on my sofa where I can pause it and grab a snack whenever I want.\n\n**关键词 / 高分表达:** pull you in（让你沉浸其中）；grab a snack（随手拿点零食）；it depends on（取决于）","kw":""},{"num":"Q2","q":"How often do you watch films?","answer":"I'd say I watch a film about once a week, usually on Friday nights after a long week. It's my little way of switching off and relaxing. Sometimes if I'm really busy with work, a couple of weeks might go by without me watching anything at all.\n\n**关键词 / 高分表达:** switching off（放松、放空）；a couple of weeks go by（过了几周）；after a long week（忙了一周之后）","kw":""},{"num":"Q3","q":"Do you think going to the cinema is a good way to spend time with friends?","answer":"Yeah, definitely. It gives you something to do together, and afterwards you always end up chatting about the plot over a coffee or a meal. For example, last month I went with two friends and we spent almost an hour arguing about the ending, which was honestly the best part of the evening.\n\n**关键词 / 高分表达:** end up chatting（最后聊起来）；the plot（剧情）；the best part of the evening（那晚最精彩的部分）","kw":""},{"num":"Q4","q":"Do you often go to the cinema with your friends?","answer":"Not as often as I'd like, to be honest. We all have pretty different schedules, so getting everyone free on the same night is tricky. Maybe once every couple of months we manage to make it happen, and when we do, we really enjoy it.\n\n**关键词 / 高分表达:** as often as I'd like（没有我想的那么频繁）；make it happen（促成、实现）；tricky（有点难办的）","kw":""},{"num":"Q5","q":"Did you ever go to the cinema alone as a child?","answer":"No, never on my own as a kid. My parents always thought I was too young to go by myself, so I'd always go with my mum or my cousins. Actually, I only started going alone once I was in university, and I found it surprisingly relaxing.\n\n**关键词 / 高分表达:** on my own（独自一人）；surprisingly relaxing（意外地放松）；too young to（太小以至于不能）","kw":""},{"num":"Q6","q":"Did you often watch films when you were a child?","answer":"Oh yes, quite a lot. Every weekend my family would put on a Disney film, and I'd watch the same ones over and over until I knew all the songs by heart. Those movie afternoons are some of my happiest childhood memories.\n\n**关键词 / 高分表达:** put on a film（放一部电影）；over and over（一遍又一遍）；by heart（记得滚瓜烂熟）","kw":""},{"num":"Q7","q":"What films do you like?","answer":"I'm really into science fiction films, the kind that make you think about the future. I love how they mix exciting stories with big ideas about technology. My all-time favourite is Interstellar, because it's visually stunning and the ending still gives me goosebumps every time.\n\n**关键词 / 高分表达:** into science fiction（喜欢科幻）；visually stunning（画面震撼）；gives me goosebumps（让我起鸡皮疙瘩、很感动）","kw":""}]},{"title":"Jokes & Comedies","qs":[{"num":"Q1","q":"Have you ever watched a live show?","answer":"Yes, I went to a stand-up comedy show last year with a couple of friends. The atmosphere was completely different from watching something on a screen, because you could feel everyone laughing around you. I remember the comedian even teased someone in the front row, and the whole room burst out laughing.\n\n**关键词 / 高分表达:** stand-up comedy（单口喜剧）；burst out laughing（哄堂大笑）；the atmosphere（气氛）","kw":""},{"num":"Q2","q":"Do you like to watch comedies?","answer":"Oh, I love them. After a stressful day, there's nothing better than putting on a funny film to take my mind off things. I especially enjoy light-hearted comedies that don't require much thinking, so I can just switch off and have a good laugh.\n\n**关键词 / 高分表达:** take my mind off things（转移注意力、放松）；light-hearted（轻松愉快的）；have a good laugh（好好笑一场）","kw":""},{"num":"Q3","q":"Do your friends like to tell jokes?","answer":"Yeah, one of my closest friends is basically the comedian of our group. He's always got a funny story or a silly pun ready, and he keeps the mood light whenever we're together. Honestly, hanging out with him never gets boring.\n\n**关键词 / 高分表达:** the comedian of our group（我们中的开心果）；pun（双关语）；keeps the mood light（活跃气氛）","kw":""},{"num":"Q4","q":"Are you good at telling jokes?","answer":"Not really, if I'm being honest. I usually forget the punchline or mess up the timing, so my jokes tend to fall flat. I'm much better at being the audience and laughing at other people's jokes than actually telling them myself.\n\n**关键词 / 高分表达:** punchline（笑点、包袱）；mess up the timing（把节奏搞砸）；fall flat（没能引人发笑、冷场）","kw":""}]},{"title":"dream and ambition","qs":[{"num":"Q1","q":"Do you think you are an ambitious person?","answer":"Yes, I'd say I'm fairly ambitious, though in a quiet way. I always set myself goals and work steadily towards them, rather than chasing after huge dreams overnight. For example, I've been slowly building up my skills at work because I really want to grow into a leadership role someday.\n\n**关键词 / 高分表达:** set myself goals（给自己定目标）；work steadily towards（稳步努力）；grow into a role（成长为某个职位）","kw":""},{"num":"Q2","q":"What is your dream job?","answer":"My dream job would be to work as a designer at a creative studio. I've always loved coming up with ideas and turning them into something people can actually use. To me, the perfect job is one where I feel excited to get up in the morning, not just one that pays well.\n\n**关键词 / 高分表达:** creative studio（创意工作室）；coming up with ideas（想出点子）；pays well（薪水高）","kw":""},{"num":"Q3","q":"Are you the kind of person who follows their dreams?","answer":"I like to think so, yes. Whenever I really want something, I'm willing to put in the effort and take a few risks to make it happen. A good example is when I changed my major in university, even though people warned me it'd be tough, because I knew it was what I truly wanted.\n\n**关键词 / 高分表达:** put in the effort（付出努力）；take a few risks（冒些风险）；what I truly wanted（我真正想要的）","kw":""},{"num":"Q4","q":"What was your childhood dream?","answer":"When I was little, I was absolutely convinced I'd become an astronaut. I was obsessed with space and used to stare at the stars for hours, imagining flying to the moon. My dream has changed a lot since then, of course, but that sense of curiosity has stuck with me.\n\n**关键词 / 高分表达:** obsessed with（着迷于）；stare at the stars（凝望星空）；stuck with me（一直伴随着我）","kw":""}]},{"title":"Shopping","qs":[{"num":"Q1","q":"Do you prefer online shopping or in-store shopping？","answer":"Well, it really depends on what I'm buying. For everyday stuff like snacks or household items, I definitely prefer online shopping because it's so convenient and the deliveries are super fast. But when it comes to clothes or shoes, I'd rather go to a physical store so I can try them on and make sure they actually fit.\n\n**关键词 / 高分表达:** it depends on (取决于)；household items (日用品)；try them on (试穿)；physical store (实体店)","kw":""},{"num":"Q2","q":"How often do you go shopping？","answer":"I'd say I shop online almost every week, mostly for small things I run out of. As for going to shopping malls, it's much less often, maybe once a month or so. Usually I go on weekends when I want to relax and grab a coffee with my friends at the same time.\n\n**关键词 / 高分表达:** run out of (用完)；once a month or so (大约一个月一次)；grab a coffee (随便喝杯咖啡)","kw":""},{"num":"Q3","q":"Do you like shopping?","answer":"Yes, I quite enjoy it, though maybe not as much as some of my friends do. For me, it's a nice way to unwind after a stressful week, especially wandering around a big mall with no particular plan. That said, I do get tired pretty quickly if I have to shop for hours.\n\n**关键词 / 高分表达:** unwind (放松)；wander around (闲逛)；with no particular plan (没有特定计划)","kw":""}]},{"title":"Art","qs":[{"num":"Q1","q":"Do you like modern art or traditional art?","answer":"I'd say I lean more towards traditional art, to be honest. There's something about classic Chinese ink paintings that I find really calming and elegant. Modern art can be interesting too, but sometimes I struggle to understand what the artist is actually trying to say.\n\n**关键词 / 高分表达:** lean towards (更偏向于)；ink paintings (水墨画)；struggle to understand (难以理解)","kw":""},{"num":"Q2","q":"Do you want to be an artist?","answer":"Not really, at least not as a career. While I love appreciating art, I don't think I have the talent or the patience to make a living from it. For me, it's much more enjoyable to keep it as a hobby and draw purely for fun.\n\n**关键词 / 高分表达:** make a living from it (以此谋生)；talent and patience (天赋与耐心)；purely for fun (纯粹为了乐趣)","kw":""},{"num":"Q3","q":"Do you like visiting art galleries?","answer":"Yes, I do, though I don't go as often as I'd like. There's a small gallery near my university that I visited a few times, and I always found it a peaceful place to slow down and think. Standing in front of a beautiful painting somehow helps me escape the busy pace of daily life.\n\n**关键词 / 高分表达:** slow down (放慢脚步)；peaceful place (宁静之所)；the busy pace of daily life (日常生活的忙碌节奏)","kw":""},{"num":"Q4","q":"Do you like art?","answer":"Yes, I have a real soft spot for it. I think art adds so much colour and meaning to our lives, and it's a beautiful way for people to express their emotions. Even something simple, like a well-designed poster on the street, can brighten up my whole day.\n\n**关键词 / 高分表达:** a soft spot for (对……情有独钟)；express emotions (表达情感)；brighten up my day (让我一天都开心)","kw":""}]},{"title":"Music","qs":[{"num":"Q1","q":"Does happy music make you feel more excited？","answer":"Oh, definitely. Upbeat music has this amazing power to instantly boost my energy. For example, whenever I'm cleaning my room or getting ready in the morning, I put on some cheerful pop songs, and suddenly the whole task feels lighter and more fun.\n\n**关键词 / 高分表达:** upbeat music (欢快的音乐)；boost my energy (提升我的精力)；feels lighter (感觉轻松)","kw":""},{"num":"Q2","q":"Do you prefer sad or happy music？","answer":"Most of the time I go for
