ful place ；the busy pace of daily life ","kw":""},{"num":"Q4","q":"Do you like art?","answer":"Yes, I have a real soft spot for it. I think art adds so much colour and meaning to our lives, and it's a beautiful way for people to express their emotions. Even something simple, like a well-designed poster on the street, can brighten up my whole day.\n\n**Keywords / High-scoring expressions:** a soft spot for ；express emotions ；brighten up my day ","kw":""}]},{"title":"Music","qs":[{"num":"Q1","q":"Does happy music make you feel more excited？","answer":"Oh, definitely. Upbeat music has this amazing power to instantly boost my energy. For example, whenever I'm cleaning my room or getting ready in the morning, I put on some cheerful pop songs, and suddenly the whole task feels lighter and more fun.\n\n**Keywords / High-scoring expressions:** upbeat music ；boost my energy ；feels lighter ","kw":""},{"num":"Q2","q":"Do you prefer sad or happy music？","answer":"Most of the time I go for happy music, since it just fits my personality and keeps me in a good mood. That said, I do turn to slower, sadder songs now and then, especially when I'm feeling down and want to reflect on things. So I guess it really depends on my mood at the moment.\n\n**Keywords / High-scoring expressions:** go for ；keeps me in a good mood ；when I'm feeling down ","kw":""}]},{"title":"Outer space and stars","qs":[{"num":"Q1","q":"Do you want to know more about outer space?","answer":"Yes, absolutely, I find outer space endlessly fascinating. There's just so much out there that we still don't understand, and that mystery really draws me in. Whenever a new discovery about a distant planet makes the news, I can't help but read all about it.\n\n**Keywords / High-scoring expressions:** endlessly fascinating ；draws me in ；can't help but ","kw":""},{"num":"Q2","q":"Do you want to go into outer space in the future?","answer":"Well, part of me would absolutely love to, just to see the Earth from above and float around in zero gravity. But to be honest, the other part of me is a bit scared, because space travel still seems quite risky. Maybe if it becomes safer and more affordable one day, I'd seriously give it a go.\n\n**Keywords / High-scoring expressions:** zero gravity ；quite risky ；give it a go ","kw":""},{"num":"Q3","q":"Do you like science fiction movies?Why?","answer":"Yes, I'm a big fan of them. What I love is how they let your imagination run wild and picture worlds that don't exist yet. For instance, after watching a film about interstellar travel, I spent the whole evening wondering what life might be like on other planets.\n\n**Keywords / High-scoring expressions:** a big fan of ；imagination run wild ；interstellar travel ","kw":""},{"num":"Q4","q":"Have you ever learnt about outer space and stars?","answer":"Yes, mostly back in school during our science and geography lessons. I still remember learning about the solar system and trying to memorize the order of the planets. Apart from that, I've picked up quite a lot from documentaries and articles just out of my own curiosity.\n\n**Keywords / High-scoring expressions:** the solar system ；the order of the planets ；out of my own curiosity ","kw":""}]},{"title":"Reading","qs":[{"num":"Q1","q":"Do you prefer scanning or detailed reading?","answer":"It really depends on what I'm reading, to be honest. When I'm going through the news or an article online, I usually just scan it quickly to get the main idea. But if it's a novel or something I'm studying, I slow right down and read every word carefully. So I switch between the two depending on the situation.\n\n**Keywords / High-scoring expressions:** scan；get the main idea；slow down","kw":""},{"num":"Q2","q":"When do you need to read carefully,and when not?","answer":"I need to read carefully whenever the details actually matter, like a contract or instructions for something. Missing one small point there could cause real problems later. On the other hand, for things like social media posts or a menu, a quick glance is more than enough. Basically, the more important the text, the more attention I give it.\n\n**Keywords / High-scoring expressions:** details matter；a quick glance；give attention","kw":""},{"num":"Q3","q":"Do you prefer to read on paper or on a screen?","answer":"Personally, I still prefer paper, especially for longer books. There's just something relaxing about holding a real book and flipping through the pages. Screens tire my eyes out after a while, and I get distracted by notifications too easily. That said, I do use my phone for quick reading when I'm out and about.\n\n**Keywords / High-scoring expressions:** flip through the pages；tire my eyes out；out and about","kw":""},{"num":"Q4","q":"Do you like reading?","answer":"Yes, I'd say I'm quite a keen reader. I mostly enjoy fiction, particularly mystery novels, because I love trying to guess the ending before it comes. I usually read for half an hour before bed to help me unwind. It's honestly one of my favourite ways to escape from a busy day.\n\n**Keywords / High-scoring expressions:** a keen reader；unwind；escape from","kw":""}]},{"title":"Walking","qs":[{"num":"Q1","q":"Where did you go for a walk lately?","answer":"Just last weekend, I went for a walk along the river near my apartment. The weather was lovely, so I strolled there for about an hour with a coffee in hand. There were lots of families and dog walkers around, which made it feel really lively. It's become my go-to spot whenever I need to clear my head.\n\n**Keywords / High-scoring expressions:** stroll；coffee in hand；clear my head","kw":""},{"num":"Q2","q":"Where would you like to take a long walk if you had the chance?","answer":"If I had the chance, I'd love to hike along the coast somewhere like New Zealand. I've seen pictures of those cliff-side trails with the ocean right beside you, and they look absolutely stunning. I imagine the fresh sea air would make the whole walk so refreshing. That's definitely on my bucket list.\n\n**Keywords / High-scoring expressions:** cliff-side trails；stunning；bucket list","kw":""},{"num":"Q3","q":"Why do people like to walk in parks?","answer":"I think it's mainly because parks feel so peaceful compared to the busy streets. Being surrounded by trees and greenery really helps people relax and forget about their stress. On top of that, the air is usually much fresher there, which makes the walk more pleasant. It's basically a little escape from city life.\n\n**Keywords / High-scoring expressions:** greenery；forget about stress；escape from city life","kw":""},{"num":"Q4","q":"Did you often go outside to have a walk when you were a child?","answer":"Yeah, quite a lot actually. My grandparents used to take me out for a walk after dinner almost every evening. We'd wander around the neighbourhood and they'd chat with people they knew along the way. Looking back, those little walks were a really nice part of my childhood.\n\n**Keywords / High-scoring expressions:** after dinner；wander around；looking back","kw":""},{"num":"Q5","q":"Do you walk a lot?","answer":"These days, yes, more than I used to. Since my office isn't too far away, I've started walking there instead of taking the bus. It only takes about twenty-five minutes and it's a nice way to wake up in the morning. Plus, my step counter keeps pushing me to hit ten thousand steps a day.\n\n**Keywords / High-scoring expressions:** instead of；wake up；hit ten thousand steps","kw":""}]},{"title":"Day off","qs":[{"num":"Q1","q":"What would you like to do if you had a day off tomorrow?","answer":"If I had tomorrow off, I'd probably start by sleeping in, since I never get to do that during the week. After that, I'd love to meet a couple of friends for brunch and just take things slow. Maybe in the afternoon I'd catch a movie or read at a café. Honestly, a relaxed day with no plans sounds perfect to me.\n\n**Keywords / High-scoring expressions:** sleep in；take things slow；no plans","kw":""},{"num":"Q2","q":"Do you usually spend your days off with your parents or with your friends?","answer":"It's a bit of a mix, actually. I usually try to have dinner with my parents at least once on my day off, since I live nearby and they love seeing me. But if I'm meeting up for something more active, like hiking or shopping, then it's normally with my friends. So it really depends on the mood I'm in.\n\n**Keywords / High-scoring expressions:** a bit of a mix；meet up；depends on the mood","kw":""},{"num":"Q3","q":"What do you usually do when you have days off?","answer":"Most of the time, I like to keep it fairly low-key. I'll catch up on some sleep, tidy the apartment, and maybe cook a proper meal for a change. If the weather's nice, I might head out for a walk or visit a new café in town. Basically, I use my days off to recharge for the week ahead.\n\n**Keywords / High-scoring expressions:** low-key；catch up on sleep；recharge","kw":""},{"num":"Q4","q":"When was the last time you had a few days off?","answer":"That was during the last public holiday, about a month ago. I took a short trip to a nearby city with my partner, and we spent three days exploring and eating far too much street food. It was such a nice break from the daily routine. By the time we got back, I felt completely refreshed.\n\n**Keywords / High-scoring expressions:** public holiday；a nice break；refreshed","kw":""}]},{"title":"Typing","qs":[{"num":"Q1","q":"How do you improve your typing?","answer":"Well, honestly the main way I've improved is just by typing a lot every day, since I chat with friends and write notes constantly. A while ago I also tried a free typing website that made me practice without looking at the keyboard, which really helped my speed. These days I can type fairly quickly without staring down at my hands.\n\n**Keywords / High-scoring expressions:** without looking at the keyboard ; type quickly ; practice every day ","kw":""},{"num":"Q2","q":"When did you learn how to type on a keyboard?","answer":"I'd say I first started when I was around ten, mostly because we had a computer class in primary school. At the beginning I was really slow and had to search for each letter one by one. Over time, though, playing online games and messaging my classmates forced me to get faster, so it just came naturally.\n\n**Keywords / High-scoring expressions:** one by one ; came naturally ; computer class ","kw":""},{"num":"Q3","q":"Do you type on a desktop or laptop keyboard every day?","answer":"To be honest, it's almost always my laptop these days, because I carry it everywhere and it's just more convenient. I use a desktop only when I'm gaming at home, since the bigger keyboard feels nicer for that. But for studying and everyday tasks, the laptop is definitely my go-to.\n\n**Keywords / High-scoring expressions:** my go-to ; carry it everywhere ; more convenient ","kw":""},{"num":"Q4","q":"Do you prefer typing or handwriting?","answer":"I'd say I prefer typing for most things, simply because it's so much faster and I can easily fix my mistakes. That said, when I really want to remember something, like new vocabulary, I still write it by hand because it sticks in my memory better. So it kind of depends on what I'm doing.\n\n**Keywords / High-scoring expressions:** fix my mistakes ; sticks in my memory ; it depends ","kw":""}]},{"title":"Childhood activities","qs":[{"num":"Q1","q":"Did you prefer to do activities alone or with agroup of people when you were a child?","answer":"Well, as a kid I definitely preferred doing things with a group, especially playing outside with the neighbourhood children. We used to play hide-and-seek every evening after dinner, and it was just so much more fun with lots of people. I was quite a sociable child, so being alone felt a bit boring to me back then.\n\n**Keywords / High-scoring expressions:** hide-and-seek ; sociable ; the neighbourhood children ","kw":""},{"num":"Q2","q":"What were your favourite activities when you werea child?","answer":"To be honest, my favourite thing was riding my bike around the small streets near my home. My cousins and I would race each other and pretend we were on some big adventure. I also loved drawing cartoons, because I could just sit for hours making up my own little stories. Looking back, those were really carefree days.\n\n**Keywords / High-scoring expressions:** race each other ; make up stories ; carefree days ","kw":""}]},{"title":"Going out","qs":[{"num":"Q1","q":"How often do you use cash?","answer":"Honestly, I hardly ever use cash these days, maybe once every couple of months at most. Almost everywhere here accepts mobile payment, so I just scan a QR code with my phone. The only time I really need notes is when I visit a small local market where an older vendor doesn't take digital payments.\n\n**Keywords / High-scoring expressions:** hardly ever ; mobile payment ; scan a QR code ","kw":""},{"num":"Q2","q":"Do you often bring cash with you?","answer":"Not really, to be honest. I usually just carry my phone because it does everything a wallet used to do. That said, I do keep a small amount of cash tucked in my bag for emergencies, like if my phone runs out of battery. But most days I forget the cash is even there.\n\n**Keywords / High-scoring expressions:** tucked in my bag ; for emergencies ; runs out of battery ","kw":""},{"num":"Q3","q":"Do you always take your mobile phone with you when going out?","answer":"Oh, absolutely, I never leave home without it. My phone is basically my wallet, my map, and my way of contacting people all in one. If I accidentally forget it, I feel really uneasy and usually end up going back for it. It's become such a huge part of my daily life.\n\n**Keywords / High-scoring expressions:** never leave home without it ; feel uneasy ; all in one ","kw":""},{"num":"Q4","q":"Do you bring food or snacks with you when going out?","answer":"It really depends on where I'm going. For a short trip I usually don't bother, but if I'm heading out for a whole day, like hiking, I'll pack some biscuits and a bottle of water. I get grumpy when I'm hungry, so having a snack on hand keeps me in a good mood.\n\n**Keywords / High-scoring expressions:** don't bother ; on hand ; get grumpy ","kw":""}]},{"title":"Doing something well","qs":[{"num":"Q1","q":"Do you often tell your friends when they do something well?","answer":"Yeah, I definitely try to, because I think a bit of encouragement goes a long way. For instance, when my friend did a great presentation last month, I told her straight away how impressed I was. I know how good it feels to be praised, so I like to pass that feeling on to others.\n\n**Keywords / High-scoring expressions:** goes a long way ; straight away ; pass that feeling on ","kw":""},{"num":"Q2","q":"Do you have an experience that your teacher thought you did a good job?","answer":"Yeah, I remember once in high school I wrote an essay that my Chinese teacher really liked. She read it aloud to the whole class as an example, which honestly made me a little embarrassed but really proud. That moment gave me a lot of confidence in my writing, and I still remember it clearly.\n\n**Keywords / High-scoring expressions:** read it aloud ; a little embarrassed ; gave me confidence ","kw":""},{"num":"Q3","q":"Do you have an experience that you did something well?","answer":"Well, one thing that comes to mind is when I helped organise a small birthday party for my best friend. I planned everything from the decorations to the food, and it all went really smoothly. Seeing how happy she was made me feel that all my effort had truly paid off. It's a lovely memory.\n\n**Keywords / High-scoring expressions:** went smoothly ; paid off ; comes to mind ","kw":""}]},{"title":"Taking photos","qs":[{"num":"Q1","q":"Do you like taking photos?","answer":"Yes, I really do. I love taking photos because they help me hold on to nice moments that would otherwise slip away. For example, last summer I went hiking with my friends, and I took loads of pictures of the sunset from the top of the hill. Now whenever I look back at them, all those good feelings come rushing back.\n\n**Keywords / High-scoring expressions:** hold on to moments; slip away; come rushing back","kw":""},{"num":"Q2","q":"Do you like taking selfies?","answer":"To be honest, not really. I'm a bit shy in front of the camera, so I'd rather take photos of scenery or my friends than of myself. That said, I do occasionally snap a selfie when I'm somewhere special, like when I visited the Bund in Shanghai, just to prove I was actually there.\n\n**Keywords / High-scoring expressions:** shy in front of the camera; snap a selfie; prove I was actually there","kw":""},{"num":"Q3","q":"Where do you like to go to take photos?","answer":"I'd say my favourite place is the park near my home, especially in autumn. The leaves turn this beautiful golden colour, and the soft light in the late afternoon makes everything look magical. I usually go there on weekends with my phone and just wander around looking for nice shots.\n\n**Keywords / High-scoring expressions:** golden colour; magical; wander around","kw":""},{"num":"Q4","q":"What is your favourite family photo?","answer":"My favourite one is a photo we took during Spring Festival a few years ago. The whole family gathered at my grandmother's house, and someone caught us all laughing at a joke my uncle made. What I love about it is that it feels so genuine, not posed at all, so it really captures how warm our family gatherings are.\n\n**Keywords / High-scoring expressions:** family gathering; genuine; not posed","kw":""},{"num":"Q5","q":"Do you like taking selfies?","answer":"Well, as I mentioned, selfies aren't really my thing. I feel a little awkward pointing the camera at my own face, and honestly I never think my selfies turn out that well. I much prefer having a friend take a candid shot of me while I'm not paying attention.\n\n**Keywords / High-scoring expressions:** not really my thing; turn out well; candid shot","kw":""},{"num":"Q6","q":"What is your favorite family photo?","answer":"There's one photo I'm especially fond of, from a trip we took to the seaside when I was about ten. My dad is carrying me on his shoulders and we're both squinting because of the bright sun. Every time I see it, I remember how carefree that whole holiday felt, so it holds a special place in my heart.\n\n**Keywords / High-scoring expressions:** fond of; squinting; carefree","kw":""},{"num":"Q7","q":"Do you want to improve your picture taking skills?","answer":"Definitely, yes. Right now I mostly just point and shoot, but I'd love to learn more about things like composition and lighting. I've actually been watching a few short tutorials online, and I'm hoping that with a bit of practice I can start taking photos that look more professional.\n\n**Keywords / High-scoring expressions:** point and shoot; composition and lighting; with a bit of practice","kw":""}]},{"title":"Spare time","qs":[{"num":"Q1","q":"Would you like to have more free time in the future?","answer":"Absolutely, who wouldn't? Right now my days are packed with study, so I barely have a moment to myself. If I had more free time, I'd love to pick up hobbies I've always wanted to try, like learning the guitar or doing more travelling. I think having time to unwind is really important for staying happy.\n\n**Keywords / High-scoring expressions:** packed with; pick up a hobby; unwind","kw":""},{"num":"Q2","q":"Which day do you have more free time on, Saturday or Sunday?","answer":"I'd say Saturday, without a doubt. On Sundays I usually have to prepare for the week ahead, so my mind is already half back at work. But on Saturdays I can properly relax, sleep in, and do whatever I feel like without worrying about anything.\n\n**Keywords / High-scoring expressions:** without a doubt; the week ahead; sleep in","kw":""},{"num":"Q3","q":"Do you often have free time?","answer":"Honestly, not as much as I'd like. During the week I'm pretty busy, so my free time mostly comes at the weekend. Even then, it tends to get eaten up by chores and errands. Still, I always try to carve out at least an hour or two just for myself.\n\n**Keywords / High-scoring expressions:** eaten up by; chores and errands; carve out time","kw":""},{"num":"Q4","q":"What do you and your family like to do in spare time?","answer":"We enjoy pretty simple things together. A lot of the time we'll just cook a nice meal and chat over dinner, or go for a stroll in the park nearby. Occasionally we'll watch a movie at home with some snacks. It's nothing fancy, but those are the moments I treasure the most.\n\n**Keywords / High-scoring expressions:** go for a stroll; nothing fancy; treasure","kw":""},{"num":"Q5","q":"Do you think you will spend more time with your family?","answer":"I certainly hope so. As I get older, I've come to realise how precious that time is, especially with my parents. Life gets busier and busier, but I'm making a real effort to visit home more often and just be present when I'm there.\n\n**Keywords / High-scoring expressions:** precious; make a real effort; be present","kw":""},{"num":"Q6","q":"Do you like to spend time with your family?","answer":"Yes, very much so. My family is my comfort zone, the place where I can completely be myself and let my guard down. Whether we're chatting about our day or just sitting quietly together, I always feel relaxed and recharged afterwards.\n\n**Keywords / High-scoring expressions:** comfort zone; let my guard down; recharged","kw":""},{"num":"Q7","q":"What do you usually do when you are free?","answer":"When I've got some free time, I usually reach for a good book or catch up on a series I've been following. If the weather's nice, though, I prefer to head outside and go for a bike ride to clear my head. It really helps me switch off from all the stress.\n\n**Keywords / High-scoring expressions:** catch up on a series; clear my head; switch off","kw":""}]},{"title":"Borrowing/lending","qs":[{"num":"Q1","q":"Do you mind if others borrow money from you?","answer":"It really depends on who's asking and how much. If it's a close friend and just a small amount, I'm happy to help out without a second thought. But when it comes to larger sums, I'd be a bit more cautious, simply because money can sometimes put a strain on relationships.\n\n**Keywords / High-scoring expressions:** without a second thought; larger sums; put a strain on","kw":""},{"num":"Q2","q":"Have you ever borrowed books from others?","answer":"Yes, quite a few times. Back in university, my roommate had a huge collection of novels, and I was always borrowing them from her. I remember she lent me a mystery novel that I finished in just two days because I couldn't put it down. I always made sure to return them in good condition, though.\n\n**Keywords / High-scoring expressions:** a huge collection; couldn't put it down; in good condition","kw":""},{"num":"Q3","q":"Have you ever borrowed money from others?","answer":"Only once or twice, and only in a pinch. I recall one time I left my wallet at home and had to borrow a bit of lunch money from a colleague. I felt slightly embarrassed, so I paid her back the very next morning. Generally, I try to avoid borrowing money if I possibly can.\n\n**Keywords / High-scoring expressions:** in a pinch; pay back; slightly embarrassed","kw":""},{"num":"Q4","q":"Do you like to lend things to others?","answer":"On the whole, yes, I'm quite a generous person. If a friend needs something I have, like a charger or an umbrella, I'll gladly lend it to them. That said, I'm a little protective of things that really matter to me, so I might hesitate before lending out something valuable.\n\n**Keywords / High-scoring expressions:** on the whole; generous; protective of","kw":""},{"num":"Q5","q":"How do you feel when people don't return things they borrowed from you?","answer":"To be honest, it does bother me a little, especially if it's something I use regularly. It's not really about the item itself, but more that it feels a bit disrespectful. Usually I'll drop a gentle reminder rather than make a big deal out of it, since I don't like awkward situations.\n\n**Keywords / High-scoring expressions:** it bothers me; disrespectful; drop a gentle reminder","kw":""}]},{"title":"Sharing","qs":[{"num":"Q1","q":"What kinds of news do you share with our friends?","answer":"Mostly the kind of news that I think they'll find interesting or useful. For example, if I come across a great deal on something, or hear about a concert coming to town, I'll immediately forward it to them. I also love sharing funny videos, because there's nothing better than making your friends laugh.\n\n**Keywords / High-scoring expressions:** come across; a great deal; forward","kw":""},{"num":"Q2","q":"Who is the first person you like to share good news with?","answer":"Without a doubt, it's my mum. She's always the first person I call whenever something good happens, whether it's passing an exam or getting some praise at work. She gets so genuinely excited for me that it honestly doubles the joy, so telling her just feels natural.\n\n**Keywords / High-scoring expressions:** without a doubt; genuinely excited; double the joy","kw":""},{"num":"Q3","q":"Did your parents teach you to share when you were a child?","answer":"Yes, they definitely did. My mum always reminded me to share my toys and snacks with other kids, especially my younger cousins. I remember she'd say that sharing makes everyone happier, and looking back, I think that early lesson really shaped how I treat people today.\n\n**Keywords / High-scoring expressions:** remind me to; looking back; shape","kw":""},{"num":"Q4","q":"What kind of things do you like to share with others?","answer":"I enjoy sharing all sorts of things, but mostly experiences rather than objects. For instance, if I discover a nice little restaurant, I love taking my friends there so we can enjoy it together. I also happily share my knowledge or advice whenever someone asks, because it feels good to be helpful.\n\n**Keywords / High-scoring expressions:** all sorts of things; discover; be helpful","kw":""},{"num":"Q5","q":"What kind of things are not suitable for sharing?","answer":"I'd say very personal or private matters really shouldn't be shared, like other people's secrets or someone's private struggles. I'm also careful about sharing sensitive personal information online, such as my address or bank details, because you never know who might see it.\n\n**Keywords / High-scoring expressions:** private matters; private struggles; sensitive information","kw":""},{"num":"Q6","q":"Do you have anything to share with others recently?","answer":"Actually, yes. I recently finished a really gripping TV series that I've been recommending to everyone I know. The story had so many unexpected twists that I just can't stop talking about it. I've already convinced two of my friends to start watching it, so hopefully we can discuss it soon.\n\n**Keywords / High-scoring expressions:** gripping; unexpected twists; recommend","kw":""}]},{"title":"Scenery","qs":[{"num":"Q1","q":"What are the most beautiful sights you have seen while travelling?","answer":"The most breathtaking sight I've ever seen was the sunrise at the top of a mountain in Yunnan. We got up before dawn and hiked up in the dark, and when the sun finally rose above the clouds, the whole sky turned pink and gold. It was absolutely stunning, and completely worth the early start.\n\n**Keywords / High-scoring expressions:** breathtaking; above the clouds; worth the early start","kw":""},{"num":"Q2","q":"Do you like to take scenery pictures?","answer":"Yes, I really enjoy it. Whenever I come across a beautiful view, my first instinct is to reach for my phone and capture it. For me, scenery photos are a lovely way to remember a place, and looking back at them later always brings back happy travel memories.\n\n**Keywords / High-scoring expressions:** first instinct; capture; bring back memories","kw":""},{"num":"Q3","q":"Do you prefer the mountains or the sea?","answer":"That's a tough one, but I think I'd go for the sea. There's something incredibly calming about the sound of the waves and the endless horizon. Whenever I'm feeling stressed, just sitting on the beach and watching the water helps me clear my mind and completely relax.\n\n**Keywords / High-scoring expressions:** a tough one; endless horizon; clear my mind","kw":""},{"num":"Q4","q":"Do you look out the window at the scenery when travelling by bus or car?","answer":"Yes, all the time. I actually find it one of the best parts of any journey. I love watching the landscape gradually change as we drive along, from busy city streets to open countryside. It's really relaxing, and it stops the trip from feeling boring.\n\n**Keywords / High-scoring expressions:** the best parts of a journey; landscape; open countryside","kw":""}]},{"title":"Happy things","qs":[{"num":"Q1","q":"Do you think people are happy when buying new things?","answer":"Yes, I think most people do get a real buzz from buying something new. There's that little thrill of excitement when you finally own something you've been wanting. That said, I feel this kind of happiness tends to be short-lived, and once the novelty wears off, we usually start eyeing the next thing.\n\n**Keywords / High-scoring expressions:** get a buzz from; short-lived; the novelty wears off","kw":""},{"num":"Q2","q":"Do you feel happy when buying new things?","answer":"Definitely, especially if it's something I've saved up for. For example, I recently bought a new laptop after months of waiting, and I was over the moon when it finally arrived. There's just something satisfying about unboxing something new and knowing it's going to make my life a bit easier.\n\n**Keywords / High-scoring expressions:** save up for; over the moon; satisfying","kw":""},{"num":"Q3","q":"When do you feel happy at work? Why?","answer":"I feel happiest when I finish a difficult task that I've been struggling with for a while. There's a real sense of accomplishment that comes with it. I also love it when my teammates and I work well together and actually get results, because that kind of teamwork makes even a stressful day feel worthwhile.\n\n**Keywords / High-scoring expressions:** a sense of accomplishment; get results; worthwhile","kw":""},{"num":"Q4","q":"Is there anything that has made you feel happy lately?","answer":"Yes, actually. Just last weekend an old friend I hadn't seen in years came to visit, and we spent the whole day catching up over coffee. It felt like no time had passed at all, and I was reminded how lucky I am to have friends like that. It really lifted my spirits.\n\n**Keywords / High-scoring expressions:** catch up; no time had passed; lift my spirits","kw":""},{"num":"Q5","q":"What do you think will make you feel happy in the future?","answer":"I'd say achieving a good balance between my work and personal life would make me genuinely happy. I don't dream of being super rich, but I'd love to have a stable job, good health, and enough time to spend with the people I care about. To me, that's what really matters most in the long run.\n\n**Keywords / High-scoring expressions:** a good balance; stable job; in the long run","kw":""},{"num":"Q6","q":"What made you happy when you were little?","answer":"As a kid, the simplest things made me incredibly happy. I remember being absolutely thrilled whenever my parents took me to the amusement park or bought me an ice cream on a hot day. Looking back, I think it was the carefree feeling of having no worries at all that made those moments so joyful.\n\n**Keywords / High-scoring expressions:** thrilled; amusement park; carefree","kw":""}]}],"qn":89},{"key":"04-places","emoji":"📍","cn":"Places","en":"Places","topics":[{"title":"The area you live in","qs":[{"num":"Q1","q":"What are some changes in the area recently?","answer":"Well, quite a few things have changed lately. The biggest one is that they opened a new subway station just around the corner, so getting to the city centre is so much easier now. They've also turned an old parking lot into a small park with benches and trees, which the whole neighbourhood really enjoys.\n\n**Keywords / High-scoring expressions:** around the corner; turn ... into; the whole neighbourhood","kw":""},{"num":"Q2","q":"Are the people in your neighborhood nice and friendly？","answer":"To be honest, most of them are really warm and easy-going. My next-door neighbour, an elderly lady, often gives us homemade dumplings during festivals, which I find so sweet. I think living close to kind people like that makes daily life a lot more pleasant.\n\n**Keywords / High-scoring expressions:** easy-going; next-door neighbour; homemade","kw":""},{"num":"Q3","q":"Do you live in a noisy or a quiet area?","answer":"I'd say my area is fairly quiet, especially in the evenings. It's mainly residential, so there's no busy nightlife or heavy traffic passing through. Sometimes I can even hear birds in the morning, which is quite rare for a big city.\n\n**Keywords / High-scoring expressions:** residential; nightlife; heavy traffic","kw":""},{"num":"Q4","q":"Do you know any of your neighbors?","answer":"Actually, I know a few of them, though not all. I'm quite close with the family living downstairs because our kids play together in the courtyard. With the others, I usually just exchange a friendly nod or a quick chat in the lift.\n\n**Keywords / High-scoring expressions:** exchange a friendly nod; courtyard; in the lift","kw":""},{"num":"Q5","q":"Do you like the area that you live in?","answer":"Yes, I really do. It has everything I need within walking distance — a supermarket, a couple of nice cafés, and a small clinic. On top of that, it feels safe and peaceful, so I can't really complain.\n\n**Keywords / High-scoring expressions:** within walking distance; on top of that; can't complain","kw":""},{"num":"Q6","q":"What changes have been made to the area recently?","answer":"Recently the local government has done a lot to brighten the place up. They repainted the old apartment blocks and added better street lighting, so it feels much safer at night. There's also a new bike-sharing station, which encourages people to cycle instead of driving.\n\n**Keywords / High-scoring expressions:** brighten ... up; street lighting; bike-sharing","kw":""},{"num":"Q7","q":"Do you know any famous people in your area?","answer":"Not really any big celebrities, to be honest. But there's a well-known calligrapher who lives a few buildings away, and people sometimes ask him to write couplets for the Spring Festival. He's quite a respected figure locally.\n\n**Keywords / High-scoring expressions:** celebrity; calligrapher; respected figure","kw":""},{"num":"Q8","q":"Where do you like to go in that area?","answer":"My favourite spot is definitely the little riverside path near my flat. I go there most evenings for a walk to clear my head after work. It's especially lovely in spring when the willow trees start turning green.\n\n**Keywords / High-scoring expressions:** riverside path; clear my head; willow trees","kw":""}]},{"title":"Hometown","qs":[{"num":"Q1","q":"Did you learn about the history of your hometown at school?","answer":"Yes, we did cover a bit of it in primary school. I remember a teacher taking us to a small local museum to see old photos and tools. It wasn't very detailed, but it did make me curious about how my hometown developed over time.\n\n**Keywords / High-scoring expressions:** cover; local museum; develop over time","kw":""},{"num":"Q2","q":"What's your hometown famous for?","answer":"My hometown is best known for its tea. The hills around the town are covered in tea plantations, and people come from all over to buy fresh leaves in spring. It's something the locals are genuinely proud of.\n\n**Keywords / High-scoring expressions:** be known for; tea plantation; be proud of","kw":""},{"num":"Q3","q":"How long have you lived there?","answer":"I've lived there for pretty much my whole life — around twenty years now. I was born there and only left recently for university. No matter where I go, it'll always feel like home to me.\n\n**Keywords / High-scoring expressions:** my whole life; be born there; feel like home","kw":""},{"num":"Q4","q":"Is that a big city or a small place?","answer":"It's more of a small town than a city, I'd say. Everything is within easy reach and people mostly know each other. Personally, I quite like that cosy, close-knit feeling.\n\n**Keywords / High-scoring expressions:** within easy reach; cosy; close-knit","kw":""},{"num":"Q5","q":"Do you think you will continue living there for a long time?","answer":"Probably not for the next few years, to be honest. I'll likely stay in the city for work opportunities after I graduate. But when I'm older, I could see myself moving back for a quieter, slower pace of life.\n\n**Keywords / High-scoring expressions:** work opportunities; slower pace of life; move back","kw":""},{"num":"Q6","q":"Is there anything you dislike about it?","answer":"Well, the one thing that frustrates me is that there isn't much to do for young people. There are hardly any cinemas or big shopping malls, so we often had to travel to the nearest city for fun. Apart from that, though, I really have no complaints.\n\n**Keywords / High-scoring expressions:** frustrate; hardly any; no complaints","kw":""},{"num":"Q7","q":"What do you like about your hometown?","answer":"What I love most is the fresh air and the greenery everywhere. Life there is peaceful and unhurried, which is such a contrast to the busy city. Whenever I go back, I instantly feel more relaxed.\n\n**Keywords / High-scoring expressions:** greenery; unhurried; a contrast to","kw":""},{"num":"Q8","q":"Do you like living there?","answer":"Yes, I genuinely enjoy it. It's calm, safe, and everyone is friendly, so I always feel at ease. The only downside is that it can get a little boring at times, but overall it's a lovely place to live.\n\n**Keywords / High-scoring expressions:** feel at ease; downside; a lovely place","kw":""},{"num":"Q9","q":"Do you like your hometown?","answer":"I really do, and I think I appreciate it more now that I've moved away. It's the place that shaped who I am, and it holds all my childhood memories. There's a special warmth to it that no other place quite matches.\n\n**Keywords / High-scoring expressions:** appreciate; shape who I am; childhood memories","kw":""},{"num":"Q10","q":"How long have you been living there?","answer":"I lived there continuously for about eighteen years before university. So it's fair to say I spent nearly my entire childhood and teenage years in that one place. That's why I feel so attached to it.\n\n**Keywords / High-scoring expressions:** continuously; teenage years; feel attached to","kw":""},{"num":"Q11","q":"Please describe your hometown a little.","answer":"Sure. It's a small, green town surrounded by tea-covered hills, with a river running right through the middle. The streets are quiet, the air is fresh, and life moves at a gentle pace. It's the kind of place where you can actually hear yourself think.\n\n**Keywords / High-scoring expressions:** running through the middle; at a gentle pace; hear yourself think","kw":""},{"num":"Q12","q":"Is your hometown a big city or a small place?","answer":"It's definitely a small place rather than a big city. There are no skyscrapers or heavy traffic — just low buildings and quiet lanes. I actually prefer it that way, because it feels much more human and relaxed.\n\n**Keywords / High-scoring expressions:** skyscraper; quiet lanes; more human","kw":""},{"num":"Q13","q":"Where would you like to live?","answer":"Ideally, I'd love to live somewhere that combines the best of both worlds — a city with good job prospects but also plenty of green spaces. A place like Hangzhou really appeals to me because it's modern yet surrounded by nature. That balance would suit me perfectly.\n\n**Keywords / High-scoring expressions:** the best of both worlds; job prospects; appeal to me","kw":""},{"num":"Q14","q":"Do you plan to continue living there?","answer":"Not in the short term, I'm afraid. My career is likely to keep me in a bigger city for a while. That said, my hometown will always be somewhere I return to, and settling back there later on isn't out of the question.\n\n**Keywords / High-scoring expressions:** in the short term; return to; not out of the question","kw":""},{"num":"Q15","q":"Where's your hometown?","answer":"My hometown is a small town in the south of China, tucked away among some low green hills. It's not a place many people have heard of, but it's quiet and beautiful. I'm always happy to tell people where I come from.\n\n**Keywords / High-scoring expressions:** in the south of; tucked away; where I come from","kw":""}]},{"title":"Home/Accommodation","qs":[{"num":"Q1","q":"Do you think it is important to live in a comfortable environment?","answer":"Absolutely, I think it makes a huge difference. When your surroundings are comfortable, you feel more relaxed and can recharge properly after a long day. For me, coming home to a tidy, cosy space really lifts my mood.\n\n**Keywords / High-scoring expressions:** make a difference; recharge; lift my mood","kw":""},{"num":"Q2","q":"What makes you feel pleasant in your home?","answer":"A few small things, actually. Good natural light is a big one — my flat gets plenty of sunshine in the afternoon, which feels lovely. I also keep a couple of plants around, and their green really brightens up the place.\n\n**Keywords / High-scoring expressions:** natural light; a big one; brighten up","kw":""},{"num":"Q3","q":"What's your favorite room in your apartment or house?","answer":"Definitely my bedroom. It's my little private space where I can read, listen to music or just switch off completely. I've decorated it exactly the way I like, so it feels like a proper retreat.\n\n**Keywords / High-scoring expressions:** private space; switch off; a retreat","kw":""},{"num":"Q4","q":"What kind of house or flat do you want to live in in the future?","answer":"In the future I'd love a bright flat with a big balcony overlooking some greenery. Ideally it would have an open kitchen, since I enjoy cooking. Nothing too huge — just cosy, well-lit and full of natural light.\n\n**Keywords / High-scoring expressions:** overlooking; open kitchen; well-lit","kw":""},{"num":"Q5","q":"Do you live in a house or a flat?","answer":"I live in a flat on the tenth floor of an apartment building. It's a fairly typical two-bedroom place, which suits my needs nicely. The best part is the view — I can see the whole city skyline from my window.\n\n**Keywords / High-scoring expressions:** apartment building; suit my needs; city skyline","kw":""},{"num":"Q6","q":"What part of your home do you like the most?","answer":"I'd have to say the living room, because that's where everything happens. We gather there to watch films, chat and just spend time together. It's the heart of our home, really.\n\n**Keywords / High-scoring expressions:** gather; spend time together; the heart of our home","kw":""},{"num":"Q7","q":"Please describe the room you live in.","answer":"My room is small but nicely arranged. There's a desk by the window, a comfy bed against the wall, and a few shelves packed with books. I keep it simple and clutter-free, which helps me focus and relax.\n\n**Keywords / High-scoring expressions:** nicely arranged; packed with; clutter-free","kw":""},{"num":"Q8","q":"Do you prefer living in a house or a flat?","answer":"Personally, I lean towards a flat, at least for now. It's low-maintenance and usually closer to the city centre, which is convenient. A house would be nice one day, but it's honestly a lot more work to look after.\n\n**Keywords / High-scoring expressions:** lean towards; low-maintenance; look after","kw":""},{"num":"Q9","q":"Are the transport facilities to your home very good?","answer":"Yes, they're really convenient. There's a subway station just five minutes away on foot, and several bus routes stop right outside. Getting anywhere in the city is quick and hassle-free, which I'm very grateful for.\n\n**Keywords / High-scoring expressions:** on foot; bus routes; hassle-free","kw":""},{"num":"Q10","q":"What do you usually do in your house/flat/room?","answer":"Mostly I relax and unwind after work. I'll cook a simple dinner, watch a show, or read a book before bed. On weekends I sometimes invite friends over for a meal, which is always good fun.\n\n**Keywords / High-scoring expressions:** unwind; invite friends over; good fun","kw":""},{"num":"Q11","q":"Which room does your family spend most of the time in?","answer":"Definitely the living room. That's where we all end up in the evening — my parents watch the news while I scroll on my phone. Even though we're doing different things, it's nice just being in the same space together.\n\n**Keywords / High-scoring expressions:** end up; watch the news; the same space","kw":""},{"num":"Q12","q":"Can you describe the place where you live?","answer":"Sure. I live in a modern flat in a quiet residential area, not far from the city centre. It's bright, comfortable and has all the amenities I need nearby. Overall, it's a really pleasant place to come home to.\n\n**Keywords / High-scoring expressions:** residential area; amenities; come home to","kw":""},{"num":"Q13","q":"What's the difference between where you are living now and where you have lived in the past?","answer":"The biggest difference is the size and location. I used to live in a bigger house in a small town, but now I'm in a smaller flat right in the city. I traded space for convenience, and honestly, I don't regret it.\n\n**Keywords / High-scoring expressions:** trade ... for; convenience; don't regret it","kw":""},{"num":"Q14","q":"Do you plan to live there for a long time?","answer":"For the next few years, yes. It's close to work and everything I need, so there's no reason to move soon. Further down the line, though, I might look for something bigger once my situation changes.\n\n**Keywords / High-scoring expressions:** no reason to move; further down the line; my situation changes","kw":""},{"num":"Q15","q":"How long have you lived there?","answer":"I've been living in this flat for about three years now. Time has flown by, honestly — it feels like I only just moved in. By now it truly feels like home.\n\n**Keywords / High-scoring expressions:** time has flown by; just moved in; feels like home","kw":""},{"num":"Q16","q":"Who do you live with?","answer":"At the moment I share the flat with one of my closest friends. We split the rent and the chores, which makes life a lot easier. We get along really well, so it never feels crowded.\n\n**Keywords / High-scoring expressions:** split the rent; chores; get along well","kw":""},{"num":"Q17","q":"What kind of housing/accommodation do you live in?","answer":"I live in a rented two-bedroom flat in a fairly new building. It comes furnished and has good facilities like a gym downstairs. For a young person like me, it's the perfect kind of accommodation.\n\n**Keywords / High-scoring expressions:** rented; come furnished; facilities","kw":""}]},{"title":"Old buildings","qs":[{"num":"Q1","q":"Are there any old buildings you want to see in the future? why?","answer":"Yes, I'd love to visit the old temples in Kyoto one day. I've seen so many photos of the wooden architecture surrounded by autumn leaves, and it just looks magical. I think being there in person would give me a real sense of the history behind them.\n\n**Keywords / High-scoring expressions:** in person；a sense of history；magical","kw":""},{"num":"Q2","q":"Do you prefer living in an old building or a modern house?","answer":"To be honest, I'd go for a modern house. Old buildings have a lot of charm, but they often have problems like poor heating or leaky pipes. A modern place is just more practical and comfortable for everyday life, which matters more to me.\n\n**Keywords / High-scoring expressions:** go for；charm；leaky pipes","kw":""},{"num":"Q3","q":"Do you think we should preserve old buildings in cities?","answer":"Absolutely, I think it's really important. Old buildings tell the story of a city and give it a unique character that new glass towers just can't match. For example, in my hometown there's an old street from decades ago, and it's become a lovely spot that both locals and tourists really treasure.\n\n**Keywords / High-scoring expressions:** unique character；tell the story of；treasure","kw":""},{"num":"Q4","q":"Have you ever seen old buildings in the city?","answer":"Yes, quite a few actually. There's a beautiful old church near the city centre that must be over a hundred years old. I walk past it almost every day, and I still stop to admire the stone carvings on the front. It really stands out among all the modern shops around it.\n\n**Keywords / High-scoring expressions:** walk past；stone carvings；stands out","kw":""}]},{"title":"Parks","qs":[{"num":"Q1","q":"Are there any parks you want to go to in the future?","answer":"Yes, I've always wanted to visit Central Park in New York. I've seen it in so many films that it almost feels familiar already. I'd love to just wander around, rent a bike, and watch the city life go by on a sunny afternoon.\n\n**Keywords / High-scoring expressions:** wander around；city life go by；it almost feels familiar","kw":""},{"num":"Q2","q":"Would you like to see more parks in your city?","answer":"Definitely, I think we could always use more green space. My city is quite crowded and there aren't many places to just sit and breathe. More parks would give people a chance to relax, exercise, and get away from the noise of traffic for a while.\n\n**Keywords / High-scoring expressions:** green space；get away from the noise；we could always use more","kw":""},{"num":"Q3","q":"Do you still like going to parks now?","answer":"Yes, more than ever actually. With how busy work gets, a walk in the park is my favourite way to clear my head. There's a small one near my flat, and I often go there in the early evening to stretch my legs and enjoy the fresh air.\n\n**Keywords / High-scoring expressions:** clear my head；stretch my legs；more than ever","kw":""},{"num":"Q4","q":"Did you like going to parks as a child?","answer":"Oh, I absolutely loved it. My grandparents used to take me to the park every weekend, and I'd spend hours on the swings and running around with other kids. Those trips were the highlight of my week, and I still have really warm memories of them.\n\n**Keywords / High-scoring expressions:** the swings；the highlight of my week；warm memories","kw":""}]},{"title":"the city  you live in","qs":[{"num":"Q1","q":"What city do you live in?","answer":"I currently live in Hangzhou, a city in the east of China. It's famous for the beautiful West Lake and its long history. I've been here for a few years now, and I've really grown to love the pace of life here.\n\n**Keywords / High-scoring expressions:** in the east of；grown to love；the pace of life","kw":""},{"num":"Q2","q":"What's the weather like where you live?","answer":"Well, we get all four seasons quite clearly here. Summers can be really hot and humid, which I find a bit hard to bear, but autumn is absolutely gorgeous with cool, crisp air. Winters are chilly but rarely snowy, so overall the climate is fairly comfortable.\n\n**Keywords / High-scoring expressions:** hot and humid；hard to bear；crisp air","kw":""},{"num":"Q3","q":"Are there people of different ages living in this city?","answer":"Yes, definitely, it's a real mix. There are lots of young people who move here for work and study, but you also see plenty of families and retired folks. In my own neighbourhood, for example, you'll see students, working parents, and grandparents all living side by side.\n\n**Keywords / High-scoring expressions:** a real mix；retired folks；side by side","kw":""},{"num":"Q4","q":"Is this city your permanent residence?","answer":"Not officially, no. My hometown is actually a smaller place a few hours away, so this is more where I've settled for work. That said, I've been here long enough that it genuinely feels like home now, and I could see myself staying for the long run.\n\n**Keywords / High-scoring expressions:** settled for work；feels like home；for the long run","kw":""},{"num":"Q5","q":"Are there big changes in this city?","answer":"Oh, huge changes, honestly. In just the past few years, several new metro lines have opened up, which has made getting around so much easier. There are also loads of new shopping centres and parks, and sometimes I barely recognise areas I used to know well.\n\n**Keywords / High-scoring expressions:** metro lines；getting around；barely recognise","kw":""},{"num":"Q6","q":"How long have you lived in this city?","answer":"I've been living here for about five years now. I moved here right after I finished my studies, mainly for a job opportunity. Time has really flown by, and looking back, it's been long enough for me to build a proper life and a good group of friends here.\n\n**Keywords / High-scoring expressions:** flown by；a job opportunity；build a proper life","kw":""},{"num":"Q7","q":"Do you like this city? Why?","answer":"Yes, I really do. What I love most is how it balances modern convenience with natural beauty, so you can shop in a busy mall and then relax by the lake within minutes. The transport is great and there's always something to do, which suits my lifestyle perfectly.\n\n**Keywords / High-scoring expressions:** balances ... with；modern convenience；suits my lifestyle","kw":""},{"num":"Q8","q":"Do you often see your neighbors？","answer":"Not that often, to be honest. People here tend to keep to themselves, and everyone's busy with their own routines. I do bump into the couple next door in the lift now and then, and we'll exchange a friendly hello, but that's usually as far as it goes.\n\n**Keywords / High-scoring expressions:** keep to themselves；bump into；as far as it goes","kw":""},{"num":"Q9","q":"Are the people friendly in the city？","answer":"On the whole, yes, I'd say people here are pretty warm. Whenever I've asked for directions or needed help carrying something heavy, someone has always been happy to lend a hand. Of course, in a big city everyone's in a rush, but underneath that people are genuinely kind.\n\n**Keywords / High-scoring expressions:** on the whole；lend a hand；in a rush","kw":""},{"num":"Q10","q":"Is the city friendly to children and old people?","answer":"Yes, I think it does a decent job of that. There are plenty of parks with playgrounds for kids, and most buses and metro stations have lifts and seats reserved for the elderly. My grandmother visited last year and found it surprisingly easy to get around.\n\n**Keywords / High-scoring expressions:** does a decent job；reserved for the elderly；get around","kw":""}]},{"title":"buildings","qs":[{"num":"Q1","q":"ls there a building that you would like to visit?","answer":"Oh, definitely the Burj Khalifa in Dubai. I've seen so many photos of it online, and the idea of standing on the world's tallest building really excites me. I imagine the view from the top must be absolutely breathtaking, especially at sunset. Hopefully I'll get the chance to travel there someday.\n\n**Keywords / High-scoring expressions:** the world's tallest building；breathtaking；get the chance","kw":""},{"num":"Q2","q":"Do you take photos of buildings?","answer":"Yeah, quite often actually, especially when I'm travelling somewhere new. I'm really drawn to old architecture, so I love capturing churches and traditional houses with my phone. Last summer in Xi'an, I took loads of shots of the ancient city wall. Looking back at those photos always brings the trip right back to me.\n\n**Keywords / High-scoring expressions:** be drawn to；capture；bring the trip back","kw":""},{"num":"Q3","q":"Are there tall buildings near your home?","answer":"Yes, there are quite a few. I live in a fairly modern part of the city, so I'm surrounded by high-rise apartment blocks and a couple of office towers. From my window I can actually see the tallest one lit up at night, which looks pretty nice. It sometimes feels crowded, but I've grown to like the busy atmosphere.\n\n**Keywords / High-scoring expressions:** high-rise apartment blocks；lit up；busy atmosphere","kw":""}]},{"title":"Views","qs":[{"num":"Q1","q":"Do you prefer views in your own country or in other countries","answer":"Well, I'd say I actually prefer the views in my own country, mainly because there's so much variety here, from mountains to rivers to old towns. Last year I visited Guilin and the scenery there honestly took my breath away. Of course foreign views are exciting too, but there's something familiar and comforting about the landscapes at home.\n\n**Keywords / High-scoring expressions:** took my breath away ; so much variety ; familiar and comforting ","kw":""},{"num":"Q2","q":"Do you prefer views in urban areas or rural areas?","answer":"To be honest, I lean towards rural views because they feel so peaceful and open. Whenever I visit the countryside, I love seeing the green fields and the wide sky without any tall buildings blocking the way. City views can be impressive at night with all the lights, but the calm of the countryside really helps me relax.\n\n**Keywords / High-scoring expressions:** lean towards ; green fields ; blocking the way ","kw":""},{"num":"Q3","q":"Do you like taking pictures of different views","answer":"Yeah, I really enjoy it, and my phone is basically full of scenery photos. Whenever I travel somewhere new, I can't help snapping pictures of sunsets or beautiful streets. It's a nice way to hold on to those moments, and I love looking back at them later to remember how I felt.\n\n**Keywords / High-scoring expressions:** can't help snapping pictures ; hold on to those moments ; look back at them ","kw":""}]},{"title":"Public places","qs":[{"num":"Q1","q":"Do you often go to public places near where you live?","answer":"Yeah, quite often actually. There's a nice park just a few minutes' walk from my flat, and I usually go there in the evenings to relax. On weekends I also visit the shopping mall nearby to grab a coffee or meet friends. These places are so convenient that they've become part of my routine.\n\n**Keywords / High-scoring expressions:** a few minutes' walk ; grab a coffee ; part of my routine ","kw":""},{"num":"Q2","q":"Would you like to see more public places near where you live?","answer":"Definitely, I'd love that. In particular, I wish there were more green spaces and maybe a public library close by. Right now the area feels a little crowded, so having more open places would really improve the quality of life. It would give people more room to breathe and relax.\n\n**Keywords / High-scoring expressions:** green spaces ; quality of life ; room to breathe ","kw":""},{"num":"Q3","q":"Do you wear headphones in public places?","answer":"Yeah, pretty much all the time, especially on the bus or the subway. I like listening to music or podcasts because it helps me block out the noise and just be in my own little world. That said, I always keep the volume down enough to stay aware of what's happening around me.\n\n**Keywords / High-scoring expressions:** block out the noise ; in my own little world ; keep the volume down ","kw":""},{"num":"Q4","q":"Have you ever talked with someone you don’t know in public places?","answer":"Yeah, it's happened a few times. Once I was waiting in a long queue at a café and started chatting with the girl next to me about the menu. It was just a short, friendly conversation, but it made the wait feel much shorter. I'm usually a bit shy, so those small moments are actually quite nice.\n\n**Keywords / High-scoring expressions:** in a long queue ; friendly conversation ; made the wait feel shorter ","kw":""}]},{"title":"Crowded place","qs":[{"num":"Q1","q":"Is the city where you live crowded?","answer":"Yeah, quite crowded, to be honest, especially during rush hour. I live in a big city, so the streets and subway can get packed with people trying to get to work. It's most noticeable in the morning, when I can barely find space to stand on the train. You kind of get used to it, though.\n\n**Keywords / High-scoring expressions:** rush hour ; packed with people ; get used to it ","kw":""},{"num":"Q2","q":"Is there a crowded place near where you live?","answer":"Yeah, there's a huge shopping mall just around the corner, and it's always buzzing with people, particularly on weekends. Because it has cinemas, restaurants and lots of shops, everyone seems to gather there. Sometimes it's so busy that you have to queue just to get a table for lunch.\n\n**Keywords / High-scoring expressions:** around the corner ; buzzing with people ; gather there ","kw":""},{"num":"Q3","q":"Do most people like crowded places?","answer":"Hmm, I think it really varies from person to person. Some people love the lively, energetic feeling of a crowd, like at a concert or a festival. Others, though, find crowds stressful and prefer somewhere quiet. Personally, I think most people can enjoy it in small doses but wouldn't want it all the time.\n\n**Keywords / High-scoring expressions:** varies from person to person ; lively and energetic ; in small doses ","kw":""},{"num":"Q4","q":"Do you like crowded places?","answer":"Honestly, not really, I tend to avoid them when I can. Being in a big crowd makes me feel a bit overwhelmed and tired quite quickly. I much prefer quieter places where I can actually hear myself think. That said, I don't mind a crowd now and then if it's for something fun like a festival.\n\n**Keywords / High-scoring expressions:** overwhelmed ; hear myself think ; now and then ","kw":""},{"num":"Q5","q":"When was the last time you were in a crowded place?","answer":"The last time was probably last weekend, when I went to a night market with a few friends. The place was absolutely packed, and we could barely move without bumping into someone. Still, the food and the lively atmosphere made it totally worth it, so I actually had a great time.\n\n**Keywords / High-scoring expressions:** absolutely packed ; bumping into someone ; worth it ","kw":""}]}],"qn":73},{"key":"00-other","emoji":"🗂️","cn":"Other","en":"Other","topics":[{"title":"History","qs":[{"num":"Q1","q":"When was the last time you read about history?","answer":"Actually, it was just a couple of weeks ago. I came across a short article about the old Silk Road while scrolling through my phone at night, and it really caught my attention. I ended up reading for almost an hour, which is pretty rare for me these days.\n\n**Keywords / High-scoring expressions:** came across ；caught my attention ；ended up doing ","kw":""},{"num":"Q2","q":"Have you ever been to history museums?","answer":"Yes, I've been to a few over the years. The one that really stands out was the provincial museum in my hometown, which I visited with my classmates on a school trip. Seeing those ancient bronze pieces up close made history feel so much more real than reading about it in a textbook.\n\n**Keywords / High-scoring expressions:** stands out ；up close ；feel so much more real ","kw":""},{"num":"Q3","q":"Did you like history when you were young?","answer":"Not really, to be honest. When I was in primary school, I found it pretty boring because we mostly had to memorize dates and names for exams. It was only later, when I started watching historical dramas, that I began to appreciate the stories behind those events.\n\n**Keywords / High-scoring expressions:** memorize dates and names ；historical dramas ；appreciate the stories behind ","kw":""},{"num":"Q4","q":"Do you like history?","answer":"Yes, these days I genuinely enjoy it. I think history is fascinating because it helps us understand why the world is the way it is now. For example, learning about how ancient cities were built makes me look at modern architecture in a completely different way.\n\n**Keywords / High-scoring expressions:** genuinely enjoy ；fascinating ；look at ... in a different way ","kw":""}]},{"title":"Tidiness","qs":[{"num":"Q1","q":"Did you use to keep your room tidy as a child？","answer":"Honestly, not at all when I was little. My room was usually a complete mess, with toys and books scattered all over the floor. My mum was always nagging me to clean up, but back then I just didn't really care about it.\n\n**Keywords / High-scoring expressions:** a complete mess ；scattered all over ；nag me to ","kw":""},{"num":"Q2","q":"Do you like to keep things tidy？","answer":"Yes, I've changed a lot as I've grown up, and now I really like keeping things in order. I find that a tidy desk helps me concentrate much better when I'm working or studying. For instance, I always spend a few minutes clearing everything up before I start, and it just puts my mind at ease.\n\n**Keywords / High-scoring expressions:** keep things in order ；concentrate better ；put my mind at ease ","kw":""}]},{"title":"Museum","qs":[{"num":"Q1","q":"When was the last time you visited a museum?","answer":"Let me think... it was probably about three months ago. I went to a local history museum with a couple of friends on a rainy weekend, mainly because we wanted something to do indoors. It turned out to be surprisingly fascinating, and we ended up staying there for the whole afternoon.\n\n**Keywords / High-scoring expressions:** something to do indoors; turn out to be; fascinating","kw":""},{"num":"Q2","q":"Do you often visit museums?","answer":"Not as often as I'd like, to be honest. Life gets busy and museums aren't usually the first thing that comes to mind on a day off. That said, whenever I travel to a new city, I make a point of visiting at least one, because it's a great way to understand the local culture.\n\n**Keywords / High-scoring expressions:** comes to mind; make a point of; local culture","kw":""},{"num":"Q3","q":"Do you think museums are important?","answer":"Absolutely, I think they play a really vital role. Museums preserve our history and heritage, so future generations can actually see and learn from the past rather than just reading about it. On top of that, they're a wonderful educational resource, especially for kids, making learning come alive.\n\n**Keywords / High-scoring expressions:** vital role; preserve heritage; make learning come alive","kw":""},{"num":"Q4","q":"Are there any museums in your hometown?","answer":"Yes, there are a few. The most well-known one is a museum dedicated to the city's history, which houses some really old artefacts and photographs. I actually went there on a school trip when I was young, and I still remember being amazed by the ancient pottery on display.\n\n**Keywords / High-scoring expressions:** dedicated to; artefacts; on display","kw":""}]}],"qn":10}];
var GUIDE="<h1>IELTS Speaking Guide (Beginner's Edition)</h1>\n<blockquote>Written for anyone just starting to prepare for IELTS Speaking. This guide explains what the test assesses and how it is scored, then walks through the key strategies for Parts 1, 2, and 3. The real secret to improving your speaking score is not \"memorising answers\" — it is <strong>saying what you know fluently, developing your ideas, and sounding natural to the examiner</strong>.</blockquote>\n<hr>\n<h2>0. Understand the Rules First (30-second overview)</h2>\n<p>The IELTS Speaking test is an <strong>11–14 minute face-to-face conversation</strong>, recorded throughout, divided into three parts:</p>\n<table><thead><tr><th>Part</th><th>Format</th><th>Duration</th><th>What is assessed</th></tr></thead><tbody><tr><td><strong>Part 1</strong></td><td>Examiner asks, you answer (everyday topics)</td><td>4–5 minutes</td><td>Can you chat naturally about daily life?</td></tr><tr><td><strong>Part 2</strong></td><td>Cue card — individual long turn</td><td>1 min prep + 2 min speaking</td><td>Can you speak at length independently?</td></tr><tr><td><strong>Part 3</strong></td><td>In-depth discussion linked to Part 2 topic</td><td>4–5 minutes</td><td>Can you express opinions and reason?</td></tr></tbody></table>\n<h3>The Four Scoring Criteria (25% each)</h3>\n<p>The examiner marks you on four dimensions — <strong>know exactly how you are being scored</strong>:</p>\n<ol><li><strong>Fluency &amp; Coherence</strong> — how smoothly and logically you speak, whether you hesitate</li><li><strong>Lexical Resource</strong> — accuracy of vocabulary, synonyms, natural collocations</li><li><strong>Grammatical Range &amp; Accuracy</strong> — variety of sentence structures, frequency of errors</li><li><strong>Pronunciation</strong> — clarity, intonation, and rhythm</li></ol>\n<blockquote>🔑 <strong>For beginners, target Fluency first.</strong> It is better to use simple words and speak smoothly than to search for impressive vocabulary and grind to a halt. Examiners judge your <strong>overall impression</strong>, not individual difficult words.</blockquote>\n<hr>\n<h2>1. Part 1 — Everyday Conversation (Make simple questions sound full)</h2>\n<h3>What is being tested</h3>\n<p>Part 1 covers everyday topics: hometown, work/study, hobbies, weather, food, smartphones… The questions are not hard — <strong>the challenge is not giving too short an answer</strong>.</p>\n<h3>❌ The biggest beginner mistake: too-short answers</h3>\n<blockquote>Q: Do you like your hometown? ❌ \"Yes, I like it.\" (Three words and done — awkward for everyone)</blockquote>\n<h3>✅ The universal formula: <strong>Point + Reason + Example/Extend</strong> (PRE Rule)</h3>\n<ul><li><strong>P</strong>oint (give your view) → <strong>R</strong>eason (explain why) → <strong>E</strong>xample/Extend (give an example or add detail)</li></ul>\n<blockquote>Q: Do you like your hometown? ✅ \"Yeah, I really do. <strong>(Point)</strong> It's a small city but very relaxing, and people there are super friendly. <strong>(Reason)</strong> For example, my neighbours always say hi and sometimes bring us home-cooked food. <strong>(Example)</strong> I think that kind of warmth is hard to find in big cities.\"</blockquote>\n<p>One sentence becomes four — fluency and vocabulary both jump immediately.</p>\n<h3>Practical tips</h3>\n<ul><li><strong>Aim for 2–4 sentences per question</strong> — no more (Part 1 is not a monologue; don't pack in Part 2 volume).</li><li><strong>Use filler openers</strong>: <code>Well, / Actually, / To be honest, / I'd say...</code> — they buy you one second to think and sound natural.</li><li><strong>Be specific, not abstract</strong>: \"I like music\" is weaker than \"I'm really into pop music, especially Taylor Swift\". Specific = sophisticated.</li><li><strong>\"Not really\" works fine</strong>: if you don't like something, say \"Not really, to be honest...\" — an honest answer is easier to develop than a forced positive.</li></ul>\n<h3>High-frequency topics (prepare material in advance)</h3>\n<p>Hometown · Work or study · Where you live · Hobbies · Weather/seasons · Food · Smartphones/social media · Music · Sport · Sleep and daily routine.</p>\n<blockquote>👉 The topics in this question bank cover all 60 current Part 1 topics — work through them one by one.</blockquote>\n<hr>\n<h2>2. Part 2 — Individual Long Turn (Follow the cue card and speak for 2 minutes)</h2>\n<h3>What is being tested</h3>\n<p>You receive a cue card, for example <em>\"Describe a place you like to visit\"</em>, with 3–4 bullet prompts. <strong>One minute to prepare, then two minutes of uninterrupted speaking</strong>.</p>\n<h3>Core mindset</h3>\n<blockquote><strong>Speaking for 2 minutes beats speaking perfectly.</strong> The examiner worries most when you run out of things to say at 40 seconds. Small errors are fine — just keep talking logically.</blockquote>\n<h3>✅ Universal structure: cue card bullets = paragraph outline</h3>\n<p>Each bullet on the cue card is one paragraph. Add an <strong>opening</strong> and a <strong>closing</strong> and you naturally have a short talk:</p>\n<p><code>Opening: \"What I'm going to talk about is...\"  (1 sentence, sets the scene)<br>Body: Address each of the 3 bullet points — 2–3 sentences each<br>Closing: \"So that's why this ... means a lot to me.\"  (1 sentence, wraps up)</code></p>\n<h3>How to use the 1-minute prep time (crucial!)</h3>\n<ul><li><strong>Write keywords, not sentences</strong> (a few nouns/verbs is enough — glance down and speak).</li><li>For each bullet, jot 1–2 words + 1 specific detail (time, place, person, feeling).</li><li>Can't think of a real story? <strong>Make one up.</strong> IELTS tests your English, not your biography — a fluent invented story beats a halting true one.</li></ul>\n<h3>Techniques to make your monologue vivid</h3>\n<ul><li><strong>Add time and place</strong>: <code>Last summer, / A couple of years ago, / It was in a small town near...</code></li><li><strong>Add feelings</strong>: <code>I was really excited / a bit nervous / totally amazed...</code></li><li><strong>Add contrast</strong>: <code>Unlike other places I've been to, this one...</code></li><li><strong>Time-filler trick</strong>: after covering the main points, add <code>The reason I chose to talk about this is...</code> to extend naturally.</li></ul>\n<h3>❌ Things to avoid</h3>\n<ul><li>Don't memorise a scripted answer — examiners hear dozens a day and will probe until the script breaks down.</li><li>Don't stop and apologise for mistakes — <strong>keep going</strong>; fluency matters far more than one error.</li><li>Don't stare at the cue card; look at the examiner and speak as if telling a story.</li></ul>\n<hr>\n<h2>3. Part 3 — In-depth Discussion (Move from talking about yourself to arguing a point)</h2>\n<h3>What is being tested</h3>\n<p>Part 3 digs deeper into the Part 2 topic, asking about <strong>opinions, comparisons, trends, and reasons</strong>, for example:</p>\n<blockquote>\"Do you think technology has changed the way people travel?\"</blockquote>\n<p>The focus shifts from \"you\" to \"<strong>people / society / the future</strong>\". This is the part that <strong>most separates scores</strong> and the high-band watershed.</p>\n<h3>✅ Universal formula 1: Opinion development</h3>\n<p><strong>State position → Give reason → Example/concession → Return to position</strong></p>\n<blockquote>\"I'd say <strong>yes, definitely</strong>. <strong>(Position)</strong> Thanks to apps and online maps, people can plan trips on their own now. <strong>(Reason)</strong> For instance, my parents used to rely on travel agencies, but now they book everything on their phones. <strong>(Example)</strong> Of course, some older people still find it tricky, <strong>(Concession)</strong> but overall technology has made travelling much easier. <strong>(Return)</strong>\"</blockquote>\n<h3>✅ Universal formula 2: Buying time on tough questions</h3>\n<p>Caught off guard? Use a bridging sentence to think — don't stay silent:</p>\n<ul><li><code>That's an interesting question, let me think for a second...</code></li><li><code>Well, I've never really thought about it, but I guess...</code></li><li><code>It's hard to say, but if I had to choose...</code></li></ul>\n<blockquote>🔑 <strong>Silence is the number-one killer of fluency.</strong> A \"filler\" sentence is always better than a three-second pause.</blockquote>\n<h3>✅ Universal formula 3: Expressions that elevate your answers</h3>\n<table><thead><tr><th>Function</th><th>Useful phrases</th></tr></thead><tbody><tr><td>Expressing opinion</td><td><code>In my opinion, / From my perspective, / I'd argue that...</code></td></tr><tr><td>Giving examples</td><td><code>For instance, / A good example would be...</code></td></tr><tr><td>Comparing</td><td><code>Compared to the past, / Whereas some people..., others...</code></td></tr><tr><td>Conceding</td><td><code>Admittedly, / That said, / While it's true that...</code></td></tr><tr><td>Speculating</td><td><code>It's likely that, / There's a good chance that...</code></td></tr><tr><td>Talking about trends</td><td><code>More and more people are..., / There's a growing tendency to...</code></td></tr></tbody></table>\n<h3>Part 3 mindset</h3>\n<ul><li><strong>There is no \"correct\" answer</strong> — the examiner does not care whether your view is right or wrong, only whether you can <strong>justify it coherently</strong>.</li><li><strong>Develop, exemplify, concede</strong> (acknowledge the other side briefly before asserting your own view) — it signals mature thinking.</li><li><strong>Two-sided answers</strong> score higher than one-sided ones: <code>On one hand... on the other hand...</code></li></ul>\n<hr>\n<h2>4. Seven Golden Rules for the Whole Test</h2>\n<ol><li><strong>Fluent beats perfect</strong>: speaking smoothly is priority one — errors are fine, hesitation is costly.</li><li><strong>Developed beats brief</strong>: back every answer with Point + Reason + Example.</li><li><strong>Specific beats vague</strong>: include details (names, places, times, numbers, feelings).</li><li><strong>Natural beats impressive</strong>: idiomatic simple words (<code>hang out / a big deal / pretty much</code>) score better than awkward complex ones.</li><li><strong>Vary your vocabulary</strong>: don't repeat the same word — <code>good → great / amazing / decent / solid</code>.</li><li><strong>Use intonation</strong>: stress key words, let your voice rise and fall — don't read from a script.</li><li><strong>Smile and make eye contact</strong>: this is a conversation, not a recitation; a relaxed attitude raises the examiner's overall impression.</li></ol>\n<hr>\n<h2>5. Beginner's 4-Week Practice Plan (actionable)</h2>\n<table><thead><tr><th>Week</th><th>Goal</th><th>Daily practice</th></tr></thead><tbody><tr><td><strong>Week 1</strong></td><td>Break the ice — start speaking</td><td>Answer 5 Part 1 questions using the PRE formula, record and listen back</td></tr><tr><td><strong>Week 2</strong></td><td>Master the Part 2 monologue</td><td>Draw one cue card per day: 1 min prep + speak for 2 min, record</td></tr><tr><td><strong>Week 3</strong></td><td>Open up Part 3 thinking</td><td>Practise Position + Reason + Example + Concession on one topic per day</td></tr><tr><td><strong>Week 4</strong></td><td>Full mock test</td><td>Run a complete Part 1+2+3 each day; practise with a teacher or partner</td></tr></tbody></table>\n<h3>Practice rules</h3>\n<ul><li><strong>Always record and listen back</strong>: the gap between how fluent you think you sound and how you actually sound is huge — recordings don't lie.</li><li><strong>Use a timer</strong>: strict 2-minute target for Part 2 builds a reliable sense of pacing.</li><li><strong>Build a personal story bank</strong>: prepare a handful of \"all-purpose\" stories — family, work, hometown, a trip, a friend — that can be adapted to many different questions.</li></ul>\n<hr>\n<h2>6. Three Home Truths for Beginners</h2>\n<ol><li><strong>IELTS Speaking tests your ability to have a conversation, not your level of English.</strong> Think of it as a chat with a friend, not a written exam.</li><li><strong>The fastest early gains come from speaking up and saying enough</strong>, not from memorising vocabulary or fixing grammar.</li><li><strong>There is no substitute for practising with a real person.</strong> You now have 60 Part 1 topics — start using them with a teacher or language partner, and this guide will truly pay off.</li></ol>\n<p>Good luck — go get that score! 🎯</p>";
var esc=function(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');};
var home=document.getElementById('home'),section=document.getElementById('section'),guide=document.getElementById('guide');
var backBtn=document.getElementById('backBtn'),hTitle=document.getElementById('hTitle'),hSub=document.getElementById('hSub');

function renderHome(){
  var h='<div class="cardlink guide" data-guide="1"><span class="em">📖</span>'+
    '<span><span class="t">Beginner's Guide · IELTS Speaking</span><br><span class="d">Key tips for Parts 1/2/3 · 4-week practice plan</span></span>'+
    '<span class="go">→</span></div>';
  h+='<div class="note">💡 Tip: read the Beginner's Guide first, then browse the topics. Click a topic to see its questions; click a question to see the sample answer.</div>';
  DATA.forEach(function(c,i){
    h+='<div class="cardlink" data-cat="'+i+'"><span class="em">'+c.emoji+'</span>'+
       '<span><span class="t">'+c.cn+' '+c.en+'</span><br><span class="d">'+c.topics.length+' topics · '+c.qn+' questions</span></span>'+
       '<span class="go">→</span></div>';
  });
  home.innerHTML=h;
}
function showView(which){
  home.classList.toggle('hidden',which!=='home');
  section.classList.toggle('hidden',which!=='section');
  guide.classList.toggle('hidden',which!=='guide');
  backBtn.style.display=which==='home'?'none':'inline-block';
  window.scrollTo(0,0);
}
function renderSection(i){
  var c=DATA[i],h='';
  c.topics.forEach(function(t,ti){
    h+='<div class="topic" data-t="'+ti+'"><button class="t-head"><span>'+esc(t.title)+'</span>'+
       '<span class="badge">'+t.qs.length+' Q</span><span class="arrow">›</span></button><div class="t-body">';
    t.qs.forEach(function(q){
      var kw=q.kw?'<div class="kw"><b>Keywords / High-scoring expressions:</b>'+esc(q.kw)+'</div>':'';
      h+='<div class="q"><button class="q-btn"><span class="qn">'+esc(q.num)+'</span><span>'+esc(q.q)+
         '</span><span class="arrow">›</span></button><div class="q-body"><div class="q-inner">'+
         '<div class="answer">'+esc(q.answer)+'</div>'+kw+'</div></div></div>';
    });
    h+='</div></div>';
  });
  section.innerHTML=h;
  hTitle.textContent=c.emoji+' '+c.en;
  hSub.textContent=c.topics.length+' topics · '+c.qn+' questions · click a topic to expand';
  showView('section');
}
function renderGuide(){
  guide.innerHTML='<div class="guide-view">'+GUIDE+'</div>';
  hTitle.textContent='📖 IELTS Speaking Guide';
  hSub.textContent='Beginner\'s Guide · Tips for Parts 1/2/3';
  showView('guide');
}
function goHome(){
  hTitle.textContent='🎯 IELTS Speaking Part 1';
  hSub.textContent='60 current topics · 318 questions · Beginner\'s guide + expandable answers';
  showView('home');
}
home.addEventListener('click',function(e){
  if(e.target.closest('.cardlink.guide')){ renderGuide(); return; }
  var card=e.target.closest('.cardlink'); if(card) renderSection(+card.dataset.cat);
});
section.addEventListener('click',function(e){
  var qb=e.target.closest('.q-btn'); if(qb){ qb.parentElement.classList.toggle('open'); return; }
  var th=e.target.closest('.t-head'); if(th){ th.parentElement.classList.toggle('open'); }
});
backBtn.addEventListener('click',goHome);
renderHome();
</script>
</body></html>
