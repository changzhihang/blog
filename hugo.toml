baseURL = 'https://changzhihang.github.io/blog/'
locale = 'zh-cn'
title = 'Blog of Brian'
theme = 'PaperMod'

# Pagination: posts per page
[pagination]
  pagerSize = 10

[params]
  # Text shown on the homepage
  description = "Zhihang's new blog"
  # Show reading time on posts
  ShowReadingTime = true
  # Show a table of contents on posts
  ShowToc = true

# Preserve LaTeX math delimiters so KaTeX can render them client-side
[markup]
  [markup.goldmark.extensions.passthrough]
    enable = true
    [markup.goldmark.extensions.passthrough.delimiters]
      block = [['$$', '$$'], ['\[', '\]']]
      inline = [['$', '$'], ['\(', '\)']]

[menu]
  # Top navigation menu items
  [[menu.main]]
    identifier = "posts"
    name = "Posts"
    url = "/posts/"
    weight = 10
  [[menu.main]]
    identifier = "exercises"
    name = "物理习题"
    url = "/exercises/"
    weight = 15
  [[menu.main]]
    identifier = "english"
    name = "英语学习"
    url = "/english/"
    weight = 17
  [[menu.main]]
    identifier = "tags"
    name = "Tags"
    url = "/tags/"
    weight = 20
